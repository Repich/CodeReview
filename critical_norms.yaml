  - norm_id: TRX_RULES_01
    section: 'Транзакции: правила использования'
    category: transactions_locks
    title: Все вызовы НачатьТранзакцию должны иметь парную фиксацию или отмену
    norm_text: Все вызовы НачатьТранзакцию должны сопровождаться ЗафиксироватьТранзакцию или ОтменитьТранзакцию. Нельзя начинать
      транзакцию без завершения.
    tags:
    - transactions
    scope: разработка
    code_applicability: true
    automation_hint: code
    check_type: semantic
    default_severity: critical
    detector_type: transactions
  - norm_id: TRX_RULES_02
    section: 'Транзакции: правила использования'
    category: transactions_locks
    title: Начало и конец транзакции в одном методе
    norm_text: НачатьТранзакцию и последующее Зафиксировать/Отменить должны выполняться в контексте одного метода; нельзя распределять
      их по разным процедурам.
    tags:
    - transactions
    scope: разработка
    code_applicability: true
    automation_hint: code
    check_type: semantic
    default_severity: major
    detector_type: transactions
  - norm_id: TRX_RULES_03
    section: 'Транзакции: правила использования'
    category: transactions_locks
    title: Код транзакции помещают в блок Попытка/Исключение
    norm_text: Весь код, выполняемый внутри явной транзакции, следует помещать в блок Попытка/Исключение, чтобы гарантировать
      завершение транзакции при ошибках.
    tags:
    - transactions
    scope: разработка
    code_applicability: true
    automation_hint: code
    check_type: semantic
    default_severity: critical
    detector_type: transactions
  - norm_id: TRX_RULES_04
    section: 'Транзакции: правила использования'
    category: transactions_locks
    title: При исключении сначала ОтменитьТранзакцию
    norm_text: В обработчике Исключение необходимо сначала вызвать ОтменитьТранзакцию, и только затем выполнять другие действия
      (логирование, сообщения).
    tags:
    - transactions
    scope: разработка
    code_applicability: true
    automation_hint: code
    check_type: semantic
    default_severity: critical
    detector_type: transactions
  - norm_id: TRX_RULES_05
    section: 'Транзакции: правила использования'
    category: transactions_locks
    title: Не обращаться к базе после ошибки в транзакции
    norm_text: Если внутри транзакции произошла ошибка, пока транзакция не отменена, запрещены новые обращения к базе (иначе
      возникнет "В этой транзакции уже происходили ошибки").
    tags:
    - transactions
    scope: разработка
    code_applicability: true
    automation_hint: code
    check_type: semantic
    default_severity: major
    detector_type: transactions
  - norm_id: TRX_RULES_06
    section: 'Транзакции: правила использования'
    category: transactions_locks
    title: Минимизировать объём кода в транзакции
    norm_text: В транзакции оставляют только ту часть логики, которая действительно требует целостности. Внешние вызовы (файлы,
      сетевые ресурсы) нужно переносить вне транзакции.
    tags:
    - transactions
    scope: разработка
    code_applicability: true
    automation_hint: code
    check_type: semantic
    default_severity: major
    detector_type: transactions
