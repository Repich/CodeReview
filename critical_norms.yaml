    section: Минимизация количества серверных вызовов и трафика
    category: code_style
    title: Контроль количества серверных вызовов
    norm_text: Разработку управляемого приложения ведут с контролем количества вызовов серверных процедур и функций. На одно
      действие пользователя код конфигурации не должен вызывать сервер дополнительные разы без обоснования.
    tags:
