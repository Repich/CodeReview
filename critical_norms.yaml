norms:
  - norm_id: CRIT_NEW_01
    title: "Выполнить/Вычислить только в безопасном режиме"
    section: "Безопасность"
    category: security
    norm_text: |
      Запрещено использовать функции Выполнить() и Вычислить() для исполнения кода в виде текста
      без безопасного режима. Такой код должен выполняться только через механизмы безопасного
      исполнения (в т.ч. типовые обертки BSP).
    rationale: |
      Выполнение непроверенного текста приводит к удаленному выполнению кода, компрометации
      данных и обходу механизмов безопасности.
    detection_hint: 'Выполнить( | Вычислить( | ВыполнитьВБезопасномРежиме | ВычислитьВБезопасномРежиме'
    scope: "любой модуль"
    source_reference: "system_standards.txt #std770"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_02
    title: "Запрет небезопасного исполнения кода в сервисной модели"
    section: "Безопасность"
    category: security
    norm_text: |
      В сервисной модели запрещено исполнять код, переданный в виде текста, а также отключать
      безопасный режим и безопасный режим разделения данных. Должны быть включены безопасный
      режим и безопасный режим разделения данных.
    rationale: |
      Нарушение приводит к межтенантным утечкам данных и выполнению кода с повышенными
      полномочиями в окружении сервиса.
    detection_hint: 'ОтключитьБезопасныйРежим | БезопасныйРежимРазделенияДанных | Выполнить\(|Вычислить\('
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std770"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_03
    title: "Отключение пользовательского кода при загрузке/переносе данных"
    section: "Безопасность"
    category: security
    norm_text: |
      При загрузке/переносе данных в сервисной модели должно быть исключено исполнение
      пользовательского кода и фрагментов запросов из внешних источников. Обработка входных
      данных должна выполняться без выполнения внешнего кода.
    rationale: |
      Иначе возможны RCE, внедрение вредоносной логики и компрометация сервисной инфраструктуры.
    detection_hint: "ЗагрузкаДанных | ОбработкаЗагрузки | ВнешняяОбработка | ВнешнийИсточник | ТекстЗапроса"
    scope: "сервер"
    source_reference: "system_standards.txt #std669"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_04
    title: "Внешние компоненты и источники только из доверенных и с проверкой подлинности"
    section: "Безопасность"
    category: security
    norm_text: |
      Внешние компоненты и внешние источники данных должны загружаться только из надежных
      источников и по защищенным каналам с проверкой подлинности сервера. Для HTTPS/FTPS должны
      быть явно заданы сертификаты удостоверяющих центров (СертификатыУдостоверяющихЦентровОС)
      для проверки сертификата сервера.
    rationale: |
      Нарушение приводит к атаке «man-in-the-middle», подмене источника, внедрению вредоносных
      компонентов и утечке данных.
    detection_hint: "OpenSSL | СертификатыУдостоверяющихЦентровОС | HTTPS | FTPS | ВнешняяКомпонента | Загрузить"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std669"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_05
    title: "Безопасный запуск внешних приложений"
    section: "Безопасность"
    category: security
    norm_text: |
      Командная строка запуска внешних приложений должна формироваться только из заранее
      проверенных частей; запрещено включать данные из БД/форм/настроек без проверки на опасные
      символы. Запрещено динамически формировать и запускать исполняемые файлы; для приложений,
      требующих прав администратора, запуск должен выполняться только по явной команде пользователя
      (кнопка с «щитом»).
    rationale: |
      Иначе возможны командные инъекции, запуск произвольного кода и эскалация привилегий на
      сервере/рабочем месте.
    detection_hint: 'ЗапуститьПриложение | ЗапускПриложения | Cmd | powershell | temp | \.exe | \.bat | \.cmd'
    scope: "клиент/сервер (по месту запуска)"
    source_reference: "system_standards.txt #std774"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_06
    title: "Привилегированный режим только при необходимости и на минимальном участке"
    section: "Безопасность"
    category: security
    norm_text: |
      Привилегированный режим должен включаться только при невозможности решить задачу штатными
      правами и только на минимально необходимом участке кода. Привилегированный режим должен
      быть отключен сразу после выполнения операции.
    rationale: |
      Длительный/необоснованный привилегированный режим приводит к обходу RLS/прав, утечке данных
      и несанкционированным изменениям.
    detection_hint: "ПривилегированныйРежим\\(|УстановитьПривилегированныйРежим|ВключитьПривилегированныйРежим"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std485"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_07
    title: "Проверка прав перед операциями в привилегированном режиме и запрет «проверок через RLS»"
    section: "Безопасность"
    category: security
    norm_text: |
      Перед выполнением действий в привилегированном режиме должна выполняться проверка прав
      доступа (ПравоДоступа/ВыполнитьПроверкуПравДоступа) к затрагиваемым объектам. Запрещено
      проверять права через чтение данных с RLS-ограничениями (например, выборка «ГДЕ ЛОЖЬ») в
      привилегированном режиме; проверка должна выполняться по ролям (РольДоступна/Пользователи.РолиДоступны).
    rationale: |
      Иначе возможно выполнение запрещенных пользователю операций и обход контроля доступа с
      последующей утечкой/порчей данных.
    detection_hint: "ВыполнитьПроверкуПравДоступа|ПравоДоступа\\(|РольДоступна\\(|Пользователи\\.РолиДоступны|ГДЕ\\s+ЛОЖЬ|RLS"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std737"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_08
    title: "Права для новых объектов/полей только у ПолныеПрава"
    section: "Безопасность"
    category: security
    norm_text: |
      Флаги «Устанавливать права для новых объектов» и «Устанавливать права для новых реквизитов
      и табличных частей» должны быть установлены только для роли ПолныеПрава. При добавлении
      новых объектов/полей должно быть обеспечено корректное назначение прав всем ролям.
    rationale: |
      Иначе новые объекты/поля могут стать доступны неавторизованным ролям или, наоборот, критически
      недоступны, что приводит к утечкам/сбоям.
    detection_hint: "Устанавливать права для новых объектов|Устанавливать права для новых реквизитов|Роль ПолныеПрава"
    scope: "конфигурация (роли/права)"
    source_reference: "system_standards.txt #std532"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_09
    title: "Запрет выдачи права удаления ссылочных объектов"
    section: "Безопасность"
    category: security
    norm_text: |
      Запрещено выдавать право удаления ссылочных объектов любой роли, кроме ПолныеПрава и
      АдминистраторСистемы. Исключения допускаются только для типовых ролей (например, «Администратор»).
    rationale: |
      Ошибка приводит к невосстановимой потере справочников/документов и нарушению целостности
      учетных данных.
    detection_hint: "Права роли: Удаление|АдминистраторСистемы|ПолныеПрава"
    scope: "конфигурация (роли/права)"
    source_reference: "system_standards.txt #std532"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_10
    title: "Осторожное использование РАЗРЕШЕННЫЕ в запросах"
    section: "Безопасность"
    category: data_integrity
    norm_text: |
      Запрещено использовать ключевое слово РАЗРЕШЕННЫЕ в запросах, если это может приводить к
      искажению бизнес-результатов (замена значений «по умолчанию» вместо фактических).
      РАЗРЕШЕННЫЕ допускается только при осознанной обработке «нехватки прав» в логике.
    rationale: |
      Искажение выборок приводит к неверным расчетам, ошибочным решениям и скрытым дефектам,
      трудно диагностируемым в эксплуатации.
    detection_hint: "\\bРАЗРЕШЕННЫЕ\\b|Разрешенные"
    scope: "любой модуль (запросы)"
    source_reference: "system_standards.txt #std415"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_11
    title: "Парность транзакций (Начать/Зафиксировать/Отменить)"
    section: "Транзакции"
    category: transactions
    norm_text: |
      Каждый вызов НачатьТранзакцию() должен иметь парный ЗафиксироватьТранзакцию() или
      ОтменитьТранзакцию() на всех ветках исполнения. Непарные транзакции запрещены.
    rationale: |
      Непарная транзакция может быть автоматически отменена при завершении контекста
      (сервер→клиент и т.п.), что приводит к потере изменений и трудно воспроизводимым ошибкам.
    detection_hint: "НачатьТранзакцию\\(|ЗафиксироватьТранзакцию\\(|ОтменитьТранзакцию\\("
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std348"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_12
    title: "Корректная структура try/except вокруг транзакции"
    section: "Транзакции"
    category: transactions
    norm_text: |
      НачатьТранзакцию() должно вызываться до блока Попытка, а ЗафиксироватьТранзакцию() — после
      успешного завершения блока; в обработчике исключений должна выполняться ОтменитьТранзакцию().
      Запрещено фиксировать/отменять транзакцию внутри блока Попытка так, чтобы это нарушало парность.
    rationale: |
      Неправильная структура приводит к частично зафиксированным данным, «висящим» транзакциям
      и блокировкам.
    detection_hint: "Попытка[\\s\\S]*НачатьТранзакцию|НачатьТранзакцию[\\s\\S]Исключение[\\s\\S](нет ОтменитьТранзакцию)"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std348"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_13
    title: "Запрет вложенных транзакций"
    section: "Транзакции"
    category: transactions
    norm_text: |
      Запрещено использовать вложенные транзакции, рассчитывая на частичный откат изменений.
      При необходимости атомарности должна использоваться одна транзакция верхнего уровня.
    rationale: |
      Вложенные транзакции не поддерживаются как «savepoint», что приводит к ложному ощущению
      отката и потере согласованности данных.
    detection_hint: "НачатьТранзакцию\\([\\s\\S]*НачатьТранзакцию\\("
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std348"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_14
    title: "Проброс исключения для отката внешней транзакции"
    section: "Транзакции"
    category: transactions
    norm_text: |
      Если ошибка произошла во вложенном вызове внутри внешней транзакции, исключение должно
      быть проброшено (ВызватьИсключение), чтобы обеспечить откат транзакции верхнего уровня.
      Запрещено «гасить» исключение, оставляя внешнюю транзакцию активной.
    rationale: |
      Иначе внешняя транзакция может быть зафиксирована с некорректным/частичным состоянием данных.
    detection_hint: "Исключение[\\s\\S]*(нет ВызватьИсключение)|Попытка[\\s\\S]*Исключение[\\s\\S]*Продолжить"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std348"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_15
    title: "Запрет продолжения работы с БД после ошибки в активной транзакции"
    section: "Транзакции"
    category: availability
    norm_text: |
      После возникновения ошибки при обращении к БД в активной транзакции запрещено выполнять
      дальнейшие обращения к БД до отмены транзакции. Сначала должна быть выполнена
      ОтменитьТранзакцию(), затем — дальнейшая обработка/логирование.
    rationale: |
      Попытка продолжить работу может привести к повторным исключениям, скрытию первопричины
      и зависанию/развалу бизнес-операции.
    detection_hint: "Исключение[\\s\\S]*(Запрос\\.Выполнить\\(|Записать\\(|Провести\\()"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std348"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_16
    title: "Запрет обращений к внешним ресурсам в транзакции"
    section: "Транзакции"
    category: transactions
    norm_text: |
      Запрещено обращаться к внешним ресурсам (HTTP/FTP/COM/веб-сервисы и т.п.) в рамках активной
      транзакции. Внешние вызовы должны выполняться вне транзакции либо с иной схемой согласования.
    rationale: |
      Длительные/непредсказуемые внешние операции удерживают блокировки и приводят к массовым
      ожиданиям, дедлокам и деградации производительности.
    detection_hint: "НачатьТранзакцию[\\s\\S]*(HTTPСоединение|FTPСоединение|WSПрокси|COMОбъект|ВнешнееСоединение)"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std348"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_17
    title: "Отключение/включение итогов регистра только в транзакции"
    section: "Транзакции"
    category: data_integrity
    norm_text: |
      Операции записи в регистр с отключением/включением итогов должны выполняться только внутри
      транзакции. Запрещено выполнять такие операции вне транзакции.
    rationale: |
      В противном случае возможны неконсистентные итоги и ошибки параллельной работы
      в многопользовательской системе.
    detection_hint: "ОтключитьИтоги|ВключитьИтоги|УправлениеИтогами|НачатьТранзакцию"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std348"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_18
    title: "Минимизация кода после фиксации транзакции"
    section: "Транзакции"
    category: data_integrity
    norm_text: |
      После ЗафиксироватьТранзакцию() не должно выполняться логики, способной вызвать исключение,
      влияющее на результат операции. ЗафиксироватьТранзакцию() должно быть максимально «последней»
      значимой операцией в успешной ветке.
    rationale: |
      Иначе изменения будут зафиксированы, но пользователю/интеграции будет возвращена ошибка,
      что вызывает повторные операции, дубли и рассогласование.
    detection_hint: "ЗафиксироватьТранзакцию\\([\\s\\S]+(Запрос\\.Выполнить|Записать|Провести|ВызватьИсключение)"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std348"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_19
    title: "Использование управляемого режима блокировки"
    section: "Блокировки и конкурентность"
    category: concurrency
    norm_text: |
      В управляемом приложении должен использоваться управляемый режим блокировки. Блокировки
      должны накладываться только на реально обрабатываемые записи и удерживаться минимально
      возможное время.
    rationale: |
      Неверный режим/избыточные блокировки повышают риск дедлоков, длительных ожиданий и срывов
      SLA при параллельной работе пользователей.
    detection_hint: "РежимУправляемыхБлокировок|БлокировкаДанных\\.|УправляемаяТранзакция|Исключительная\\s+блокировка"
    scope: "конфигурация + серверные модули"
    source_reference: "system_standards.txt #std460"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_20
    title: "Запрет ДЛЯ ИЗМЕНЕНИЯ при управляемых блокировках"
    section: "Блокировки и конкурентность"
    category: concurrency
    norm_text: |
      В управляемом режиме блокировки запрещено использовать конструкцию ДЛЯ ИЗМЕНЕНИЯ в запросах.
      Для блокирования должны применяться механизмы управляемых блокировок (БлокировкаДанных).
    rationale: |
      Использование «FOR UPDATE» в управляемом режиме приводит к ошибкам/непредсказуемому
      поведению блокировок и ухудшению параллельности.
    detection_hint: "ДЛЯ\\s+ИЗМЕНЕНИЯ|FOR\\s+UPDATE"
    scope: "любой модуль (запросы)"
    source_reference: "system_standards.txt #std460"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_21
    title: "Ответственное чтение только в транзакции с управляемыми блокировками"
    section: "Блокировки и конкурентность"
    category: concurrency
    norm_text: |
      Любое ответственное чтение данных должно выполняться в транзакции с использованием
      управляемых блокировок. Запрещено выполнять ответственное чтение вне транзакции либо
      без фиксации требуемого уровня блокировки.
    rationale: |
      Иначе возможны гонки, чтение «устаревших» данных и некорректные решения, приводящие
      к порче данных и спорным бизнес-результатам.
    detection_hint: "Чтение.*(перед записью|перед расчетом|перед проведением)|НачатьТранзакцию отсутствует|БлокировкаДанных отсутствует"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std648"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_22
    title: "Эксклюзивная блокировка до ответственного чтения при последующем изменении"
    section: "Блокировки и конкурентность"
    category: concurrency
    norm_text: |
      Если ответственное чтение выполняется для последующего изменения тех же данных,
      эксклюзивная блокировка должна устанавливаться до чтения. Запрещено читать,
      а затем пытаться «дозаблокировать», если это может привести к взаимоблокировкам.
    rationale: |
      Чтение без предварительной эксклюзивной блокировки повышает вероятность дедлоков
      и конфликтов при конкурентных изменениях.
    detection_hint: "БлокировкаДанных\\..*Исключительный[\\s\\S]*Чтение|Чтение[\\s\\S]*БлокировкаДанных\\..*Исключительный"
    scope: "сервер/общий модуль"
    source_reference: "system_standards.txt #std648"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_23
    title: "Запрет разыменования составных ссылочных полей через точку в запросах"
    section: "Запросы"
    category: performance
    norm_text: |
      Запрещено разыменовывать ссылочные поля составного типа через точку в языке запросов,
      если это приводит к неявным соединениям и падению производительности. Должны применяться
      явные соединения и/или иные оптимальные конструкции.
    rationale: |
      Неявные соединения и добавление таблиц RLS резко увеличивают стоимость запроса и могут
      привести к массовым блокировкам и деградации системы.
    detection_hint: "Ссылка\\.[А-Яа-яA-Za-z_]+|\\.Наименование|\\.Код (для составных ссылок)|НеявноеСоединение"
    scope: "любой модуль (запросы)"
    source_reference: "system_standards.txt #std654"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_24
    title: "Запрет смешивания режимов блокировок в одной транзакционной цепочке"
    section: "Блокировки и конкурентность"
    category: concurrency
    norm_text: |
      В одной цепочке выполнения должен использоваться единый режим блокировок, определяемый
      транзакцией верхнего уровня; запрещено пытаться начать транзакцию другого режима при
      наличии активной транзакции. Транзакционные границы и режим блокировок должны
      проектироваться заранее.
    rationale: |
      Смешивание режимов приводит к исключениям платформы, срывам операций и неконтролируемым
      блокировкам.
    detection_hint: "управляемая транзакция|автоматическая транзакция|НачатьТранзакцию.*(внутри активной)|РежимБлокировок"
    scope: "сервер/общий модуль"
    source_reference: "developer_guide.txt §9.3 (особенности транзакций и режимов блокировки)"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_25
    title: "Монопольный режим только без активной транзакции и при единственном сеансе"
    section: "Блокировки и конкурентность"
    category: availability
    norm_text: |
      Монопольный режим должен устанавливаться только при отсутствии активной транзакции и
      только если гарантирован единственный сеанс работы с ИБ. Запрещено включать монопольный
      режим в иных условиях.
    rationale: |
      Нарушение приводит к исключениям платформы или полной остановке работы пользователей
      из-за эксклюзивных блокировок.
    detection_hint: "УстановитьМонопольныйРежим|МонопольныйРежим|НачатьТранзакцию рядом"
    scope: "сервер/общий модуль"
    source_reference: "developer_guide.txt §9.4 (монопольный режим)"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_NEW_26
    title: "Предотвращение эскалации блокировок при большом числе записей"
    section: "Блокировки и конкурентность"
    category: availability
    norm_text: |
      Запрещено проектировать операции так, чтобы в управляемом режиме блокировки удерживалось
      более 100000 блокировок; обработка должна выполняться порциями. Алгоритм должен
      минимизировать число одновременно заблокированных записей.
    rationale: |
      Эскалация блокировок может привести к блокировке всей таблицы и массовой недоступности
      системы.
    detection_hint: "обработка больших выборок|цикл записи|массовое проведение|100000|эскалация блокировок"
    scope: "сервер"
    source_reference: "developer_guide.txt §9.2 (влияние количества блокировок)"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_27
    title: "Длительные операции на сервере выполнять асинхронно"
    section: "Производительность и доступность"
    category: availability
    norm_text: |
      Серверный вызов не должен выполняться более 8 секунд; длительные операции должны
      выполняться в фоновых заданиях/асинхронно. Ожидание завершения фонового задания в UI
      не должно превышать 0.8 секунды за один цикл ожидания.
    rationale: |
      Длительные серверные вызовы блокируют сеансы, вызывают таймауты и деградацию
      производительности при росте нагрузки.
    detection_hint: "ДлительнаяОперация|ФоновоеЗадание|ОжидатьЗавершения|Пауза\\(|Sleep|Таймаут"
    scope: "сервер/клиент (по точке вызова)"
    source_reference: "system_standards.txt #std642"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_28
    title: "Индексируемое основное условие запроса"
    section: "Запросы"
    category: performance
    norm_text: |
      Поля основного условия в секциях ГДЕ/ПО и в виртуальных таблицах должны быть
      проиндексированы и объединены только по И. В основном условии запрещено использовать
      операции, препятствующие поиску по индексу (функции, арифметика, отрицания,
      неравенства и т.п.).
    rationale: |
      Иначе СУБД вынуждена сканировать таблицы/индексы, что приводит к резкой деградации,
      росту блокировок и падению параллельности.
    detection_hint: "ГДЕ.(ФУНКЦИЯ|\\+|\\-|\\|/|НЕ\\s|<>|НЕ\\s+\\()|ПО.*(ФУНКЦИЯ|<>|НЕ\\s)"
    scope: "любой модуль (запросы)"
    source_reference: "system_standards.txt раздел про индексы и «Основное условие»"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_29
    title: "Временные таблицы: объем, индексирование и корректность индексных полей"
    section: "Запросы"
    category: performance
    norm_text: |
      Запрещено создавать временные таблицы на сотни тысяч записей без порционной обработки
      и без жесткого ограничения состава полей. Если временная таблица используется в соединениях
      или подзапросах В(...), она должна индексироваться по полям условий, при этом поля индекса
      обязаны присутствовать в списке выборки.
    rationale: |
      Нарушение приводит к исчерпанию диска, резкой деградации запросов (сканирования),
      росту блокировок и падению доступности.
    detection_hint: "ПОМЕСТИТЬ\\s+\\w+|ИНДЕКСИРОВАТЬ\\s+ПО|В\\s*\\(|СОЕДИНЕНИЕ|циклы с запросами"
    scope: "любой модуль (запросы)"
    source_reference: "system_standards.txt (раздел «Временные таблицы», п.2–3) + developer_guide.txt §8.3.2"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_NEW_30
    title: "Детерминированный порядок результатов (явное УПОРЯДОЧИТЬ ПО)"
    section: "Запросы"
    category: data_integrity
    norm_text: |
      Запрещено полагаться на неявный порядок строк или АВТОУПОРЯДОЧИВАНИЕ в бизнес-логике;
      при необходимости стабильного порядка должно быть задано явное УПОРЯДОЧИТЬ ПО. Запрещено
      использовать АВТОУПОРЯДОЧИВАНИЕ совместно с ПЕРВЫЕ.
    rationale: |
      Различия в порядке между СУБД/планами выполнения приводят к недетерминированным результатам,
      неверным «топам», расхождениям расчетов и трудноуловимым дефектам.
    detection_hint: "АВТОУПОРЯДОЧИВАНИЕ|ПЕРВЫЕ\\s+\\d+ (без УПОРЯДОЧИТЬ ПО)|ORDER BY отсутствует"
    scope: "любой модуль (запросы)"
    source_reference: "system_standards.txt #std412"
    priority: 1
    exceptions: "возможный дубликат"

  - norm_id: CRIT_QRY_01
    title: "Детерминированный порядок строк"
    section: "Запросы"
    category: data_integrity
    norm_text: |
      Если алгоритм обработки результата запроса зависит от порядка строк или результат
      отображается пользователю, в тексте запроса должно быть задано УПОРЯДОЧИТЬ ПО. Запрещено
      полагаться на «естественный» порядок без УПОРЯДОЧИТЬ ПО.
    rationale: |
      Без явной сортировки порядок строк может изменяться непредсказуемо (в т.ч. при смене
      версии/параметров СУБД), что приводит к недетерминированным результатам, ошибочному
      заполнению табличных частей/движений и разному выводу данных.
    detection_hint: "Запросы, где результат далее используется порядково (ПЕРВЫЕ/постобработка/заполнение ТЧ/движений/вывод пользователю) и отсутствует 'УПОРЯДОЧИТЬ ПО'."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std412 п.1.1"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_02
    title: "Сортировка по NULL-значениям должна быть нормализована"
    section: "Запросы"
    category: data_integrity
    norm_text: |
      При сортировке по полю, которое может содержать NULL, в запросе должно быть задано
      выражение, нормализующее NULL (например, ЕСТЬNULL(...)), чтобы обеспечить одинаковый
      порядок на разных СУБД.
    rationale: |
      Разные СУБД могут по-разному сортировать NULL, что вызывает недетерминированность порядка
      строк и расхождения в результатах обработки/отображения.
    detection_hint: "Наличие 'УПОРЯДОЧИТЬ ПО <поле>', где <поле> потенциально NULL (левые соединения/остатки/агрегаты) без ЕСТЬNULL/аналогичной нормализации в выборке."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std412 п.1.2"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_03
    title: "РАЗЛИЧНЫЕ и сортировка только по выбранным полям"
    section: "Запросы"
    category: data_integrity
    norm_text: |
      Если в запросе используется РАЗЛИЧНЫЕ, упорядочивание должно выполняться только по полям,
      включенным в секцию ВЫБРАТЬ. Запрещено УПОРЯДОЧИТЬ ПО по полям, не включенным в выборку
      при РАЗЛИЧНЫЕ.
    rationale: |
      Поля сортировки неявно включаются в выборку и могут разрушить «удаление дублей», приводя
      к появлению нескольких строк с одинаковыми значениями полей выборки.
    detection_hint: "Запросы с 'РАЗЛИЧНЫЕ' и 'УПОРЯДОЧИТЬ ПО', где поле сортировки отсутствует в 'ВЫБРАТЬ'."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std412 п.2"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_04
    title: "Запрет ПЕРВЫЕ + АВТОУПОРЯДОЧИВАНИЕ"
    section: "Запросы"
    category: data_integrity
    norm_text: |
      Использование конструкции ПЕРВЫЕ совместно с АВТОУПОРЯДОЧИВАНИЕ запрещено.
    rationale: |
      Разработчик не контролирует поля сортировки, что приводит к недетерминированной выборке
      «первых» строк и нестабильным результатам на разных СУБД/данных.
    detection_hint: "В тексте запроса одновременно присутствуют 'ПЕРВЫЕ' и 'АВТОУПОРЯДОЧИВАНИЕ'."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std412 п.3"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_05
    title: "Запрет соединений с вложенными запросами"
    section: "Запросы"
    category: performance
    norm_text: |
      В соединениях запроса не следует использовать вложенные запросы; соединять следует только
      объекты метаданных или временные таблицы. Запросы с соединениями на подзапрос должны быть
      переписаны с использованием временных таблиц, если подзапрос не сканирует малый объем.
    rationale: |
      Соединения с подзапросами могут приводить к катастрофическому и нестабильному падению
      производительности, сильной зависимости от статистик и заметным различиям между СУБД.
    detection_hint: "Конструкции вида '... СОЕДИНЕНИЕ (ВЫБРАТЬ ... ) КАК ... ПО ...' в секции ИЗ/соединениях."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std655 п.1.1–1.2"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_06
    title: "Запрет вложенных соединений (неявные подзапросы)"
    section: "Запросы"
    category: performance
    norm_text: |
      Следует избегать вложенных соединений, формирующих неявные подзапросы; соединения должны
      быть переписаны на последовательные соединения или (при необходимости) на временные таблицы.
    rationale: |
      Вложенные соединения усложняют оптимизацию, могут существенно замедлять запрос и при этом
      давать иной результат, чем последовательные соединения.
    detection_hint: "Шаблон '... СОЕДИНЕНИЕ <таблица2> СОЕДИНЕНИЕ <таблица3> ...' (join внутри join), особенно под ЛЕВОЕ СОЕДИНЕНИЕ."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std655 п.3"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_07
    title: "Запрет подзапросов в условии соединения"
    section: "Запросы"
    category: performance
    norm_text: |
      Запрещено использовать вложенные запросы в условии соединения (ПО). Такие конструкции
      должны быть переписаны с использованием временных таблиц.
    rationale: |
      Подзапросы в ПО могут приводить к существенному замедлению и в отдельных случаях —
      к неработоспособности запроса на некоторых СУБД.
    detection_hint: "В секции 'ПО' присутствует 'В (ВЫБРАТЬ ...)' или иной подзапрос."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std656"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_08
    title: "Условия виртуальных таблиц — только в параметрах"
    section: "Запросы"
    category: performance
    norm_text: |
      При использовании виртуальных таблиц условия, относящиеся к виртуальной таблице, должны
      передаваться в параметры виртуальной таблицы. Не рекомендуется переносить такие условия
      в секцию ГДЕ/иные секции внешнего запроса.
    rationale: |
      Перенос условий из параметров виртуальной таблицы во внешние секции усложняет выбор
      оптимального плана и может привести к ошибкам оптимизатора и значительному замедлению.
    detection_hint: "Использование 'РегистрНакопления..(<параметры>)' при этом фильтры по измерениям/периоду задаются в 'ГДЕ', а не в параметрах виртуальной таблицы."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std657 п.1"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_09
    title: "Виртуальная таблица Остатки: исключить лишнюю дату и использовать измерения"
    section: "Запросы"
    category: performance
    norm_text: |
      При получении текущих остатков не должно передаваться значение даты в виртуальную таблицу
      Остатки; условия по измерениям должны быть использованы во внешнем запросе (в выборке/ПО),
      чтобы избежать лишней группировки.
    rationale: |
      Передача даты и неиспользование измерений во внешнем запросе приводит к чтению таблиц
      движений и группировкам, что вызывает существенное замедление и нестабильность на больших
      объемах.
    detection_hint: "Вызовы вида '...Остатки(&Дата, ...)' при потребности в текущих остатках; отсутствие условий/использования измерений (например, Склад) во внешнем запросе."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std733"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_10
    title: "Запрет больших временных таблиц без порционной обработки"
    section: "Временные таблицы"
    category: availability
    norm_text: |
      Не следует создавать временные таблицы с очень большим объемом данных (сотни тысяч
      записей); обработка должна выполняться порциями.
    rationale: |
      Большие ВТ приводят к существенному падению производительности при записи и риску
      исчерпания свободного места на диске, что может остановить работу системы.
    detection_hint: "ПОМЕСТИТЬ во ВТ без ограничений отбора/пакетирования при потенциально больших наборах данных; признаки массовой выгрузки без фильтров."
    scope: "сервер"
    source_reference: "system_standards.txt #std777 п.2.1"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_11
    title: "Временная таблица должна содержать только необходимые данные"
    section: "Временные таблицы"
    category: performance
    norm_text: |
      Во временные таблицы должно помещаться только минимально необходимое число записей и
      только те поля, которые используются в последующих запросах.
    rationale: |
      Избыточные строки/колонки увеличивают стоимость записи/хранения и ухудшают планы выполнения
      последующих соединений и отборов, что вызывает серьезную деградацию производительности.
    detection_hint: "ПОМЕСТИТЬ во ВТ с широким набором полей, которые далее нигде не используются; выборка «на всякий случай»."
    scope: "сервер"
    source_reference: "system_standards.txt #std777 п.2.2–2.3"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_12
    title: "Запрет создания/удаления временных таблиц в цикле"
    section: "Временные таблицы"
    category: performance
    norm_text: |
      Запрещено создавать и удалять временные таблицы в цикле, если возможно создать одну
      временную таблицу до выполнения цикла.
    rationale: |
      Создание/удаление ВТ в цикле резко увеличивает нагрузку на СУБД и диск, ухудшает
      параллельность и приводит к значительному росту времени выполнения.
    detection_hint: "Пакетные запросы с ПОМЕСТИТЬ/УДАЛЕНИЕ ВТ внутри циклов по коллекциям/строкам."
    scope: "сервер"
    source_reference: "system_standards.txt #std777 п.2.4"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_13
    title: "Индексация временных таблиц при соединениях и IN"
    section: "Временные таблицы"
    category: performance
    norm_text: |
      Большие временные таблицы, участвующие в соединениях или в подзапросах оператора В (...),
      должны индексироваться с включением полей, используемых в условиях ПО или сопоставлениях В (...).
    rationale: |
      Отсутствие индексов на ВТ приводит к сканированию и кратному замедлению соединений/отборов,
      росту блокировок и деградации параллельности.
    detection_hint: "Наличие 'ПОМЕСТИТЬ <ВТ>' и далее '... СОЕДИНЕНИЕ <ВТ> ПО ...' или '... В (ВЫБРАТЬ ... ИЗ <ВТ>)' без 'ИНДЕКСИРОВАТЬ ПО'."
    scope: "сервер"
    source_reference: "system_standards.txt #std777 п.3–3.1.2"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_14
    title: "Индексы должны соответствовать условиям запроса"
    section: "Запросы"
    category: concurrency
    norm_text: |
      Для всех условий запроса (ГДЕ/ПО/условия виртуальных таблиц/ИМЕЮЩИЕ) должны существовать
      подходящие индексы: индекс должен содержать все поля условия, идущие подряд в начале индекса.
      Запросы с условиями без подходящих индексов запрещены к эксплуатации на больших объемах.
    rationale: |
      При отсутствии подходящих индексов СУБД вынуждена сканировать таблицы/индексы, что вызывает
      резкий рост времени выполнения и числа блокировок, снижая параллельность и доступность системы.
    detection_hint: "Условия отбора/соединения по неиндексируемым полям; множественные условия, не соответствующие порядку полей составного индекса; жалобы на full scan/сканирование индекса."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std652 п.1.1–1.2"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_15
    title: "Запрет разыменования составных ссылок через точку без ограничения типов"
    section: "Запросы"
    category: performance
    norm_text: |
      Следует избегать получения реквизитов 'через точку' от ссылочных полей составного типа;
      при необходимости должно применяться ограничение типа через ВЫРАЗИТЬ или денормализация
      данных в исходной таблице.
    rationale: |
      Разыменование составных ссылок приводит к неявным соединениям со всеми возможными таблицами
      (и RLS), что вызывает взрыв числа JOIN, нестабильность и тяжелую деградацию производительности.
    detection_hint: "В тексте запроса обращения вида '<ПолеСоставногоТипа>.<Реквизит>' (например, Регистратор.Дата/Номер) без ограничений типов (ССЫЛКА/ВЫРАЗИТЬ)."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std654 п.1.1–2.3"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_16
    title: "Корректное вычисление количества записей"
    section: "Запросы"
    category: data_integrity
    norm_text: |
      При вычислении количества записей в запросах должна использоваться функция КОЛИЧЕСТВО,
      а использование СУММА(1) запрещено. Если требуется условный подсчет и КОЛИЧЕСТВО
      неприменимо, разрядность должна быть расширена через ВЫРАЗИТЬ.
    rationale: |
      СУММА(1) при больших объемах может переполняться из-за разрядности числа по умолчанию,
      что приводит к неверным итогам и ошибкам логики.
    detection_hint: "Наличие 'СУММА(1)' / 'ЕСТЬNULL(СУММА(1),0)' в тексте запроса; условные суммы без ВЫРАЗИТЬ(1 КАК ЧИСЛО(...))."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std787"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_17
    title: "Ограничения и политика использования дополнительных индексов"
    section: "Индексы"
    category: performance
    norm_text: |
      Дополнительные индексы следует применять только в решениях, предназначенных для крупных
      предприятий с КОРП-лицензиями; в решениях для ПРОФ дополнительные индексы использовать нельзя.
      Производительность должна быть приемлемой при отключенных дополнительных индексах на средних
      объемах данных.
    rationale: |
      Неправильное использование дополнительных индексов приводит к недопустимой деградации
      (при отключении/невозможности применения), росту времени выполнения критичных запросов
      и ухудшению эксплуатационной стабильности.
    detection_hint: "Использование дополнительных индексов в метаданных при ориентировании на ПРОФ; отсутствие сценариев/тестов производительности при отключенных доп. индексах."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std791 п.1–2"
    priority: 1
    exceptions: ""

  - norm_id: CRIT_QRY_18
    title: "Запрет усложнения запроса подзапросами и тяжелыми условиями без необходимости"
    section: "Запросы"
    category: performance
    norm_text: |
      Не следует добавлять вложенные запросы только для повышения читаемости; следует избегать
      сложных условий соединения и условий в ГДЕ, содержащих подзапросы и конструкции ВЫБОР, а также
      использовать минимально необходимое число таблиц.
    rationale: |
      Сложные запросы повышают риск выбора неоптимального плана, приводят к нестабильной
      производительности и могут замедляться на порядки на отдельных СУБД и объемах данных.
    detection_hint: "Много таблиц (ориентир 5–7 и более), подзапросы без функциональной необходимости, условия ПО/ГДЕ с подзапросами и ВЫБОР."
    scope: "любой модуль"
    source_reference: "system_standards.txt #std729 п.2.2"
    priority: 1
    exceptions: ""

  - norm_id: SECURITY_COM_AUTOMATION_DISABLE_MACROS
    title: "COM-объекты должны использоваться с отключением макросов"
    section: "Безопасность: COM-автоматизация"
    category: security_access
    norm_text: |
      При создании COM-объектов необходимо использовать безопасные обертки и отключать макросы.
      Прямой вызов CreateObject/Новый COMОбъект без такого контроля запрещен.
    rationale: |
      Включенные макросы позволяют исполнение небезопасного кода и приводят к компрометации
      данных на рабочем месте и сервере.
    detection_hint: "Новый COMОбъект|CreateObject|Excel.Application|Word.Application|PowerPoint.Application"
    scope: "любые модули"
    source_reference: "norms.yaml"
    priority: 1
    exceptions: ""

  - norm_id: SECURITY_PASSWORD_STORAGE_NO_PLAINTEXT
    title: "Запрет хранения паролей в открытом виде"
    section: "Безопасность: секреты"
    category: security_access
    norm_text: |
      Пароли и другие чувствительные данные нельзя хранить в строковых литералах или переменных
      без шифрования. Нужно использовать защищенные хранилища/регистры.
    rationale: |
      Хранение секретов в открытом виде приводит к компрометации учетных записей и утечкам.
    detection_hint: "Пароль|password|pwd|token|secret"
    scope: "любые модули"
    source_reference: "norms.yaml"
    priority: 1
    exceptions: ""

  - norm_id: SECURITY_TLS_VERIFY_SERVER_AUTH
    title: "Запрет отключать проверку подлинности сервера"
    section: "Безопасность: TLS"
    category: security_access
    norm_text: |
      Настройки HTTPS/TLS не должны отключать проверку сертификата сервера
      (VerifyServerCertificate, StrictSSL). Любое принудительное отключение проверки запрещено.
    rationale: |
      Отключение проверки подлинности позволяет атаки MITM и подмену удаленных источников.
    detection_hint: "ПроверятьПодлинностьСервера = Ложь|VerifyServerCertificate = False|StrictSSL = False"
    scope: "сетевой код"
    source_reference: "norms.yaml"
    priority: 1
    exceptions: ""
