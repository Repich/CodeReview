    section: Минимизация количества серверных вызовов и трафика
    category: queries_performance
    title: Оптимизация трафика для низкой скорости и мобильного клиента
    norm_text: Для режимов с низкой скоростью соединения и мобильного клиента важно оптимизировать не только количество вызовов,
      но и объём передаваемых данных, тестируя в режиме имитации задержек.
    tags:
