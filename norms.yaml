- norm_id: STD_777
  section: Система стандартов 2025
  category: queries_performance
  title: Использование временных таблиц
  norm_text: 'Использование временных таблиц Область применения: управляемое приложение, мобильное приложение, обычное приложение. В общем случае, временные таблицы рекомендуется использовать для повышения производительности и стабильности выполнения запросов. Их можно использовать для других целей (например, для улучшения архитектуры кода), но при этом, нужно понимать, что это может в некоторых случаях приводить к снижению производительности. Есть ситуации, когда временные таблицы не следует создавать или создание временных таблиц необходимо минимизировать. Не следует создавать временные таблицы с очень большим объемом данных (сотни тысяч записей). Если алгоритму требуется работать с большим объемом данных, то он должен выполнять обработку этих данных порциями. Следует максимально ограничивать количество данных, выбираемых во временную таблицу. Не следует помещать во временную таблицу больше данных, чем требуется последующим запросам. Не следует помещать во временную таблицу поля, которые не используются в последующих запросах, т.к.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
