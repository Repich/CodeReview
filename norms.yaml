  section: Размещение сведений о настройках подсистемы
  category: data_model_registers
  title: 'Процедуры, позволяющие переопределить бизнес-логику сразу для всех объектов, с которыми'
  norm_text: 'Процедуры, позволяющие переопределить бизнес-логику сразу для всех объектов, с которыми работает подсистема, также рекомендуется размещать в переопределяемом модуле. Имена процедур рекомендуется выбирать исходя из выполняемого действия. Настройки или обработчики, специфичные для отдельного объекта, рекомендуется размещать в модуле менеджера этого объекта. Для процедуры, содержащей в себе информацию о свойствах, реквизитах или о наличии методов объекта рекомендуется использовать имена вида ПриОпределенииНастроек<ИмяПодсистемы>. Процедуры, задающие переопределяемую бизнес-логику, специфичную для конкретного объекта так же рекомендуется размещать в модуле менеджера этого объекта. Для каждого выполняемого действия рекомендуется создавать отдельную процедуру. При этом наличие той или иной процедуры в модуле менеджера задается в процедуре ПриОпределенииНастроек<ИмяПодсистемы>, что позволяет избежать использования конструкции Попытка Исключение для проверки наличия процедуры.'
