- norm_id: STD_603
  section: Система стандартов 2025
  category: metadata_design
  title: Требования к проведению документов
  norm_text: 'Требования к проведению документов Область применения: управляемое приложение, мобильное приложение, обычное приложение. Большинство документов должны проводиться (свойство Проведение установлено в значение Разрешить). п.) В то же время, проведенный документ – это «чистовик», формирование и обработка которого завершены и по поводу которого принято решение, что данный документ должен участвовать в учете. при переводе в статус К обеспечению – обязательно для заполнения поле Дата отгрузки, так как логисту необходима информация, к какой дате нужно привезти заказ; Исключение из этого правила («большинство документов должны проводиться») составляют документы, которые не предназначены для отражения событий в учете. отдельные документы, технология проведения которых сильно отличается от технологических возможностей платформы, но которые должны выглядеть для пользователя так, как будто они проводятся. В случае если пользователь должен выполнять регистрацию события в системе и отражение его в учете за одно действие, необходимо записывать новый документ в режиме проведения.'
