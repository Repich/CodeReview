  section: Модули форм
  category: correctness
  title: Обработчики команд формы располагаются на клиенте
  norm_text: 'Обработчики команд, созданных в форме, должны быть клиентскими методами (&НаКлиенте). Серверные процедуры нельзя назначать обработчиками пользовательских команд.'
