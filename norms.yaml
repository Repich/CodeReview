- norm_id: STD_778
  section: Система стандартов 2025
  category: metadata_design
  title: 'Денежные поля: требования по локализации'
  norm_text: 'Денежные поля: требования по локализации Область применения: управляемое приложение, мобильное приложение, обычное приложение. Для обеспечения работы конфигурации в странах с низким курсом национальной валюты, необходимо предусмотреть увеличение разрядности целой части числовых полей (реквизитов, ресурсов, измерений), содержащих денежный эквивалент – денежные поля. Для этого в метаданных для денежных полей, которые могут содержать только положительные значения, вместо фиксированного типа Число(15, 2) использовать определяемый числовой тип ДенежнаяСуммаНеотрицательная; для денежных полей, которые могут содержать отрицательное значение, использовать тип ДенежнаяСуммаЛюбогоЗнака со сброшенным флагом Неотрицательное. В тех случаях, когда определяемый тип невозможно указать (например, в качестве типа для параметра формы или включить в составной тип), то следует задать числовой тип максимальной длины - Число(31, 2). При использовании в конфигурации Библиотеки стандартных подсистем не следует использовать конструктор типа Число для получения описания типа денежного поля.'
