  section: Система стандартов 2025
  category: data_model_registers
  title: Общие сведения об организации хранения данных
  norm_text: 'Общие сведения об организации хранения данных Область применения: управляемое приложение, мобильное приложение, обычное приложение. При выборе типа объектов метаданных в общем случае следует руководствоваться следующей схемой прикладного решения: * Стрелки на схеме обозначают взаимосвязи между данными (взаимные ссылки). Таким образом, упрощенно, для каждой сущности предметной области необходимо выбрать соответствующий блок по следующей схеме: Если необходимо хранить сравнительно редко изменяющуюся информацию, не привязанную ко времени, то это блок условно постоянной информации (1). Если необходимо регистрировать события, требующие документально подтверждения с отслеживанием последовательности событий на временной оси, то это блок событий процессов предметной области (2).'
