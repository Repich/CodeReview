- norm_id: STD_658
  section: Система стандартов 2025
  category: queries_performance
  title: Эффективные условия запросов
  norm_text: 'Эффективные условия запросов Область применения: управляемое приложение, мобильное приложение, обычное приложение. Условия запросов должны быть написаны оптимально с точки зрения производительности, чтобы исключить существенное увеличение длительности выполнения запросов при увеличении объема данных в таблицах. Поля основного условия в секциях ГДЕ, ПО и виртуальных таблицах должны быть проиндексированы. Основное условие может быть уточнено дополнительным условием, но объединять их следует только по И. Например, при индексировании разных полей одного объекта метаданных создаются разные индексы, а не один в который помещаются все проиндексированные поля и использоваться основным условием будет только один из них. для последнего или единственного используемого поля индекса допустимо использовать =, >, <, >=, <=, ПОДОБНО, МЕЖДУ, В, ИЛИ (приводимое к В); нельзя использовать арифметические операции, функции, отрицания и неравенства. Для условий в ГДЕ или в виртуальной таблице следует индексировать поля в основной таблице, из которой выполняется выборка.'
  tags:
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std658'
  auto_actionable: false
- norm_id: STD_708
  section: Система стандартов 2025
  category: queries_performance
  title: Разрешение итогов для периодических регистров
  norm_text: 'Разрешение итогов для периодических регистров сведений Область применения: управляемое приложение, мобильное приложение, обычное приложение. Для периодических регистров сведений рекомендуется разрешить итоги, если выполнены все следующие условия: в регистре ожидается большой объем данных (например, оправданно для регистра с ценами номенклатуры; Кроме того, следует рассмотреть альтернативные варианты по пересмотру запросов к регистру таким образом, чтобы эти условия выполнялись. Во всех остальных случаях, не следует разрешать итоги для периодических регистров сведений. Не требуется предусматривать в конфигурации отдельного механизма пересчета итогов, так как актуализация таблиц итогов выполняется автоматически при каждой записи набора записей в регистр. Исключение составляют отдельные случаи, когда актуализация итогов при записи отключалась принудительно с помощью вызова метода РегистрСведенийМенеджер.УстановитьИспользованиеИтогов(Ложь).'
  tags:
