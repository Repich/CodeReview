  norm_text: 'Использование объекта РегистрСведенийМенеджерЗаписи Область применения: управляемое приложение, мобильное приложение, обычное приложение. Чтение записи (набора записей) из регистра сведений без последующей модификации необходимо выполнять запросом. Объект РегистрСведенийМенеджерЗаписи следует применять только тогда, когда выполнение операций с регистром сведений требует использования отбора одновременно по всем измерениям. В остальных случаях следует использовать объект РегистрСведенийНаборЗаписей.'
