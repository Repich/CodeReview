  norm_text: 'В большинстве случаев, предопределенные элементы рекомендуется создавать автоматически, поскольку они постоянно нужны и требуется упростить обращение к этим элементам из кода. Для этого в свойстве ОбновлениеПредопределенныхДанных справочника, плана счетов, плана видов характеристик или плана видов расчета должно быть установлено значение Авто (по умолчанию), а также не следует допускать программных вызовов метода УстановитьОбновлениеПредопределенныхДанных этих объектов для переключения этого режима. запретить удаление предопределенных элементов пользователями, выключив во всех ролях следующие права (по умолчанию выключены): ИнтерактивноеУдалениеПредопределенныхДанных ИнтерактивнаяПометкаУдаленияПредопределенныхДанных ИнтерактивноеСнятиеПометкиУдаленияПредопределенныхДанных ИнтерактивноеУдалениеПомеченныхПредопределенныхДанных Область применения (уточнение): управляемое приложение, обычное приложение.'
