  section: Использование функциональных опций
  category: data_model_registers
  title: В случае если некоторая функциональность конфигурации является необязательной для использования
  norm_text: 'В случае если некоторая функциональность конфигурации является необязательной для использования, то для управления доступностью такой функциональности на стадии внедрения следует применять функциональные опции. Для хранения значений функциональных опций в информационной базе необходимо завести в конфигурации соответствующие данные (например, константы). Допустим, в конфигурации есть функциональность версионирования данных информационной базы, которая является необязательной. Для управления доступностью этой функциональности необходимо: создать функциональную опцию ИспользоватьВерсионированиеОбъектов, которая определяет использование прикладного механизма конфигурации для текущей информационной базы создать константу ИспользоватьВерсионированиеОбъектов типа Булево для хранения значения этой функциональной опции в свойстве Хранение функциональной опции указать константу ИспользоватьВерсионированиеОбъектов. После этого, те или иные объекты конфигурации можно «привязать» к функциональной опции, включив их в ее состав, а в случае необходимости управления доступностью кода – использовать метод ПолучитьФункциональнуюОпцию: ИспользуетсяМеханизмВерсионирования = ПолучитьФункциональнуюОпцию(.'
  tags:
  - data-model
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: func_options
- norm_id: FUNC_OPTIONS_02
  section: Использование функциональных опций
  category: code_style
  title: 'Доступность функциональности может задаваться не только для информационной базы в целом'
  norm_text: 'Допустим, в конфигурации необходимо управлять применением функциональности сложного учета НДС, но не в целом для всей информационной базы, а в зависимости от организации. Для этого необходимо: создать функциональную опцию УчетнаяПолитикаСложныйУчетНДС создать параметр функциональной опции Организация, поскольку значение функциональной опции зависит от организации (если такого параметра в конфигурации еще нет) создать регистр сведений УчетнаяПолитикаНалоговыйУчет для хранения значений этой функциональной опции, с измерением Организация и ресурсами, которые необходимы для управления функциональностью учета НДС в свойстве Хранение функциональной опции указать ресурс регистра сведений СложныйУчетНДС для параметра функциональной опции Организация указать в свойстве Использование измерения Организация регистра сведений УчетнаяПолитикаНалоговыйУчет. После этого, для того чтобы в той или иной форме значение функциональной опции соответствовало контексту, необходимо устанавливать значения параметров функциональной опции, например, так: УстановитьПараметрыФункциональныхОпцийФормы(Новый Структура("Организация", <ТребуемаяОрганизация>))'
  tags:
