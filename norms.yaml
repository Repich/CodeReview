  detector_type: manual_review
  source_standard: '#std712'
  auto_actionable: false
- norm_id: STD_714
  section: Система стандартов 2025
  category: ui_navigation
  title: Навигация внутри раздела
  norm_text: 'Навигация внутри раздела Область применения: управляемое приложение. Навигация внутри конкретного раздела осуществляется с помощью "Панели функций текущего раздела" или области навигации и действий в составе "Меню функций" Панель функций текущего раздела Панель функций текущего раздела рекомендуется использовать в конфигурациях, содержащих небольшое количество команд в каждом разделе. В конфигурациях со сложной структурой и большим количеством команд эту панель рекомендуется скрывать. В раздел рекомендуется помещать команды перехода к: · спискам и журналам документов · спискам "первичных" документов (данных), с которых начинаются бизнес-процессы · рабочим местам · специальным обработкам, похожим на обычные списки · отчетам При этом все эти команды должны решать задачу по конкретному участку работ или области деятельности. Чтобы при стандартном разрешении экрана не возникало полос прокрутки, рекомендуется следить, чтобы названия команд не превышали 38 символов, а лучше – умещались в 30.'
  tags:
  - advisory
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std714'
  auto_actionable: false
- norm_id: STD_715
  section: Система стандартов 2025
  category: ui_navigation
  title: Как вместить большое количество команд
  norm_text: 'Как вместить большое количество команд Область применения: управляемое приложение. В конфигурациях со сложной структурой меню и большим количеством команд рекомендуется: 1. Заголовки разделов выводить в виде "Картинка и текст", использовать картинки размером 16х16 3.'
