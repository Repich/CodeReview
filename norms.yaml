- norm_id: STD_438
  section: Система стандартов 2025
  category: queries_performance
  title: Проверка на пустой результат выполнения запроса
  norm_text: 'Проверка на пустой результат выполнения запроса Область применения: управляемое приложение, мобильное приложение, обычное приложение. Проверку того, что результат выполнения запроса не содержит строк следует выполнять с помощью метода Пустой. В то же время если требуется выбрать (или выгрузить) результат запроса, то предварительный вызов метода Пустой не требуется. Например, вместо: РезультатЗапроса = Запрос.Выполнить()'
  tags:
