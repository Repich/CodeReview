- norm_id: STD_765
  section: Система стандартов 2025
  category: localization
  title: 'Элементы форм: требования по локализации'
  norm_text: 'Элементы форм: требования по локализации Область применения: управляемое приложение, мобильное приложение, обычное приложение. Нельзя присваивать реквизитам, используемым в элементах формы, строковые значения, не прошедшие локализацию. Рекомендуется для этого использовать, списки значений, в которых для каждого значения задается локализуемое представление, или перечисления, если они используются в таблицах базы данных. Для всех таблиц и групп на формах необходимо указывать заголовки, и, если эти заголовки не нужно показывать пользователю, в свойствах элемента формы в явном виде убирать отображение заголовка элемента. Следует уменьшать количество незначащей информации, подлежащей локализации. У реквизитов формы, не размещенных на форме в виде элементов управления, следует очищать заголовки, т.к. Следует задавать заголовок для колонок динамического списка, получающихся в запросе комбинацией других колонок или для которых задан свой псевдоним. Нельзя опираться на автоматически сгенерированный заголовок по имени/псевдониму.'
