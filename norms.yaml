- norm_id: STD_769
  section: Система стандартов 2025
  category: localization
  title: Поставка международной версии конфигурации
  norm_text: 'Поставка международной версии конфигурации Область применения: управляемое приложение, мобильное приложение, обычное приложение. Для упрощения работы локализаторов при первичной локализации конфигурации, а также при последующих обновлениях следует выпускать международную версию конфигурации, подготовленную для создания национальных версий. При этом разработку локализованных версий конфигурации рекомендуется вести на базе международной версии. С целью уменьшения трудозатрат на выделение национальной специфики следует анализировать в первую очередь зарубежные версии конфигураций, опубликованные на портале 1С. Национальную (российскую) специфику в программном коде и формах конфигурации необходимо выделить в отдельные объекты метаданных, которые должны отсутствовать в международной версии. Реквизиты объектов, относящиеся к национальной специфике, рекомендуется оставлять в объектах, но при этом обеспечить работоспособность конфигурации в случае их удаления. В формах объектов, где к национальной специфике относится лишь часть элементов, рекомендуется выносить такие элементы в отдельную форму, 1.3.'
  tags:
  - advisory
  - localization
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std769'
  auto_actionable: false
- norm_id: STD_761
  section: Система стандартов 2025
  category: localization
  title: 'Интерфейсные тексты в коде: требования по локализации'
  norm_text: 'Интерфейсные тексты в коде: требования по локализации Область применения: управляемое приложение, мобильное приложение, обычное приложение. Если в модулях конфигурации встречаются строки, предназначенные для пользовательского интерфейса (сообщения пользователю, надписи в формах, названия и подсказки команд, выражения в настройках СКДи т.п.) необходимо обеспечить возможность локализации таких строк. Для этого необходимо применять функцию НСтр вместо прямого использования строковых литералов. Иное использование строк, предназначенных для пользовательского интерфейса, не допускается. В том случае если строка является составной и включает в себя части, зависящие от тех или иных условий, тем не менее, следует использовать логически завершенные, целостные фразы (предложения). Необходимо применять функцию СтрШаблон (или аналогичную) для подстановки параметров в строки сообщений пользователю. Это требование обусловлено, во-первых, разным расположением параметров в тексте предложения на различных языках, что приводит к необходимости изменения исходного кода для перестановки складываемых фрагментов строк, а во-вторых, невозможностью корректно перевести отдельные несогласованные части предлож.'
  tags:
  - advisory
  - localization
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
