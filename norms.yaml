- norm_id: STD_500
  section: Система стандартов 2025
  category: data_model_registers
  title: Общие правила построения интерфейсов
  norm_text: 'Общие правила построения интерфейсов Область применения: обычное приложение. Для каждой укрупненной группы пользователей (рабочего места) в конфигурации рекомендуется определять отдельный интерфейс: главное меню, набор и состав панелей инструментов. В подменю с большим числом элементов, группы элементов должны быть ограничены разделителями. При любом положении выбора действия из главного меню, его размер должен быть таким, чтобы полностью умещаться на экране при минимальном разрешении, из расчета на которое разработана конфигурация. Интерфейс следует проектировать таким образом, чтобы группе пользователей, с одной стороны, был доступен необходимый набор действий, а с другой, не предоставлялся доступ к действиям на которые нет прав. В каждой конфигурации обязательно должны быть интерфейсы Общий и Полный.'
  tags:
  - advisory
  - data-model
  - scope:обычное
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std500'
  auto_actionable: false
- norm_id: STD_501
  section: Система стандартов 2025
  category: ui_navigation
  title: Общие интерфейсы
  norm_text: 'Общие интерфейсы Область применения: обычное приложение. На верхнем уровне главного меню должны обязательно располагаться в крайней левой позиции подменю Файл и в крайней правой позиции набор подменю Сервис, Окна, Справка. В интерфейсе Общий рекомендуется отключать подменю Операции, кроме случаев, когда это подменю используется во всех переключаемых интерфейсах конфигурации.'
