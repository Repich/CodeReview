- norm_id: STD_716
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Командная панель документа
  norm_text: 'Командная панель документа Область применения: управляемое приложение. Порядок расположения команд во всех документах должен быть одинаковым. Состав системных кнопок командной панели, отображаемых платформой по умолчанию, и их порядок относительно друг друга изменять не рекомендуется. При стандартных настройках экрана пользователю должны быть сразу видны все важные команды: - Провести и закрыть / Записать и закрыть - Записать - Провести - Создать на основании - Печать - Глобальные команды - Дополнительные сведения - Движения документа - и т.д. Если в командной панели расположено большое количество команд, рекомендуется отображать важные команды кнопками с картинками без текста.'
  tags:
  - advisory
  - forms
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std716'
  auto_actionable: false
- norm_id: STD_717
  section: Система стандартов 2025
  category: data_model_registers
  title: Табличные части. Оформление списка
  norm_text: 'Оформление списка Область применения: управляемое приложение. В "многоэтажных" колонках следует предусмотреть общий заголовок, соответствующий смыслу указываемых в них данных, а также отображение подсказки в ячейках с незаполненными значениями. Для отображения подсказки следует одновременно использовать: - элемент стиля вида шрифт "ПодсказкаНезаполненнойЯчейки" (размер: 8, начертание: наклонный) - свойство "ПодсказкаВвода" Например, для реквизитов с кратким и полным названиями номенклатуры выводится общий заголовок колонки – "Номенклатура", а в ячейках выводятся подсказки: В Конфигураторе отображение заголовков колонок в шапке отключается с помощью свойства "ОтображатьВШапке" 2. Заголовок колонки должен полностью помещаться в шапку 3. Если в табличной части много колонок и они заведомо не помещаются при стандартном разрешении экрана без горизонтальной прокрутки, то часть из них следует расположить первыми и зафиксировать. Фиксировать нужно самые важные колонки, которые позволят идентифицировать объект.'
  tags:
  - advisory
  - data-model
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std717'
  auto_actionable: false
- norm_id: STD_718
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Итоги в документах
  norm_text: 'Итоги в документах Область применения: управляемое приложение. Не следует вставлять элементы, разделяющие табличную часть и группу с итогами. В области итогов следует размещать только те элементы, которые относятся к итоговым данным. Иные элементы следует располагать вне области итогов. Поэтому его не следует включать в группу с итогами и выделять серым фоном. В подвалах таблиц итоги следует располагать в случае, если итоговые значения выводятся по значительному числу колонок (более 4) одной табличной части и при оформлении в виде отдельных полей ввода не помещаются на форме в одну строку.'
