- norm_id: STD_494
  section: Система стандартов 2025
  category: governance_release
  title: Предварительная инициализация локальных переменных
  norm_text: 'Предварительная инициализация локальных переменных Область применения: управляемое приложение, мобильное приложение, обычное приложение. Методическая рекомендация (полезный совет) В случаях когда фрагмент кода вычисляет значение одной или нескольких локальных переменных, рекомендуется явно выполнять предварительную инициализацию таких переменных.'
