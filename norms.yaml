  norm_text: 'Пояснение невозможности заполнения ячеек в табличных частях Область применения: управляемое приложение. В случае, если ячейка в табличной части не нуждается в заполнении в том или ином состоянии, необходимо сообщать пользователю о причине. Текст рекомендуется оформлять так: угловые скобки цвет текста: «ТекстЗапрещеннойЯчейки» (RGB: 192,192,192) с маленькой буквы Например, в случае если номенклатура не использует характеристики, в ячейке «Характеристика» выводится сообщение в угловых скобках: <характеристики не используются>'
