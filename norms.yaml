  title: Невыбранная картинка
  norm_text: 'Невыбранная картинка Область применения: управляемое приложение. Хорошо Плохо Как оформлять невыбранную картинку: Обязательно указывать текст невыбранной картинки Например, «Добавить фото», «Добавить изображение» Для текста невыбранной картинки используется цвет "ТекстНевыбраннойКартинкиЦвет" (RGB 220,220,220) и шрифт "ТекстНевыбраннойКартинкиШрифт" (шрифт диалогов и меню, размер "12")'
