- norm_id: STD_711
  section: Система стандартов 2025
  category: ui_navigation
  title: Общие принципы построения командного интерфейса
  norm_text: 'Общие принципы построения командного интерфейса Область применения: управляемое приложение. При этом следует руководствоваться спецификой прикладного решения, а также следующими принципами: 1. Элементы внутри панелей и меню следует располагать в порядке убывания важности и частоты использования. Наиболее приоритетные пункты и команды следует располагать первыми. Не рекомендуется располагать рядом команды и пункты меню, в названиях которых совпадают первые символы. Командный интерфейс нужно проектировать таким образом, чтобы он способствовал повышению эффективности выполнения повседневной работы и быстрому освоению программы. Чтобы этого добиться, при разработке следует учитывать мнение пользователей и их представление о том, как команды должны быть сгруппированы.'
  tags:
  - advisory
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std711'
  auto_actionable: false
- norm_id: STD_712
  section: Система стандартов 2025
  category: ui_navigation
  title: Панель разделов
  norm_text: 'Панель разделов Область применения: управляемое приложение. Состав панели Панель разделов является "лицом" программы и имеет большое значение на этапе освоения, поэтому состав и порядок разделов следует проектировать с особой тщательностью. Количество и состав разделов должен соответствовать реальным участкам работ и областям деятельности так, как их видят пользователи. В него рекомендуется добавлять команды перехода к объектам, относящимся ко всей конфигурации, и не включать объекты, относящиеся к конкретным разделам учета или областям деятельности.'
  tags:
  - advisory
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
