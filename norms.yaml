  title: Уточнение сущности объекта метаданных
  norm_text: 'Уточнение сущности объекта метаданных Область применения: управляемое приложение, мобильное приложение, обычное приложение. При описании структуры прикладного решения следует использовать разные типы объектов метаданных для реализации разных по смыслу сущностей. В этих случаях рекомендуется заводить отдельные реквизиты, которые бы однозначно определяли вид или состояние объекта. Не следует трактовать вид объекта по косвенным признакам, в частности в зависимости от заполнения того или иного реквизита.'
