- norm_id: STD_593
  section: Система стандартов 2025
  category: localization
  title: Единицы измерения
  norm_text: 'Единицы измерения Область применения: управляемое приложение. Единицы измерения следует указывать после полей, а не в заголовке: Хорошо Плохо Хорошо Плохо Хорошо Плохо 1.2. Единицы измерения следует указывать без скобок: Хорошо Плохо 1.3. Если к единице измерения выводится расшифровка, то ее следует располагать в скобках, после единицы измерения. 100,000 кг 5,000 шт Количество Ед 100,000 кг 5,000 шт Количество Единица измерения 100,000 кг 5,000 шт Исключение: денежные единицы измерения выводятся в колонке с названием "Валюта". Если единица измерения для разных значений всегда одинакова, то ее следует выводить в заголовке колонки Хорошо Плохо Сумма, руб. При этом единицу измерения следует выводить сразу после значения, которое она измеряет. Количество Папка-вкладыш А4 шт 100,000 Клей канцелярский кг 5,000 Наименование Количество Папка-вкладыш А4 100,000 шт Клей канцелярский 5,000 кг Наименование Количество Папка-вкладыш А4, шт 100,000 Клей канцелярский, кг 5,000 Исключение: если одна единица измерения относится к нескольким колонкам, то ее следует располагать до этих колонок.'
  tags:
  - localization
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
