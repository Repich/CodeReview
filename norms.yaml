  category: queries_performance
  title: Поля основного условия должны образовывать префикс индекса
  norm_text: 'Основное условие в секциях ГДЕ/ПО/ИМЕЮЩИЕ и в параметрах виртуальных таблиц должно быть построено по полям, которые образуют последовательный префикс существующего индекса. Поля, не входящие в индекс, либо расположенные в середине индекса, лишают СУБД возможности использовать поиск по дереву и приводят к сканированию. При ревью необходимо сопоставлять текст запроса со структурой индексов прикладных таблиц (включая автоматически создаваемые индексы) и фиксировать несоответствия.'
  tags:
  - queries
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: performance
- norm_id: INDEX_MISMATCH_04
  section: Несоответствие индексов и условий запроса
  category: queries_performance
  title: Основное условие должно состоять из операций, поддерживающих поиск по индексу
  norm_text: 'Условия, которые ограничивают выборку сильнее всего ("основное условие"), необходимо объединять оператором И и описывать только индексопригодными операциями: =, >, <, >=, <=, МЕЖДУ, В, ПОДОБНО (для последнего поля индекса). В основном условии запрещены функции, арифметика, отрицания, сравнения с вычисляемыми выражениями и конструкция ВЫБОР. Подобные выражения необходимо переносить в дополнительное условие после того, как запись уже найдена по индексу.'
  tags:
  - queries
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: performance
- norm_id: INDEX_MISMATCH_05
  section: Несоответствие индексов и условий запроса
  category: queries_performance
  title: Несколько простых индексов не заменяют составной
  norm_text: 'Следует учитывать, что для разных полей создаются разные индексы. Если основное условие одновременно ограничивает несколько полей (например, Склад и Организация), то один индекс по Складу и отдельный индекс по Организации не дадут оптимального плана. Необходимо проектировать составной индекс, в префикс которого входят все поля основного условия в нужном порядке.'
  tags:
  - queries
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: performance
- norm_id: METADATA_INDEX_USAGE_01
  section: Индексы объектов метаданных
  category: data_modeling
  title: Индексировать только те поля, которые используются в условиях, соединениях и упорядочиваниях
  norm_text: 'При проектировании объектов метаданных следует индексировать осмысленные поля: реквизиты, участвующие в соединениях, фильтрах, быстрых отборах и пользовательских сортировках/группировках. Индексы "на всякий случай" усложняют сопровождение и не дают выигрыша. Каждое добавление индекса должно сопровождаться обоснованием в документации или комментарии к метаданным.'
