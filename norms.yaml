- norm_id: STD_453
  section: Система стандартов 2025
  category: integration_exchange
  title: Описание процедур и функций
  norm_text: 'Описание процедур и функций Область применения: управляемое приложение, мобильное приложение, обычное приложение. Описание процедур и функций рекомендуется выполнять в виде комментария к ним. Необходимость комментирования отдельных участков кода процедур и функций должна определяться разработчиком исходя из сложности и нестандартности конкретного участка кода. Обязательного комментирования требуют процедуры и функции входящие в программный интерфейс модулей - такие процедуры и функции предназначены для использования в других функциональных подсистемах (или в других приложениях), за которые могут отвечать другие разработчики, поэтому они должны быть хорошо документированы.'
  tags:
  - advisory
  - integration
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
