  section: Система стандартов 2025
  category: metadata_design
  title: Использование кодов (номеров) объектов конфигурации
  norm_text: 'Использование кодов (номеров) объектов конфигурации Область применения: управляемое приложение, мобильное приложение, обычное приложение. Необходимость применения кодов (номеров) объектов конфигурации определяется из их прикладного смысла. Необходимость применения автонумерации объектов конфигурации отсутствует в следующих случаях: 2.1. При этом в длине номера необходимо учитывать длину префиксов нумерации, например, префикс информационной базы, префикс организации, если это предусмотрено конфигурацией и т.п. При этом в длине номера необходимо учитывать длину префиксов нумерации, например, префикс информационной базы, префикс организации, если это предусмотрено конфигурацией и т.п. Если в конфигурации используется подсистема Префиксация объектов из Библиотеки стандартных подсистем, то совокупную длину (с учетом префикса) номеров документов и кодов справочников рекомендуется устанавливать не менее 11 символов (11, 13, 15, …). Рекомендуется устанавливать допустимую длину кода (номера) объектов переменной.'
