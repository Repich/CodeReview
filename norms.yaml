  norm_text: 'Для типизированных объектов метаданных, хранящихся в информационной базе, не следует использовать составные типы ЛюбаяСсылка, СправочникСсылка, ДокументСсылка и аналогичные. Состав типов того или иного типизированного объекта должен определяться явным образом. Исключение составляют универсальные механизмы (алгоритмы), действительно рассчитанные на работу с произвольными ссылочными объектами. Неоправданно усложняются алгоритмы, которые избыточно должны рассчитывать на широкий набор объектов метаданных тех типов, для которых механизм не требуется в силу прикладной задачи. При вводе значений в поля форм неудобно выбирать из очень большого списка типов конфигурации (когда реально нужно, например, 3-5 типов). Область применения (уточнение): управляемое приложение, обычное приложение.'
