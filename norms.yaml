  auto_actionable: false
- norm_id: STD_412
  section: Система стандартов 2025
  category: queries_performance
  title: Упорядочивание результатов запроса
  norm_text: 'Упорядочивание результатов запроса Область применения: управляемое приложение, мобильное приложение, обычное приложение. Если алгоритм обработки результатов запроса зависит от порядка записей в запросе или если результат обработки запроса в той или иной форме представляется пользователю, то в тексте запроса следует использовать предложение УПОРЯДОЧИТЬ ПО. В остальных случаях упорядочивать записи не следует, так как дополнительное упорядочивание будет создавать избыточную нагрузку на СУБД. При сортировке по полю запроса, которое может потенциально содержать NULL, следует учитывать, что в разных СУБД порядок сортировки по этому полю может отличаться. Если результаты запроса должны тем или иным образом отображаться пользователю, то упорядочивать результаты таких запросов необходимо по полям примитивных типов; упорядочивание по полям ссылочных типов нужно заменять на упорядочивание по строковым представлениям этих полей.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std412'
  auto_actionable: false
- norm_id: STD_535
  section: Система стандартов 2025
  category: queries_performance
  title: 'Округление результатов арифметических операций'
  norm_text: 'Округление результатов арифметических операций в запросах Область применения: управляемое приложение, мобильное приложение, обычное приложение. Если в операции деления заранее известны порядки числителя и знаменателя, то следует по возможности избегать выполнения деления числа заведомого маленького порядка на число заведомо большого порядка. Например, вместо: 0.02 / 28346 * 9287492 0.02 * 9287492 / 28346 2. Если точность результата выполнения запроса к базе данных, содержащего арифметические операции деления, агрегатные функции СРЕДНЕЕ, арифметические операции умножения, если каждый из множителей может иметь дробную часть, различается на различных СУБД, то рекомендуется к операндам и/ или результатам этих операций применять оператор явного приведения разрядности и точности числовых данных: ВЫРАЗИТЬ(... КАК Число(m, n)) Оператор ВЫРАЗИТЬ следует применять к операндам, если на какой-нибудь СУБД точность получаемого результата недостаточна. Например, требуется 10 разрядов после запятой, а получается 6.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std535'
  auto_actionable: false
- norm_id: STD_726
  section: Система стандартов 2025
  category: data_model_registers
  title: Особенности использования в запросах оператора
  norm_text: 'Особенности использования в запросах оператора ПОДОБНО Область применения: управляемое приложение, мобильное приложение, обычное приложение. Оператор ПОДОБНО в тексте запроса необходимо использовать только с константным строковым литералом, 2. При разработке конфигурации необходимо использовать такие шаблоны для оператора ПОДОБНО, которые одинаково работают на всех СУБД, поддерживаемых платформой 1С:Предприятие: % (процент) – последовательность, содержащая любое количество произвольных символов; [^…] (в квадратных скобках значок отрицания, за которым следует один или несколько символов) – любой одиночный символ, кроме тех, которые перечислены следом за значком отрицания. При разработке прикладных решений необходимо учитывать все ограничения, чтобы обеспечивать работу на всех СУБД, поддерживаемых платформой 1С:Предприятие (см. Необходимо экранировать все спецсимволы (_%[]^), чтобы они трактовались как часть искомого текста (а не как спецсимвол). Для экранирования необходимо: выбрать спецсимвол экранирования, например (~)'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std726'
  auto_actionable: false
- norm_id: STD_758
  section: Система стандартов 2025
  category: queries_performance
  title: Псевдонимы источников данных в запросах
  norm_text: 'Псевдонимы источников данных в запросах Область применения: управляемое приложение, мобильное приложение, обычное приложение. Псевдоним источника данных должен быть осмысленным, чтобы было понятным его назначение в данном контексте. псевдонимы следует образовывать от терминов предметной области таким образом, чтобы было понятно, как источник данных будет использоваться в запросе; псевдонимы следует образовывать путем удаления пробелов между словами. псевдонимы не должны состоять из одного символа. В ряде случаев при разработке универсальных механизмов, рассчитанных на работу с произвольными таблицами данных, или при написании универсальных запросов, когда вместо источника данных при исполнении кода подставляется имя конкретной таблицы, допустимо использование универсальных псевдонимов.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std758'
  auto_actionable: false
