- norm_id: STD_673
  section: Система стандартов 2025
  category: queries_performance
  title: Пользовательские настройки
  norm_text: 'Пользовательские настройки Область применения: управляемое приложение. Для эффективной работы пользователя с отчетом требуется определить состав быстрых и обычных пользовательских настроек. Для параметров, без указания которых запрос системы компоновки данных не выполнится или его выполнение не имеет смысла, следует в настройках взвести флажок «Запрещать незаполненные значения» и установить режим использования «Всегда». Обязательные для заполнения параметры должны заполняться наиболее вероятными значениями. Рекомендуется делать не более 5-7 быстрых настроек. В состав быстрых пользовательских настроек следует включать только частотные настройки: Параметры отчета (обязательные и необязательные). Это нужно потому, что контекстное меню отчета не позволяет пользователю "на лету" применять параметры. Должны быть добавлены в быстрые пользовательские настройки для наиболее важных группировок отчета. Если в отчете несколько элементов, например, гистограмма и список, то в быстрых настройках рекомендуется предусмотреть возможность их отключения.'
  tags:
  - advisory
  - queries
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
