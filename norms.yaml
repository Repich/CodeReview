  title: Списки с одной колонкой
  norm_text: 'Списки с одной колонкой Область применения: управляемое приложение. Не рекомендуется делать шапку. Если заголовка нет, то визуально пустой список ничем не будет отличаться от многострочного поля ввода. Это нужно учитывать, чтобы не ввести пользователя в заблуждение. Не рекомендуется горизонтальная разлиновка и чередование строк.'
