- norm_id: LIB_COMPAT_01
  section: Обеспечение совместимости библиотек
  category: metadata_design
  title: 'Номер версии библиотеки должен отражать характер изменений и совместимость'
  norm_text: 'ПП (номер подредакции) – нарушена совместимость (требуется отработать инструкцию по переходу на эту версию, иначе конфигурация будет неработоспособна), удалены устаревшие объекты метаданных; Исключением являются заранее согласованные с потребителями библиотеки случаи, такие как отработка изменений законодательства. При отработке изменений законодательства (вступающего в силу до публикации следующей версии) следует выпускать исправительные сборки с этими изменениями для всех веток, находящихся на поддержке, даже если эти изменения добавляют новые функции или нарушают совместимость. Удалять устаревшие объекты метаданных следует не чаще раза в год в версиях, запланированных к выпуску ближе к концу года, а удаляемые объекты должны существовать не менее двух лет. Недопустимо требовать от типовых решений выпуска обязательной версии для перехода чаще раза в год суммарно для всех библиотек.'
  tags:
  - metadata
  scope: разработка
  code_applicability: true
  automation_hint: mixed
  check_type: semantic
  default_severity: major
  detector_type: performance
