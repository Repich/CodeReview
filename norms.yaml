- norm_id: STD_678
  section: Система стандартов 2025
  category: data_model_registers
  title: Безопасность прикладного программного интерфейса
  norm_text: 'Безопасность прикладного программного интерфейса сервера Область применения: управляемое приложение, мобильное приложение, обычное приложение. В общем случае не рекомендуется размещать в серверных процедурах и функциях модулей форм код, обеспечивающий бизнес-логику, и который не относится к клиент-серверному взаимодействию и обработке реквизитов формы. Серверные процедуры и функции должны возвращать в форму только окончательный результат расчета. Следует избегать передачи в форму исходных или промежуточных данных, которые могут раскрывать побочную, возможно приватную информацию бизнес-процесса.'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std678'
  auto_actionable: false
- norm_id: STD_679
  section: Система стандартов 2025
  category: security_access
  title: 'Ограничение на установку признака «Вызов сервера»'
  norm_text: 'Ограничение на установку признака «Вызов сервера» у общих модулей Область применения: управляемое приложение, мобильное приложение, обычное приложение. Не следует всем общим модулям с признаком Сервер принудительно устанавливать флажок Вызов сервера. В таких общих модулях следует размещать только те процедуры и функции, которые действительно предназначены для вызова из клиентского кода и гарантируют выполнение только тех действий (и передачи только тех данных на сторону клиента), которые разрешены пользователю при его работе в программе.'
  tags:
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
