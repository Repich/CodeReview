  norm_text: 'Многоэтажные списки Область применения: управляемое приложение. Когда данные важно просматривать без прокрутки. Если в списке много колонок, например, более 10. Если для просмотра данных пользователям часто придется использовать горизонтальную полосу прокрутки. При проектировании учитывайте, что в многоэтажных списках визуальный поиск данных сложнее, чем в одноэтажных.'
