  title: 'Выбор: кнопка или гиперссылка'
  norm_text: 'Выбор: кнопка или гиперссылка Область применения: управляемое приложение. Необратимые изменения (например, очистка табличных частей) всегда должны быть оформлены кнопками. Вместо глаголов можно использовать отглагольные существительные. Кнопки следует размещать в непосредственной близости от объектов, на которые они оказывают воздействие.'
