  title: Команды, размещаемые во "Всех действиях"
  norm_text: 'Команды, размещаемые во "Всех действиях" Область применения: управляемое приложение. Рекомендуется использовать умолчание платформы. Для отдельных списков допускается индивидуальная настройка командной панели. При этом непосредственно в командной панели формы лучше располагать небольшое количество наиболее частотных команд (не более 10), а остальные размещать во «Все действия».'
