  title: Не следует анализировать текст исключений с целью интерпретации причины ошибки
  norm_text: 'Не следует анализировать текст исключений с целью интерпретации причины ошибки. Текст исключения может меняться в зависимости от локализации версий платформы и конфигурации. Следует выдавать пользователю тексты исключений «как есть». Для понятности, текст можно уточнить описанием прикладной операции, а также дополнить пояснением возможных причин, если для категории ошибки в платформе не предусмотрено стандартное пояснение или его недостаточно.'
