  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_002
  section: Производительность
  category: performance_runtime
  title: Не выполнять запросы и чтение объектной модели в цикле
  norm_text: 'Не выполняйте запросы в циклах и не заменяйте их чтением через объектную модель. Для массовых операций формируйте один запрос/пакетный запрос и обрабатывайте результат наборами данных.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 2, стр. 215; раздел 3.15 «Запросы через объектную модель...», стр. 106
  source_excerpt: «Нельзя зацикливать запросы... важно избегать выполнения запросов через объектную модель.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: critical
  detector_type: manual_review
- norm_id: EXP_003
  section: Запросы
  category: queries_performance
  title: В запросах «ДЛЯ ИЗМЕНЕНИЯ» явно указывать блокируемые таблицы
  norm_text: 'Если используется конструкция «ДЛЯ ИЗМЕНЕНИЯ» в запросе с несколькими таблицами (соединения/несколько источников), явно перечисляйте, какие таблицы должны блокироваться. Не полагайтесь на «ДЛЯ ИЗМЕНЕНИЯ» без списка, когда источников больше одного.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 3, стр. 215
  source_excerpt: '«Если ... несколько таблиц, важно указать, какие таблицы должны быть заблокированы: ДЛЯ ИЗМЕНЕНИЯ ...»'
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_004
  section: Запросы
  category: queries_performance
  title: Условия для виртуальных таблиц задавать в параметрах, а не в WHERE
  norm_text: 'При обращении к виртуальным таблицам (Остатки/Обороты/СрезПоследних и т. п.) переносите отбор в параметры виртуальной таблицы, а не оставляйте его для секции WHERE. Это повышает вероятность оптимального плана и снижает объем обрабатываемых данных.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 5, стр. 215
  source_excerpt: «Условия лучше ставить в параметрах виртуальных таблиц, а не в секции ГДЕ.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_005
  section: Запросы
  category: queries_performance
  title: Не агрегировать повторно уже агрегированные данные виртуальных таблиц
  norm_text: 'Не применяйте избыточные агрегатные функции к показателям виртуальных таблиц, которые уже возвращаются агрегированными (остатки/обороты/суммы). Если поле уже «...Остаток/Оборот», повторная СУММА/СРЕДНЕЕ и т. п. обычно не нужна.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 6, стр. 216
  source_excerpt: «Не применять избыточное агрегирование. Механизм виртуальных таблиц сам считает сумму.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_006
  section: Запросы
  category: queries_performance
  title: Условия по присоединяемым таблицам размещать в ON или во временных таблицах, а не в WHERE
  norm_text: 'При соединении таблиц размещайте условия, относящиеся к полям присоединяемой таблицы, в секции «ПО» (условии соединения) или предварительно отфильтровывайте данные во временной таблице. Не оставляйте такие условия до секции WHERE, если это не меняет логику результата.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 7, стр. 216
  source_excerpt: «...ставить в условия соединения или пользоваться временными таблицами, а не оставлять их до секции ГДЕ.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_007
  section: Запросы
  category: queries_performance
  title: Заменять подзапросы в JOIN/WHERE временными таблицами
  norm_text: 'Не используйте подзапросы в условиях соединения или в секции WHERE; вместо этого формируйте временные таблицы (пакетный запрос) и соединяйте физические выборки. Это упрощает оптимизацию и снижает риск выбора плохого плана.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правила 8–9, стр. 216; пример пакетного запроса, стр. 223
  source_excerpt: «Не использовать подзапросы... Нужно использовать временные таблицы.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_008
  section: Запросы
  category: queries_performance
  title: Не соединять виртуальные таблицы напрямую с реальными/виртуальными — использовать ВТ + индексацию
  norm_text: 'Не соединяйте виртуальные таблицы с реальными таблицами и не соединяйте виртуальные таблицы между собой. Сначала выгрузите результат виртуальной таблицы во временную таблицу, проиндексируйте ее по полям соединения, затем выполняйте соединение с основными таблицами.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 10, стр. 216; пример замены виртуальной таблицы на временную, стр. 226
  source_excerpt: «Не соединять виртуальные таблицы... сначала ... во временную таблицу, индексировать... а затем уже соединять.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_009
  section: Запросы
  category: queries_performance
  title: Избегать ИЛИ в условиях соединения (ON)
  norm_text: 'Не используйте логическое «ИЛИ» в условиях соединения (секции «ПО»). При необходимости переработайте алгоритм (например, разделите на несколько запросов/веток) так, чтобы соединения выполнялись по однозначным условиям.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 11, стр. 216
  source_excerpt: «Не рекомендуется использовать логическое ИЛИ в условиях соединения...»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: minor
  detector_type: manual_review
- norm_id: EXP_010
  section: Запросы
  category: queries_performance
  title: Избегать условий «НЕ РАВНО», особенно при сравнении ссылок
  norm_text: 'Используйте условия «НЕ РАВНО» (<>/НЕ РАВНО) осторожно, особенно при сравнении ссылочных полей. При признаках деградации производительности пересмотрите логику отбора (замена на эквивалентные условия, разбиение на запросы и т. п.).'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 12, стр. 216
  source_excerpt: «...с условием Не равно, особенно если ... сравниваются ссылки.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: minor
  detector_type: manual_review
- norm_id: EXP_011
  section: Запросы
  category: queries_performance
  title: Избегать ИЛИ в WHERE — разбивать на несколько запросов
  norm_text: 'Не используйте логическое «ИЛИ» в секции WHERE для производительных сценариев. Разбивайте запрос на несколько запросов с простыми условиями и объединяйте результаты на уровне приложения или через пакетный запрос.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 13, стр. 216
  source_excerpt: «В секции ГДЕ логическое ИЛИ использовать тоже не рекомендуется.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: minor
  detector_type: manual_review
- norm_id: EXP_012
  section: Запросы
  category: queries_performance
  title: Временные таблицы нужно индексировать по полям соединения
  norm_text: 'При создании временной таблицы в пакетном запросе обязательно задавайте индексацию по всем полям, используемым в последующих соединениях. Это снижает стоимость соединений и повышает стабильность плана выполнения.'
  source_reference: Раздел 4.20, предупреждение и пример пакетного запроса, стр. 223
  source_excerpt: «Не забудьте проиндексировать созданную временную таблицу... указать все поля, которые используются в условии соединения.»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_014
  section: Запросы
  category: queries_performance
  title: Ограничивать составные типы в запросах с помощью ВЫРАЗИТЬ(), чтобы не раздувать SQL соединениями
  norm_text: 'Если в запросе используются поля составных ссылочных типов и требуется получить их реквизиты, ограничивайте тип через ВЫРАЗИТЬ() (или аналогичный прием), чтобы сократить число формируемых SQL-соединений. Это повышает скорость и стабильность выполнения.'
  source_reference: Раздел 4.20, пример с составным типом и ВЫРАЗИТЬ(), стр. 231
  source_excerpt: «...ускорить работу запроса, ограничив количество соединений при помощи функции ВЫРАЗИТЬ().»
  tags:
  - expert-book
  scope: разработка
  code_applicability: true
  automation_hint: manual
  check_type: manual
  default_severity: major
  detector_type: manual_review
- norm_id: EXP_015
  section: Запросы
  category: code_style
