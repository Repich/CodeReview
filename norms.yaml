- norm_id: STD_411
  section: Система стандартов 2025
  category: data_model_registers
  title: Установка параметров выбора и связей параметров
  norm_text: 'Установка параметров выбора и связей параметров выбора для объектов метаданных Область применения: управляемое приложение, мобильное приложение, обычное приложение. Как правило, такие ограничения бизнес-логики как ограничения выбора, должны быть одинаковыми для всех форм, в которых редактируется тот или иной объект. Поэтому задавать параметры выбора и связи параметров выбора рекомендуется в свойствах объектов метаданных - в реквизитах справочников, документов и т.п. Требуется реализовать возможность выбора только основных сотрудников в зависимости от значения функциональной опции ВыбратьТолькоИзОсновыхСотрудников. Для этого необходимо в форме документа ПриказОПриеме реализовать дополнительный реквизит формы ВидыСотрудников, после чего для поля формы Сотрудник может быть установлена связь параметра выбора Отбор.ВидСотрудника с реквизитом формы ВидыСотрудников, при этом реквизит формы ВидыСотрудников заполняется на основании анализа функциональной опции.'
