- norm_id: STD_498
  section: Система стандартов 2025
  category: background_jobs
  title: Использование журнала регистрации
  norm_text: 'Использование журнала регистрации Область применения: управляемое приложение, обычное приложение. При администрировании эту информацию часто необходимо анализировать в различных разрезах для того, чтобы например, узнать какие события происходили в определенный момент времени, какие действия выполнял тот или иной пользователь. Рекомендуется производить запись в журнал регистрации из встроенного языка в тех случаях, когда администратору необходимо сообщить дополнительную диагностическую информацию о событиях, которые не записываются платформой 1С:Предприятие. Такая необходимость может возникнуть как при выполнении бизнес-логики, вызываемой при интерактивной работе, так и в фоновых (регламентных) заданиях. Для удобства анализа журнала регистрации одна его запись должна соответствовать одному событию, а сами записи должны содержать ряд обязательных атрибутов, в разрезе которых проводится анализ. Как правило, список типов событий в конфигурации может быть сколь угодно большим, поэтому типы событий рекомендуется группировать по функциональному признаку: «Название группы событий.Название события».'
  tags:
  - advisory
  - reg-tasks
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std498'
  auto_actionable: false
- norm_id: STD_499
  section: Система стандартов 2025
  category: integration_exchange
  title: Перехват исключений в коде
  norm_text: 'Перехват исключений в коде Область применения: управляемое приложение, мобильное приложение, обычное приложение. Не следует перехватывать исключения, кроме случаев ниже. Необработанное исключение выводится пользователю, записывается в журнал регистрации для администратора и при необходимости отправляется в сервис регистрации ошибок средствами платформы 1С:Предприятие. В ряде случаев технологический текст исключения непонятен, поэтому его нужно дополнить прикладной, понятной пользователю информацией, типовыми причинами или рекомендациями по устранению возникшей проблемы. В таком случае допустимо перехватить и пробросить исключение без потери исходного содержания с необходимым уточнением. При этом не следует открывать большие блоки Попытки-Исключение, а расставлять их локально на конкретные потенциально проблемные места, вызовы конкретных методов платформы, чтобы исключить перехват других несвязанных ошибок, например, ошибок соседнего программного кода. Для проверки вывода исключений пользователю рекомендуется запускать 1С:Предприятие без отладки и без режима технического специалиста, т.к.'
  tags:
  - advisory
  - integration
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std499'
  auto_actionable: false
- norm_id: STD_790
  section: Система стандартов 2025
  category: security_access
  title: Вызов исключений в коде
  norm_text: 'Вызов исключений в коде Область применения: управляемое приложение, мобильное приложение, обычное приложение. В общем случае исключения вызывать не требуется. При возникновении ошибок в работе кода, исключение вызывает платформа и его обрабатывает: пользователю выводится сообщение с подходящей рекомендацией; при необходимости информация отправляется в сервис регистрации ошибок средствами платформы 1С:Предприятие. Исключение платформы с категорией ошибки ОшибкаДоступаКЛокальномуФайлу, внешний вид сообщения: Запись журнала регистрации с событием Ошибка выполнения и комментарием: Ошибка при вызове метода контекста (Открыть) {Обработка.ПримерИсключения.Форма.Форма.Форма(14)}:Текст.Открыть("C:\not_exists_path\doc.txt"); Исключение платформы с категорией ошибки ПрочаяОшибка: Запись журнала регистрации с событием Ошибка выполнения и комментарием: Поле объекта не обнаружено (Организация) {Обработка.ПримерИсключения.Форма.Форма.Форма(22)}:Если ЗначениеЗаполнено(Свойства.Организация) Тогда [ОшибкаВоВремяВыполненияВстроенногоЯзыка, ОшибкаИспользованияВстроенногоЯзыка] 2.'
