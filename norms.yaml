  norm_text: 'При этом в переопределяемом модуле следует располагать только экспортные процедуры с пустой реализацией. Базовую реализацию переопределяемых процедур следует располагать в непереопределяемом коде. Такое ограничение вызвано необходимостью снизить трудоемкость последующих обновлений переопределяемых модулей в конфигурации-потребителе. ПараметрыРаботы.Вставить("ИспользоватьВнешнихПользователей", Ложь)'
