  category: performance
  title: Внеконтекстные серверные вызовы, если не нужен контекст
  norm_text: 'Контекстный вызов сервера из формы передаёт всё состояние формы и работает медленнее. Если серверная операция не использует данные формы, её следует реализовывать как &НаСервереБезКонтекста или в общем модуле.'
