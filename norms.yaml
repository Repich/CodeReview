- norm_id: STD_545
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Обращение из кода к пользовательским элементам
  norm_text: 'Обращение из кода к пользовательским элементам управления формы Область применения: управляемое приложение. Методическая рекомендация (полезный совет) При разработке логики работы формы следует иметь в виду, что если пользователь в режиме 1С:Предприятия добавляет какие-либо элементы формы (Все действия - Изменить форму), то обращение к таким элементам из встроенного языка невозможно. Например, вместо непосредственного обращения к свойствам элементов группы со страницами: ИмяТекущейСтраницы = Элементы.ГруппаСоСтраницами.ТекущаяСтраница.Имя; следует предварительно выполнять проверку на Неопределено: ТекущаяСтраница = Элементы.ГруппаСоСтраницами.ТекущаяСтраница'
  tags:
