  norm_text: 'Для хранения событий процессов предметной области: Область применения (уточнение): управляемое приложение, обычное приложение. Если требуется учет одиночных событий, адресованных некоторому исполнителю (пользователю, сотруднику, группе или роли) не требуется формирование движений по результатам события: то используется объект метаданных « Задача» 2. Если требуется регистрировать в системе возникновение и ход регулярного процесса, состоящего из последовательности действий (событий), то используется объект метаданных « Бизнес-процесс». В остальных случаях, как правило, используется объект метаданных «Документ» Более подробные критерии выбора того или иного вида объекта метаданных: Критерий / тип объекта Задача * Бизнес-процесс * (с задачами) Документ Основное предназначение Необходимо вести учет одиночных событий, адресованных некоторым исполнителям Необходимо вести учет последовательности событий, адресованных некоторым исполнителям Необходима регистрация событий во времени, генерация вторичных данных, соответствующих этим событиям Вложенность Не требуется Требуется учет процессов, вложенных в другие процессы (иерархия задач) Не требуется Объединение в журналы Не требуется Не требуе.'
