  norm_text: 'Имена процедур и функций Область применения: управляемое приложение, мобильное приложение, обычное приложение. В большинстве случаев хорошо выбранное имя процедуры в сочетании с правильно подобранными именами параметров избавляют от необходимости ее как-то дополнительно описывать.'
