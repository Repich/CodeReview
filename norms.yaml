  source_standard: '#std542'
  auto_actionable: false
- norm_id: STD_725
  section: Система стандартов 2025
  category: queries_performance
  title: Оптимизация использования оперативной памяти
  norm_text: 'Оптимизация использования оперативной памяти Область применения: управляемое приложение, мобильное приложение, обычное приложение. Не следует разрабатывать решения исходя из неограниченного объема оперативной памяти. Следует избегать формирования больших структур данных в памяти. Если объём данных, с которыми работает бизнес-логика, сам по себе ничем не ограничен, его нужно ограничивать искусственно, обрабатывая данные порциями и сохраняя результаты в базу или файлы. При потенциально неограниченных выборках данных из ИБ следует получать данные из базы порциями фиксированного размера. Недопустимо работать с большими XML документами с помощью объектов встроенного языка, предназначенных для обработки файлов целиком: текстовые документы в ТекстовыйДокумент, XML в ДокументDOM и HTML в ДокументHTML, а также создавать в памяти XDTO-пакеты размером с весь XML-файл целиком.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std725'
  auto_actionable: false
