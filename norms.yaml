  auto_actionable: false
- norm_id: STD_753
  section: Система стандартов 2025
  category: data_model_registers
  title: Оформление групп разделов с настройками и справочниками
  norm_text: 'Оформление групп разделов с настройками и справочниками Область применения: управляемое приложение. Разделы, состоящие из нескольких групп, должны быть реализованы в виде свертываемых групп. Рекомендуется формировать группы раздела таким образом, чтобы при типовом разрешении 1280х768 пикселей все группы умещались на экране. Следует сворачивать группы, по возможности избегая появления вертикальной прокрутки. Допускается оставлять первую группу раздела развернутой, если это не повлечет за собой "растягивания" формы за пределы типового разрешения экрана 1280х768 пикселей. Раздел, состоящий из одной группы, должен быть развернутым и иметь параметры "Поведение: Обычное".'
  tags:
  - advisory
  - data-model
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
