- norm_id: LOCKING_BALANCE_02
  section: Блокирующее чтение остатков в начале транзакции
  category: queries_performance
  title: 'Операция чтения остатков должна быть блокирующей, то есть необходимо запретить двум'
  norm_text: 'Операция чтения остатков должна быть блокирующей, то есть необходимо запретить двум пользователям одновременно читать один и тот же остаток за период, счет и значение измерения. Результатом будет -4 единицы остатка, что недопустимо с точки зрения прикладной логики системы. В некоторых случаях, возможно, нет необходимости в контроле остатков, поскольку записываемые движения заведомо не могут привести к получению отрицательных остатков. Для того чтобы минимизировать влияние блокирующего чтения остатков на производительность системы, необходимо: Проанализировать, какие именно остатки нуждаются в блокирующем чтении и при каких обстоятельствах. Например, контроль остатков не требуется при проведении приходного документа, поскольку он может только увеличить остатки. Так же не требуется контролировать остатки при перепроведении документа, который списывает в этот раз не больше остатков чем при первом проведении (этот контроль уже проводился). Следует всегда придерживаться одинакового порядка записи регистров (например, алфавитного).'
  tags:
  - advisory
  - queries
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: transactions
