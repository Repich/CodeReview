  category: ui_forms_behavior
  title: Ваимосвязанные поля
  norm_text: 'Ваимосвязанные поля Область применения: управляемое приложение. Пользователю необходимо визуально показать, какое из полей следует заполнить первым. Для этого поле, заполнение которого зависит от другого поля, следует оформлять недоступным до того момента, пока не будет заполнено основное поле. Например, поле «Договор» следует выделять как недоступное до того момента, пока поле «Контрагент» не будет заполнено.'
