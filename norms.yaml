  norm_text: 'Отображение единственного табличного поля в форме Область применения: обычное приложение. Обычное приложение Для единственного табличного поля в форме необходимо дополнительно размещать рамку группы с названием данных, которые содержит это табличное поле. Текст рамки группы должен иметь осмысленное, понятное содержание.'
