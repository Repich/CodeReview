  section: Ограничение на использование конструкции "ПОЛНОЕ
  category: queries_performance
  title: 'Исключение составляют случаи, когда текст исходного запроса не может быть переписан'
  norm_text: 'Исключение составляют случаи, когда текст исходного запроса не может быть переписан без использования конструкции ПОЛНОЕ ВНЕШНЕЕ СОЕДИНЕНИЕ по объективным причинам. Следует иметь в виду, что при выполнении данной конструкции на СУБД PostgreSQL она автоматически заменяется платформой 1С:Предприятие на эквивалентную, которая может быть исполнена в СУБД PostgreSQL. В таких случаях не следует "механически" заменять конструкцию ПОЛНОЕ ВНЕШНЕЕ СОЕДИНЕНИЕ только с той целью, чтобы от нее избавиться в тексте запроса. Не допускается одновременно использовать конструкцию ПОЛНОЕ СОЕДИНЕНИЕ и обращение к табличным частям из раздела ВЫБРАТЬ. Данное требование продиктовано особенностью выполнения подобных запросов на СУБД PostgreSQL и необходимостью переносимости прикладных решений на эту СУБД.'
  tags:
  - queries
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: performance
