- norm_id: STD_638
  section: Система стандартов 2025
  category: data_model_registers
  title: Работа с неактуальными (недействительными)
  norm_text: 'Работа с неактуальными (недействительными) объектами Область применения: управляемое приложение, мобильное приложение, обычное приложение. При этом удалять этот объект из базы недопустимо, чтобы не нарушать ссылочную целостность: на него должны ссылаться другие ранее созданные объекты. Например, объект типа Файл должен содержать в поле Автор ссылку на уволившегося сотрудника и после его увольнения. Для запрета выбора неактуальных объектов с помощью автоподбора и быстрого выбора в полях ввода следует выбрать один из двух подходов к реализации (2.1 или 2.2). Если запрет должен действовать во всех или в большинстве полей ввода форм системы, то он задается по умолчанию. Для тех реквизитов, где это поведение нужно изменить (например, нужно выводить всех пользователей или должно работать другое ограничение) следует явно установить свойства «Параметры выбора» и «Связи параметров выбора» с необходимыми в конкретном контексте значениями выбора: если требуется выбирать недействующих пользователей, указываем в свойстве реквизита «Параметры выбора» значение Отбор.Недействителен(Ложь), а если не требуется ограничивать выбор вообще, то оба значения - Истина и Ложь.'
