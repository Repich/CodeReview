  section: Система стандартов 2025
  category: data_model_registers
  title: Группа полей "Наименование", "Код", "Полное
  norm_text: 'Группа полей "Наименование", "Код", "Полное наименование", "Входит в группу" Область применения: управляемое приложение. Поля, содержащие Наименование объекта (одно или несколько), Код и Группу, в которую входит объект, рекомендуется объединять вместе. В качестве заголовка для Группы рекомендуется использовать понятный заголовок, например «Входит в группу». Заголовки остальных полей не следует менять без крайней необходимости, чтобы они могли соответствовать синонимам соответствующих реквизитов объектов метаданных. Поле «Код» следует за полем «Наименование» При наличии поля «Полное наименование» оно размещается под полями «Наименование» и «Код» Поле «Входит в группу» рекомендуется располагать последним Рекомендуется пропускать поле «Код» при вводе с клавиатуры.'
