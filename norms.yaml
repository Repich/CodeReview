  title: Формирование печатных форм
  norm_text: 'Формирование печатных форм Область применения: управляемое приложение. В функции печати рекомендуется предусмотреть множественную печать нескольких объектов. В этом случае по соображениям производительности (снижение нагрузки на СУБД) необходимо выполнять выборку данных в одном запросе, результаты которого затем обходятся в цикле.'
