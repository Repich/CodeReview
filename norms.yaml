- norm_id: STD_591
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Команда «Подобрать»
  norm_text: 'Команда «Подобрать» Область применения: управляемое приложение. Рекомендуется использовать название команды в форме инфинитива – «Подобрать». Если есть уверенность в том, что пользователям удобнее и эффективнее работать с помощью «Подобрать», а не через «Добавить», то команду следует расположить первой. Если нет, то второй или в другом месте. Для команды «Подобрать» используйте акселератор F8.'
