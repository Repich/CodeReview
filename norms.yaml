- norm_id: STD_655
  section: Система стандартов 2025
  category: queries_performance
  title: 'Ограничения на соединения с вложенными запросами'
  norm_text: 'Ограничения на соединения с вложенными запросами и виртуальными таблицами Область применения: управляемое приложение, мобильное приложение, обычное приложение. При написании запросов не следует использовать соединения с вложенными запросами. Следует соединять друг с другом только объекты метаданных или временные таблицы. Если запрос использует соединения с вложенными запросами, то его следует переписать с использованием временных таблиц (не важно с какой стороны соединения находится вложенный запрос), кроме случая, когда вложенный запрос сканирует мало записей. Если в запросе используется соединение с виртуальной таблицей языка запросов 1С:Предприятия (например, РегистрНакопления.Товары.Остатки) и запрос работает с неудовлетворительной производительностью, то рекомендуется вынести обращение к виртуальной таблице в отдельный запрос с сохранением результатов во временной таблице (см. Следует избегать неявных подзапросов, которые получаются при использовании вложенных соединений: ВЫБРАТЬ ...'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
