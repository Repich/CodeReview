  section: Структура программного модуля
  category: code_style
  title: Основная программа используется только для инициализации
  norm_text: 'Раздел основной программы выполняется при инициализации модуля. В нём допускаются только операторы инициализации данных, необходимые до первого вызова процедур/функций. Бизнес-логика должна быть вынесена в методы.'
