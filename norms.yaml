- norm_id: STD_585
  section: Система стандартов 2025
  category: data_model_registers
  title: Сообщения пользователю
  norm_text: 'Сообщения пользователю Область применения: управляемое приложение. Сообщения должны быть достаточно информативными и содержательными. Сообщения не должны содержать восклицательных знаков и повелительных тонов, за исключением сообщений, предупреждающих об опасных или критических действиях. Подобную терминологию допускается использовать только в сообщениях, предназначенных для администратора. Правильно Неправильно "Касса отправителя и касса получателя должны различаться" "Касса отправителя равна кассе получателя" 1.4. Сообщения, указывающие на ошибку, должны выводиться в момент возникновения ошибки. Проверку правильности заполнения этого номера нужно делать в момент его ввода в карточке, а не в момент формирования отчета. В тексте сообщений необходимо избегать двусмысленности. В текстах сообщений не следует использовать сокращения и аббревиатуры. Исключением являются только общеупотребительные и соответствующие целевой аудитории сокращения и аббревиатуры. Если текст сообщения занимает несколько строк, рекомендуется составлять его таким образом, чтобы строки оканчивались на логическую паузу или завершались знаком препинания.'
  tags:
