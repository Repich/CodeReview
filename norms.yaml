  norm_text: 'При необходимости параметры процедур, функций и методов следует переносить следующим образом: параметры выравниваются по началу первого параметра, либо предваряются стандартным отступом; Сложные логические условия в Если…ИначеЕсли…КонецЕсли следует переносить следующим образом: каждое элементарное условие нужно начинать с новой строки, если длина строки превышает ограничение в 120 символов; все условия предваряются стандартным отступом, либо выравниваются по началу первого условия, без учета логического оператора (для выравнивания выражений относительно первой строки рекомендуется использовать пробелы). Для этого необходимо выделить блок текста, который требуется отформатировать, и выбрать пункт меню Текст — Блок — Форматировать.'
