  section: Система стандартов 2025
  category: metadata_design
  title: Правила создания общих модулей
  norm_text: 'Правила создания общих модулей Область применения: управляемое приложение, мобильное приложение, обычное приложение. При разработке общих модулей следует выбирать один из четырех контекстов выполнения кода: Тип общего модуля Пример наименования Вызов сервера Сервер Внешнее соединение Клиент (обычное приложение) Клиент (управляемое приложение) 1. Для корректной работы конфигурации в режимах внешнего соединения, управляемого и обычного приложений, серверные процедуры и функции следует размещать в общих модулях с признаками: Сервер (флажок Вызов сервера снят), Клиент (обычное приложение), Внешнее соединение. Такие процедуры и функции размещаются в общих модулях с признаком: Сервер (флажок Вызов сервера установлен) Серверные общие модули для вызова с клиента называются по общим правилам именования объектов метаданных и должны именоваться с постфиксом "ВызовСервера" (англ. Исключение составляют случаи, когда клиентские процедуры и функции должны быть доступны только в режиме управляемого приложения (только в режиме обычного приложения или только в режиме внешнего соединения).'
