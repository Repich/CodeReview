  section: Система стандартов 2025
  category: data_model_registers
  title: Подсказка и проверка заполнения
  norm_text: 'Подсказка и проверка заполнения Область применения: управляемое приложение, мобильное приложение, обычное приложение. Область применения (уточнение): управляемое приложение, обычное приложение. Для реквизитов, используемых в ежедневной работе, подсказки добавлять не следует. В тексте подсказки не рекомендуется приводить инструкции и объяснять работу реквизита, вместо этого следует оптимизировать сценарии работы, с ним связанные. При этом бессмысленные подсказки, автоматические генерируемые конфигуратором при создании элементов управления (групп) на формах, нужно не забывать очищать.'
