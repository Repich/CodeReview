  norm_text: 'Поиск в коллекциях значений Область применения: управляемое приложение, мобильное приложение, обычное приложение. 1. При двух и более операциях поиска в объекте ТаблицаЗначений с большим количеством строк(*) рекомендуется: Индексировать колонки, по которым выполняется поиск; Но только те из них, которые обладают хорошей селективностью (т.е. каждому значению этой колонки должно соответствовать небольшое количество строк).'
