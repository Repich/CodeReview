  norm_text: 'Ограничение использования поля HTML документа Область применения: управляемое приложение. Не следует использовать поля с HTML-документами (свойство ВидПоля установлено в ВидПоляФормы.ПолеHTMLДокумента) в случаях, когда возможно использование элементов управления платформы 1С:Предприятие. При разработке форм следует стремиться применять только штатные элементы управления, предусмотренные в платформе. Правильно использовать для этих целей кнопки, надписи с гиперссылками или с форматированными строками.'
