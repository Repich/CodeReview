  norm_text: 'Версия платформы 1С:Предприятие для разработки Область применения: управляемое приложение, мобильное приложение, обычное приложение. При невозможности обойти ошибку на уровне прикладных решений, минимальная версия платформы может быть увеличена (при этом для прикладных решений для государственных учреждений новый релиз платформы должен быть сертифицирован в короткие сроки). В исправительных релизах библиотек не допускается увеличивать минимальную версию платформы, т.к.'
