- norm_id: STD_719
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Поля "Ответственный" и "Комментарий"
  norm_text: 'Поля "Ответственный" и "Комментарий" Область применения: управляемое приложение. Поле "Комментарий" Поле "Комментарий" может выводиться: · В виде однострочного поля в нижней части формы документа · В виде многострочного поля на отдельной вкладке формы документа Если поле "Комментарий" в типовых случаях будет большим, то допускается делать его многострочным и выносить на отдельную вкладку. В остальных случаях рекомендуется использовать однострочное поле "Комментарий". Поле "Ответственный" · Поле следует выводить в нижней части формы документа. Группа полей "Ответственный" и "Комментарий" · При одновременном наличии в форме документа поля "Ответственный" и однострочного поля "Комментарий", их следует объединять в группу. · Эту группу следует располагать в самом низу формы документа.'
