- norm_id: STD_645
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: 'Названия печатных форм учетных документов и команд'
  norm_text: 'Названия печатных форм учетных документов и команд по их выводу на печать Область применения: управляемое приложение. Стандарт следует применять к названиям печатных форм документов, а также к заголовкам команд по их выводу на печать. Название печатной формы и заголовок команды по выводу на печать рекомендуется делать одинаковым. Названия необходимо оформлять единообразно, придерживаясь следующих рекомендаций: 1. Название, по возможности, следует делать кратким Например, «Приказ о приеме (Т-1)» вместо «Приказ (распоряжение) о приеме работника на работу (Т-1)» 2. В названии можно использовать общепринятые сокращения Например, «Акт о приеме-передаче ТМЦ» 3. В название следует включать кодовое обозначение Например, «Товарная накладная (ТОРГ-12)», «Накладная на отпуск материалов (М-15)», «Личная карточка (Т-2)» Кодовое обозначение следует размещать в конце названия в круглых скобках, чтобы оно не затрудняло поиск нужной команды по первым буквам. Не допускается использовать обобщенные и обезличенные словосочетания, а также указание на кодовое обозначение Хорошо Плохо Расчетная ведомость (Т-51) Унифицированная форма (Т-51) Расчетная ведомость по форме Т-51 Расчетная ведомость (ф.'
