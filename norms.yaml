  norm_text: 'Дополнительно следует обезопасить выполнение регламентного задания, включенного через консоль или другим способом, минуя включение ФО, вставив в начало процедуры обработки регламентного задания следующий код: ОбщегоНазначения.ПриНачалеВыполненияРегламентногоЗадания(); Если НЕ ПолучитьФункциональнуюОпцию("ИспользоватьПочтовыйКлиент") Тогда ВызватьИсключение НСтр("ru = ''Регламентное задание недоступно по функциональным опциям.''"); Если в конфигурации используется подсистема «Регламентные задания» БСП и настроены зависимости регламентных заданий от ФО (как указано в п.3.1), то вместо этого достаточно вставить вызов, как показано в п.6.'
