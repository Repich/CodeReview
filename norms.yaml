  category: ui_forms_behavior
  title: 'В таком случае допустимо перехватить и пробросить исключение без потери исходного содержания'
  norm_text: 'В таком случае допустимо перехватить и пробросить исключение без потери исходного содержания с необходимым уточнением. При этом не следует открывать большие блоки Попытки-Исключение, а расставлять их локально на конкретные потенциально проблемные места, вызовы конкретных методов платформы, чтобы исключить перехват других несвязанных ошибок, например, ошибок соседнего программного кода. Для проверки вывода исключений пользователю рекомендуется запускать 1С:Предприятие без отладки и без режима технического специалиста, т.к. в зависимости от этого в платформе 1С:Предприятие внешний вид и поведение окна исключения различается.'
