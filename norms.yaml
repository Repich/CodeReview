- norm_id: LIB_COMPAT_16
  section: Обеспечение совместимости библиотек
  category: data_model_registers
  title: 'Для минимизации ситуаций, когда в конфигурациях-потребителях возникает потребность'
  norm_text: 'Для минимизации ситуаций, когда в конфигурациях-потребителях возникает потребность в прямом обращении к объектам метаданным библиотеки (реквизитам, табличным частям справочников, документов и пр.), следует предусмотреть в библиотеке программный интерфейс, посредством которого прикладной код может взаимодействовать с библиотекой. Например, вместо «прямого» запроса к библиотечному регистру из прикладного кода: Запрос = Новый Запрос; следует предусмотреть в библиотеке экспортную функцию, которая специально предназначена для использования в прикладном коде: ИмяПриложения = РаботаВМоделиСервиса.ИмяПриложения(); При этом если в текущей версии библиотеки отсутствует специализированная функция, а потребность обращаться к ее данным есть уже сейчас, то рекомендуется реализовать в прикладном коде временную функцию, которую при следующем обновлении библиотеки можно легко заменить на ее библиотечный эквивалент.'
  tags:
  - advisory
  - data-model
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: performance
- norm_id: LIB_COMPAT_17
  section: Обеспечение совместимости библиотек
  category: code_style
  title: 'Для скрытия деталей реализации библиотеки от потребителя рекомендуется размещать'
  norm_text: 'Для скрытия деталей реализации библиотеки от потребителя рекомендуется размещать программный интерфейс в обычном общем модуле вместо специализированного (ПовтИсп, ВызовСервера). В данном примере, для того чтобы избавить потребителя библиотеки от дополнительных усилий по замене вызовов «старой» функции на новую, рекомендуется сразу размещать экспортную функцию в «обычном» модуле, в его разделе «программный интерфейс». Кроме того, модули ВызовСервера должны отвечать требованиям безопасности и производительности (по минимизации данных, передаваемых с клиента на сервер и обратно). Для упрощения контроля изменений программного интерфейса в новых версиях библиотек рекомендуется воспользоваться приложенной обработкой.'
  tags:
  - advisory
  - code-style
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: performance
