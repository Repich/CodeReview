  norm_text: 'При необходимости переименовать (или удалить) экспортную функцию (процедуру) следует оставить прежнюю реализацию функции, пометив ее как устаревшую с помощью комментария вида: // Устарела: Следует использовать функцию ПересчитатьПоКурсу // … Функция ПересчитатьИзВалютыВВалюту(Сумма, ВалютаНач, ВалютаКон, ПоКурсуНач, ПоКурсуКон, ПоКратностьНач = 1, ПоКратностьКон = 1) Экспорт (англоязычный аналог "Устарела" в начале комментария - "Deprecated") и разместить новую версию функции с новым именем (в данном примере - ПересчитатьПоКурсу). При этом устаревшую функцию следует перенести в область общего модуля УстаревшиеПроцедурыИФункции (англ. В этом случае, существующий прикладной код не потребуется переписывать. По каждой устаревшей функции в сопроводительной документации к библиотеке также даются рекомендации по их замене следующего вида: Процедура ПересчитатьИзВалютыВВалюту общего модуля ОбщегоНазначения устарела, вместо нее следует использовать ПересчитатьПоКурсу.'
