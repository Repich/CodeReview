  category: metadata_design
  title: 'Недопустимо выполнять регламентные задания, если соответствующая им функциональность отключена '
  norm_text: 'Недопустимо выполнять регламентные задания, если соответствующая им функциональность отключена в программе. Для этого необходимо программно управлять признаком предопределенного регламентного задания Использование в зависимости от включенных функциональных опций (ФО). Например, имеем регламентное задание ПолучениеИОтправкаЭлектронныхПисем (с установленным флажком Использование), которое должно выполняться только в том случае, если установлена ФО ИспользоватьПочтовыйКлиент.'
