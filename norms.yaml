- norm_id: REG_TASK_START_03
  section: Запуск регламентных заданий
  category: background_jobs
  title: В тех же случаях когда регламентное задание не изменяет данные в системе, а формирует различные
  norm_text: 'В тех же случаях когда регламентное задание не изменяет данные в системе, а формирует различные отчеты или рассылки из нее, также рекомендуется предусматривать отдельное рабочее место для выполнения таких регламентных заданий. Однако если обновление выполняет неподготовленный пользователь, в особенности, в файловом режиме работы, то рекомендуется дополнительно предусмотреть следующие меры: в файловом режиме работы, при неудачной попытке установки монопольного режима для обновления данных ИБ предлагать автоматически блокировать работу регламентных заданий (перезапуск программы с ключом командной строки /AllowExecuteScheduledJobs -Off); в начале кода обработчиков регламентных заданий проверять режим работы и прерывать работу регламентного задания с помощью вызова исключения, если обновление ИБ еще не завершено. При использовании в конфигурации Библиотеки стандартных подсистем первая рекомендация реализована в подсистеме «Обновление версии ИБ», а для выполнения второй предусмотрена процедура ПриНачалеВыполненияРегламентногоЗадания общего модуля ОбщегоНазначения, вызов которой необходимо размещать в начале кода обработчиков регламентных заданий.'
  tags:
  - advisory
  - reg-tasks
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: process
