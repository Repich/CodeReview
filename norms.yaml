  category: ui_forms_behavior
  title: Использование закладок
  norm_text: 'Использование закладок Область применения: обычное приложение. Обычное приложение Запрещается делать несколько страниц у самой формы. У панелей рекомендуется делать не более 5 одновременно видимых закладок. Расположение закладок – сверху. Допускается большее количество закладок многостраничной панели и/или расположение закладок слева: для специализированных форм настроек параметров; для форм, в которых страницы панели генерируются программно.'
