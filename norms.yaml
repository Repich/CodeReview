  norm_text: 'Чтение отдельных реквизитов объекта из базы данных Область применения: управляемое приложение, мобильное приложение, обычное приложение. При чтении отдельных реквизитов объекта из базы данных следует иметь в виду, что вызов метода ПолучитьОбъект или обращение к реквизитам объекта через точку от ссылки приводит к загрузке объекта из базы целиком, вместе с его табличными частями. Поэтому для чтения значений отдельных реквизитов из базы данных следует использовать запрос. Например'
