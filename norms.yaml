- norm_id: STD_445
  section: Система стандартов 2025
  category: data_model_registers
  title: Получение метаданных объектов
  norm_text: 'Получение метаданных объектов Область применения: управляемое приложение, мобильное приложение, обычное приложение. В тех случаях, когда известен тип объекта метаданного (справочник, документ, и т.п.), то получение метаданных объекта конфигурации следует выполнять с помощью метода Метаданные этого объекта (или ссылки для объектов ссылочного типа), а не путем обращения к свойству глобального контекста Метаданные, так как второй способ существенно более медленный. В тех случаях, когда тип объекта метаданного заранее неизвестен, рекомендуется воспользоваться методом НайтиПоТипу'
