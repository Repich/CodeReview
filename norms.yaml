  norm_text: 'Если для выполнения разрешенной пользователю операции требуются заранее недоступные данные, тогда следует их получать переходом в привилегированный режим, но с гарантией предотвращения передачи этих данных на клиентскую сторону и с гарантией их использования на сервере только для выполнения запланированной операции. Например, в случае если в конфигурации есть объекты метаданных Документ.РеализацияТоваровИУслуг РегистрНакопления.Продажи РегистрНакопления.Взаиморасчеты и необходимо, чтобы проведение документа от лица кладовщика изменяло регистр продаж, но кладовщику регистр продаж оставался недоступным.'
