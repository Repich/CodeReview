- norm_id: STD_781
  section: Система стандартов 2025
  category: queries_performance
  title: Особенности сортировки в таблице значений
  norm_text: 'Особенности сортировки в таблице значений Область применения: управляемое приложение, мобильное приложение, обычное приложение. В тех случаях, когда для таблицы значений применяется сортировка по колонкам, содержащим ссылочные значения, необходимо учитывать, что при этом для каждой из этих колонок для всех строк таблицы значений системой будет выполнено обращение к информационной базе за представлением этой ссылки. Поэтому рекомендуется: В тех случаях, когда требуется сортировка по наименованию – сразу, на этапе заполнения, добавлять в таблицу дополнительные колонки с представлениями, и сортировку выполнять уже по ним. Для этого в методе Сортировать следует использовать объект СравнениеЗначений: ОбъектСравнения = Новый СравнениеЗначений'
