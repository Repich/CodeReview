  category: security
  title: Ненадёжный код выполняется только в безопасном режиме
  norm_text: 'При выполнении внешних обработок или кода, вводимого пользователями через Выполнить/Вычислить, необходимо включать безопасный режим. В безопасном режиме игнорируется привилегированный режим и запрещены COM, файловая система, сеть и другие потенциально опасные операции.'
  tags:
