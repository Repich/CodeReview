- norm_id: EXCEPTION_HANDLING_02
  section: Перехват исключений в коде
  category: messages_notifications
  title: 'В особых случаях допустима расширенная обработка исключений с диагностикой'
  norm_text: 'В таких случаях исключение не перевызывается, а обрабатывается. При этом следует: фильтровать и отправлять ошибки программного кода в сервис регистрации ошибок - см. фиксировать причину ошибки в журнале регистрации для того, чтобы системный администратор имел возможность выполнить диагностику проблемы и при необходимости передать информацию об ошибке в службу технической поддержки; записывать в журнал регистрации подробное представление исключения, а сообщение об ошибке для пользователя добавлять в текст сообщения - см. При этом не следует: использовать функцию ОписаниеОшибки вместо функции ОбработкаОшибок.ПодробноеПредставлениеОшибки, т.к. использовать функцию ОбработкаОшибок.КраткоеПредставлениеОшибки вместо функции ОбработкаОшибок.СообщениеОбОшибкеДляПользователя, так как она не возвращает уточнений, добавленных при пробросе исключения. Область применения (уточнение): управляемое приложение, обычное приложение.'
  tags:
