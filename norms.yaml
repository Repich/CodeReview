norms:
- norm_id: TEXT_ONE_OPERATOR_PER_LINE
  section: Тексты модулей
  category: code_style
  title: Один оператор в строке
  norm_text: 'Тексты модулей оформляются по принципу "один оператор в одной строке". Наличие нескольких операторов допускается только для "однотипных" операторов присваивания (например, последовательные присваивания однотипных выражений).'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: syntax_style
- norm_id: TEXT_INDENT_TABS
  section: Тексты модулей
  category: code_style
  title: Отступ — табуляция, 4 символа
  norm_text: 'Текст модуля должен быть оформлен синтаксическим отступом. Для синтаксического отступа используется табуляция, а не пробелы. Размер табуляции должен составлять четыре символа.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: syntax_style
- norm_id: TEXT_TRAILING_TABS
  section: Тексты модулей
  category: code_style
  title: Лишние табуляции после операторов
  norm_text: 'В конце строки не должно быть лишних табуляций после операторов или выражений. Убирайте табуляции и пробелы после последнего значимого символа строки.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: syntax_style
- norm_id: TEXT_EXTRA_BLANK_LINES
  section: Тексты модулей
  category: code_style
  title: Лишние пустые строки (более одной)
  norm_text: 'Запрещено использовать более одной пустой строки подряд. Между смысловыми блоками допускается одна пустая строка.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: syntax_style
- norm_id: FUNC_MAX_PARAMS_05
  section: Читаемость и поддерживаемость
  category: code_style
  title: Не более 5 параметров у процедуры/функции
  norm_text: 'Процедура или функция должна принимать не более 5 параметров. Большее количество параметров усложняет чтение и сопровождение: человеку трудно удерживать в голове более пяти сущностей. Если параметров больше, сгруппируйте их в структуру или объект.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: syntax_style
- norm_id: TEXT_LEFT_EDGE_ELEMENTS
  section: Тексты модулей
  category: code_style
  title: Что может начинаться с левой границы
  norm_text: 'С крайней левой позиции должны начинаться только: операторы Процедура/КонецПроцедуры, Функция/КонецФункции; заголовки процедур и функций; объявление переменных модуля; код вне процедур и функций; директивы компилятора (&НаКлиенте, &НаСервере и т.п.); инструкции препроцессора (#Область и т.п.).'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: syntax_style
- norm_id: TEXT_MAX_LINE_LENGTH
  section: Тексты модулей
  category: code_style
  title: Длина строки до 150 символов
  norm_text: 'При длине строки более 150 символов следует использовать переносы, чтобы повысить читаемость текста. Строки длиннее 150 символов делать не рекомендуется, за исключением случаев длинных строковых констант, которые невозможно разделить естественным образом.'
  tags:
  - advisory
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: syntax_style
- norm_id: TEXT_NO_UNUSED_PROCS
  section: Тексты модулей
  category: code_style
  title: Нет неиспользуемых процедур и функций
  norm_text: 'Программные модули не должны иметь неиспользуемых процедур и функций. В коде не должно оставаться мертвых фрагментов, до которых никогда не доходит выполнение.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: syntax_style
- norm_id: TEXT_NO_COMMENTED_CODE
  section: Тексты модулей
  category: code_style
  title: Нет закомментированного кода и служебных меток
  norm_text: 'Программные модули не должны иметь закомментированных фрагментов кода, а также фрагментов, связанных с процессом разработки (отладочный код, служебные отметки, например TODO, MRG, имена разработчиков и т.п.), оставшихся после завершения разработки.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: medium
  detector_type: syntax_style
- norm_id: COMMENT_NO_TODO_MARKERS
  section: Тексты модулей
  category: code_style
  title: Не оставлять TODO/FIXME/Уточнить в коде
  norm_text: 'Служебные комментарии вида TODO, FIXME, ?????, "Уточнить" запрещено оставлять в продуктивных модулях. Такие отметки должны сопровождаться задачей в системе управления разработкой и устраняться до поставки решения.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: syntax_style
- norm_id: COMMENT_STYLE_RU
  section: Тексты модулей
  category: code_style
  title: Стиль и язык комментариев
  norm_text: 'Комментарии должны быть достаточно понятными, чтобы служить документацией при сопровождении программы. Тексты комментариев должны составляться по правилам русского языка, в деловом стиле, быть эмоционально сдержанными и не содержать жаргонизмов.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: minor
  detector_type: comments
- norm_id: COMMENT_POSITION
  section: Тексты модулей
  category: code_style
  title: Позиционирование комментариев
  norm_text: 'Небольшие комментарии принято писать в конце строки с кодом после оператора "//". Большие комментарии следует записывать отдельными строками перед комментируемым фрагментом кода, выравнивая их по левому краю кода. Между "//" и текстом комментария должен быть пробел.'
  tags:
  - code-style
  scope: любые модули
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: comments
- norm_id: MODULE_STRUCTURE_SECTIONS
  section: Структура модуля
  category: code_style
  title: Последовательность разделов модуля
  norm_text: 'В программном модуле в общем случае должны присутствовать разделы в следующей последовательности: заголовок модуля; раздел описания переменных; экспортные процедуры и функции (интерфейс модуля); обработчики событий объекта (формы); служебные процедуры и функции; раздел инициализации.'
  tags:
  - code-style
  scope: общие модули, модули объектов, модули форм
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: module_structure
- norm_id: MODULE_STRUCTURE_REGIONS
  section: Структура модуля
  category: ui_forms_behavior
  title: Разделы оформляются областями
  norm_text: 'Разделы и логические части модуля рекомендуется оформлять с помощью областей (#Область … #КонецОбласти). Имена областей должны соответствовать правилам именования и отражать назначение содержащегося в них кода.'
  tags:
  - advisory
  - forms
  - ui
  scope: модули с областями
  code_applicability: true
  automation_hint: mixed
  check_type: static
  default_severity: minor
  detector_type: module_structure
- norm_id: TIME_SUPPORT_TIMEZONES
  section: Работа в разных часовых поясах
  category: ui_forms_behavior
  title: Поддержка разных часовых поясов
  norm_text: 'Конфигурации должны быть рассчитаны на работу в условиях, когда часовой пояс на серверном компьютере не совпадает с реальным часовым поясом пользователей информационной базы.'
  tags:
  - forms
  - ui
  scope: серверный код
  code_applicability: true
  automation_hint: mixed
  check_type: semantic
  default_severity: medium
  detector_type: timezones
- norm_id: TIME_USE_SESSION_TIME
  section: Работа в разных часовых поясах
  category: code_style
  title: На сервере использовать ТекущаяДатаСеанса
  norm_text: 'Во всех серверных процедурах и функциях вместо функции ТекущаяДата, которая возвращает дату и время серверного компьютера, следует использовать функцию ТекущаяДатаСеанса, которая приводит время сервера к часовому поясу пользовательского сеанса.'
  tags:
  - code-style
  scope: серверный код
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: major
  detector_type: timezones
- norm_id: TIME_USE_UNIVERSAL_TIME
  section: Работа в разных часовых поясах
  category: code_style
  title: Использование универсального времени
  norm_text: 'Когда требуется универсальная отметка времени, не зависящая от часового пояса пользователя и сервера, следует использовать функцию УниверсальноеВремя.'
  tags:
  - code-style
  scope: серверный код
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: timezones
- norm_id: SESSION_PARAMS_PURPOSE
  section: Использование параметров сеанса
  category: devops_install
  title: Назначение параметров сеанса
  norm_text: 'Параметры сеанса предназначены для хранения значений, актуальных только в течение сеанса работы пользователя. Инициализация параметров сеанса выполняется в модуле сеанса, как правило в обработчике УстановкаПараметровСеанса.'
  tags:
  - devops
  - process-only
  scope: любой тип приложения
  code_applicability: false
  automation_hint: process
  check_type: semantic
  default_severity: medium
  detector_type: parameters
- norm_id: SESSION_PARAMS_ON_DEMAND
  section: Использование параметров сеанса
  category: devops_install
  title: Установка параметров сеанса по требованию
  norm_text: 'Параметры сеанса рекомендуется устанавливать по требованию — при первом обращении к параметру, который еще не установлен, а не инициализировать все параметры заранее без необходимости.'
  tags:
  - advisory
  - devops
  - process-only
  scope: любой тип приложения
  code_applicability: false
  automation_hint: process
  check_type: manual
  default_severity: minor
  detector_type: parameters
- norm_id: SESSION_PARAMS_NOT_FOR_CLIENT_LOGIC
  section: Использование параметров сеанса
  category: ui_forms_behavior
  title: Не применять параметры сеанса для чисто клиентской логики
  norm_text: 'Не рекомендуется использовать параметры сеанса для реализации исключительно клиентской логики, такой как управление видимостью элементов форм. Это приводит к лишним обращениям к серверу и ухудшает производительность.'
  tags:
  - advisory
  - forms
  - ui
  scope: управляемое и обычное приложение
  code_applicability: true
  automation_hint: mixed
  check_type: semantic
  default_severity: medium
  detector_type: parameters
- norm_id: SESSION_PARAMS_NOT_CACHE
  section: Использование параметров сеанса
  category: devops_install
  title: Не использовать параметры сеанса как кеш
  norm_text: 'Не рекомендуется использовать параметры сеанса в качестве кеша для результатов серверных вычислений. Для кеширования следует применять отдельные механизмы (общие модули, структуры данных) с явным управлением временем жизни и обновлением данных.'
  tags:
  - advisory
  - devops
  - process-only
  scope: серверный код
  code_applicability: false
  automation_hint: process
  check_type: semantic
  default_severity: medium
  detector_type: parameters
- norm_id: FUNCOPT_PURPOSE
  section: Функциональные опции
  category: metadata_design
  title: Назначение функциональных опций
  norm_text: 'Функциональные опции используются для управления необязательной функциональностью конфигурации в целом, а не для управления видимостью отдельных элементов одной формы.'
  tags:
  - metadata
  scope: управляемое и обычное приложение
  code_applicability: true
  automation_hint: mixed
  check_type: semantic
  default_severity: medium
  detector_type: func_options
- norm_id: FUNCOPT_WITH_PARAMS_DEFAULT_OFF
  section: Функциональные опции
  category: metadata_design
  title: Опции с параметрами по умолчанию выключены
  norm_text: 'Для функциональных опций с параметрами, если в справочнике функциональных опций отсутствует запись по конкретному значению параметра, считается, что функциональная опция для этого параметра выключена.'
  tags:
  - metadata
  scope: конфигурации с функциональными опциями
  code_applicability: true
  automation_hint: mixed
  check_type: static
  default_severity: minor
  detector_type: func_options
- norm_id: FUNCOPT_TOO_MANY_PARAMS
  section: Функциональные опции
  category: metadata_design
  title: Избыточное количество параметров опций
  norm_text: 'Количество параметров функциональных опций не должно быть чрезмерным. Не следует создавать несколько параметров опций с одинаковой смысловой нагрузкой или усложнять модель управления функциональностью без необходимости.'
  tags:
  - metadata
  scope: конфигурация в целом
  code_applicability: true
  automation_hint: mixed
  check_type: static
  default_severity: medium
  detector_type: func_options
- norm_id: MSG_USE_MESSAGEOBJECT
  section: Сообщения пользователю
  category: messages_notifications
  title: Использовать объект СообщениеПользователю
  norm_text: 'Для вывода сообщений пользователю следует использовать объект СообщениеПользователю. Это обеспечивает единообразие оформления и возможность централизованного управления выводом сообщений.'
  tags:
  - messages
  scope: любые модули
  code_applicability: true
  automation_hint: mixed
  check_type: static
  default_severity: medium
  detector_type: messages
- norm_id: MSG_NOT_SOOBSHIT
  section: Сообщения пользователю
  category: messages_notifications
  title: Не использовать метод Сообщить
  norm_text: 'Метод Сообщить применять не следует. Вместо него рекомендуется использовать объект СообщениеПользователю или стандартные обертки библиотек (например, ОбщегоНазначенияКлиент.СообщитьПользователю).'
  tags:
  - advisory
  - messages
  scope: любые модули
  code_applicability: true
  automation_hint: mixed
  check_type: static
  default_severity: major
  detector_type: messages
- norm_id: MSG_TEXT_STYLE
  section: Сообщения пользователю
  category: messages_notifications
  title: Понятные и информативные сообщения
  norm_text: 'Тексты сообщений пользователю должны быть понятными и информативными, объяснять, что произошло и что может сделать пользователь, а не содержать только внутренние формулировки или тексты исключений.'
  tags:
  - messages
  scope: любые модули
  code_applicability: true
  automation_hint: mixed
  check_type: semantic
  default_severity: medium
  detector_type: messages
- norm_id: QUERY_KEYWORDS_UPPER
  section: Оформление текстов запросов
  category: queries_performance
  title: Ключевые слова языка запросов заглавными
  norm_text: 'Все ключевые слова языка запросов следует писать прописными (заглавными) буквами, что повышает читаемость текста запроса и облегчает его анализ.'
  tags:
  - queries
  scope: все тексты запросов
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: queries
- norm_id: QUERY_EXPLICIT_ALIASES
  section: Оформление текстов запросов
  category: queries_performance
  title: Явные псевдонимы полей
  norm_text: 'Рекомендуется явно задавать псевдонимы полям в запросах с помощью оператора КАК, особенно при сложных выражениях и вложенных конструкциях, чтобы избежать неочевидных автоматически сформированных имен.'
  tags:
  - advisory
  - queries
  scope: все тексты запросов
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: queries
- norm_id: QUERY_MULTILINE
  section: Оформление текстов запросов
  category: queries_performance
  title: Запрос не должен быть одной строкой
  norm_text: 'Текст запроса не должен быть записан одной строкой. Необходимо структурировать запрос с использованием переводов строк и отступов, чтобы обеспечить читаемость и удобство сопровождения.'
  tags:
  - queries
  scope: все тексты запросов
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: minor
  detector_type: queries
- norm_id: QUERY_NO_COMMENT_PATCHING
  section: Оформление текстов запросов
  category: queries_performance
  title: Не модифицировать текст запросов через комментарии
  norm_text: 'Недопустимо использовать комментарии для модификации текста запроса, например оставлять закомментированные фрагменты в тексте запроса и затем менять их на выполняемые с помощью СтрЗаменить. Текст запроса должен формироваться явно.'
  tags:
  - queries
  scope: все тексты запросов
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: major
  detector_type: queries
- norm_id: TRX_PAIR_BEGIN_END
  section: Транзакции
  category: transactions_locks
  title: Парность НачатьТранзакцию и Зафиксировать/Отменить
  norm_text: 'Все вызовы НачатьТранзакцию с одной стороны и ЗафиксироватьТранзакцию или ОтменитьТранзакцию с другой стороны должны быть парными. Нельзя начинать транзакцию без последующей фиксации или отмены.'
  tags:
  - transactions
  scope: все приложения
  code_applicability: true
  automation_hint: code
  check_type: static
  default_severity: critical
  detector_type: transactions
- norm_id: TRX_SAME_METHOD
  section: Транзакции
  category: transactions_locks
  title: Начало и конец транзакции в одном методе
  norm_text: 'Начало транзакции и ее фиксация или отмена должны происходить в контексте одного метода. Не допускается, чтобы НачатьТранзакцию вызывалась в одном методе, а ЗафиксироватьТранзакцию или ОтменитьТранзакцию — в другом.'
  tags:
  - transactions
  scope: все приложения
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: transactions
- norm_id: TRX_WITH_TRY
  section: Транзакции
  category: transactions_locks
  title: Транзакция в блоке Попытка/Исключение
