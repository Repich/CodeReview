- norm_id: STD_436
  section: Система стандартов 2025
  category: data_model_registers
  title: Многократное выполнение однотипных запросов
  norm_text: 'Многократное выполнение однотипных запросов Область применения: управляемое приложение, мобильное приложение, обычное приложение. Рекомендуется получать все необходимые однотипные данные одним запросом, вместо выполнения серии запросов. Допускается разделение запроса на серию запросов в следующих случаях: заметное усложнение разработки запроса для выбора сразу всех однотипных данных; Запросы к разным таблицам также рекомендуется объединять в один с помощью ОБЪЕДИНИТЬ ВСЕ или пакета запросов.'
  tags:
