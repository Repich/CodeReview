  title: Шрифт и цвет
  norm_text: 'Шрифт и цвет Область применения: управляемое приложение. · Не рекомендуется использование абсолютных шрифтов и цветов. Вместо этого следует создать соответствующие элементы стиля. · Не рекомендуется использовать подчеркивание для элементов формы, не являющихся гиперссылкой. · Не рекомендуется использование прописных букв в текстах (кроме первой буквы предложений).'
