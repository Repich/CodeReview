  title: 'Использование РеквизитФормыВЗначение'
  norm_text: 'Использование РеквизитФормыВЗначение и ДанныеФормыВЗначение Область применения: управляемое приложение, мобильное приложение, обычное приложение. Методическая рекомендация (полезный совет) В большинстве случаев, в модулях форм следует использовать метод формы РеквизитФормыВЗначение вместо метода ДанныеФормыВЗначение. В ДанныеФормыВЗначение необходимо дополнительно передавать тип значения: ТаблицаПодписей = ДанныеФормыВЗначение(ТаблицаПодписей, Тип("ТаблицаЗначений")); а для РеквизитФормыВЗначение это не обязательно, а в практическом плане - избыточно: ТаблицаПодписей = РеквизитФормыВЗначение("ТаблицаПодписей")'
