- norm_id: STD_792
  section: Система стандартов 2025
  category: queries_performance
  title: Многократная запись регистров сведений и накопления
  norm_text: 'Многократная запись регистров сведений и накопления Область применения: управляемое приложение, мобильное приложение, обычное приложение. Не рекомендуется записывать наборы записей регистров сведений и накоплений в цикле по одной или нескольким записям. В большинстве случаев следует ориентироваться на порционную запись наборов из 1000 записей. Рекомендуется избегать перезаписи большого набора, в котором меняется не более 30% записей. Вместо этого следует записывать только изменения. Для оптимальной записи регистров следует применять режимы замещения в сочетании с вычислением измененных записей. В частном случае, когда нужно только добавить записи в пустой регистр, достаточно в методе Записать набора записей задать параметру РежимЗамещения значение Ложь (добавление). В остальных случаях, рекомендуется использовать режимы замещения Слияние, Удаление (начиная с версии платформы 1С:Предприятие 8.3.26) и Обновление (начиная с версии платформы 1С:Предприятие 8.3.27). Состав добавляемых, обновляемых и удаляемых записей известен и требуется применить эти изменения к базе данных.'
  tags:
  - advisory
  - queries
