  category: ui_forms_behavior
  title: Размеры
  norm_text: 'Размеры Область применения: управляемое приложение. Установку размера формы и/или ее элементов рекомендуется выполнять только в особенных случаях, например, для декораций. В остальных случаях рекомендуется использовать умолчание платформы. Для форм с панелями со страницами рекомендуется подбирать ширину так, чтобы одновременно были видны все закладки страниц. Ширину колонок форм рекомендуется изменять только в тех случаях, если колонки содержат простой набор хорошо масштабируемых полей и групп, например, два поля списка в левой и правой колонке. Для форм объектов рекомендуется использовать авто ширину колонок (установлено по умолчанию).'
