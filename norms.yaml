- norm_id: STD_592
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Команда «Отмена»
  norm_text: 'Команда «Отмена» Область применения: управляемое приложение. Команда «Отмена» должна использоваться для реальной отмены установленных настроек и приводить к закрытию формы. «Отмена» не должна быть кнопкой по умолчанию. Если никакие действия кроме закрытия формы недоступны, кнопкой по умолчанию должна быть кнопка «Закрыть».'
