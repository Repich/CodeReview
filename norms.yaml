- norm_id: FORMAT_RULES_04
  section: 'Форматирование даты, числа, Булево: требования по локализации'
  category: code_style
  title: 'Не переопределяйте системную локализацию отображения данных без необходимости'
  norm_text: 'Не следует переопределять поведение отображения локализации данных по умолчанию – формат отображения операционной системы. При использовании функции Формат следует избегать использовать параметр «L=». При задании формата в полях ввода в формах и полях отчетов на базе СКД также рекомендуется локальный формат даты. Использовать другие форматы допустимо, если по сути решаемой задачи локальный формат не подходит – тогда форматная строка будет переводиться при переводе конфигурации. При переопределении стандартных представлений полей в отчетах на базе СКД следует придерживаться тех же правил, что и в коде модулей. В случае, когда требуется передача значения в машиночитаемом виде, вне зависимости от информационной системы и настроек локализации, применяемых в ней, вместо локализации значения следует выполнить сериализацию. Локализацию дат нужно использовать всегда, когда это возможно. В тех случаях, когда это технически нецелесообразно, допускается отказываться от локализации. В общем случае для сериализации рекомендуется использовать метод XMLСтрока.'
  tags:
  - advisory
  - code-style
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: ui
- norm_id: FORMAT_RULES_05
  section: 'Форматирование даты, числа, Булево: требования по локализации'
  category: code_style
  title: Сериализация дат При разработке собственных форматов передачи данных между различными системами
  norm_text: 'Сериализация дат При разработке собственных форматов передачи данных между различными системами рекомендуется сериализовать дату в формате ISO: "ГГГГ-ММ-ДДTЧЧ:ММ:ССZ", например "2009-02-15T00:00:00Z" (соответствует типу dateTime схемы XML см. http://www.w3.org/TR/xmlschema-2/#dateTime).'
