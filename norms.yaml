  section: Система стандартов 2025
  category: ui_forms_behavior
  title: 'Выбор: блокирующая форма или независимая'
  norm_text: 'Выбор: блокирующая форма или независимая Область применения: управляемое приложение. Блокирующая Работа с формой выполняется «за один заход», без необходимости переключения в другие формы. На форме небольшое количество элементов, например, менее 5. Независимая Если при работе с формой может потребоваться открытие других самостоятельных форм. Если пользователям может потребоваться сравнение двух и более объектов. На форме много элементов, больше 9.'
