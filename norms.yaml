- norm_id: STD_648
  section: Система стандартов 2025
  category: data_model_registers
  title: Ответственное чтение данных
  norm_text: 'Ответственное чтение данных Область применения: управляемое приложение, мобильное приложение, обычное приложение. Ответственным следует считать любое чтение данных, на основе результатов которого производятся изменения в информационной базе или принимаются решения. Область применения (уточнение): управляемое приложение, обычное приложение. Если чтение данных из информационной базы должно быть ответственным, следует производить такое чтение в транзакции с предварительной установкой управляемых блокировок. Например, ответственное чтение данных требуется в следующих случаях: Чтение данных при проведении, для последующего формирования движений; Выполнение групповой обработки объектов, при реструктуризации данных в обработчиках отложенного и оперативного обновления ИБ (*) * Примечание: перед модификацией ссылочных объектов, обычно, следует устанавливать на них пессимистичные объектные блокировки. Исключение // 5. ВызватьИсключение; В некоторых случаях, ответственное чтение не требуется в силу решаемой прикладной задачи, 1.3.'
