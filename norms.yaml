- norm_id: STD_581
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Быстрые отборы в списках
  norm_text: 'Быстрые отборы в списках Область применения: управляемое приложение. Когда использовать 1.1 Если список используется часто и просматриваются типовые поисковые «запросы». Как оформлять быстрые отборы 2.1 Поля ввода или флажки рекомендуется размещать перед списком сверху, слева или справа, в зависимости от состава отборов и их смысла. Допускается размещать внизу списка, если отбор полезный, но не частотный. Быстрые отборы сверху следует располагать над командной панелью списка. 2.4 Быстрые отборы следует оформлять без кнопки открытия Хорошо Плохо 2.5 Если поля быстрых отборов по умолчанию сильно растягиваются, то для них следует устанавливать фиксированные размеры (при условии, что хорошие размеры можно заведомо подобрать)'
