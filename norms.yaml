- norm_id: STD_641
  section: Система стандартов 2025
  category: queries_performance
  title: Структуры и таблицы значений в качестве
  norm_text: 'Структуры и таблицы значений в качестве параметров процедур и функций Область применения: управляемое приложение, мобильное приложение, обычное приложение. Основная статья: Параметры процедур и функций Для процедур и функций (далее по тексту: функций) с параметрами типа Структура, ТаблицаЗначений, а также ДеревоЗначений (далее по тексту рекомендации для таблицы значений также относятся к дереву значений) рекомендуется придерживаться следующего подхода к разработке. 1.1 Помимо функции, которая собственно реализует прикладную функциональность (далее по тексту: вызываемая функция), необходимо определить функцию-конструктор параметров возвращающую: • структуру-заготовку со свойствами, • или пустую таблицу значений (дерево значений) с типизированными колонками, которую вызывающий код должен проинициализировать конкретными значениями и передать в вызываемую функцию. При этом параметры со значениями по умолчанию должны быть явно проинициализированы в этой структуре. Для создания параметра с типом ТаблицаЗначений допускается не создавать отдельную функцию-конструктор, если таблица значений является результатом каких-либо расчетов в прикладном коде.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std641'
  auto_actionable: false
- norm_id: STD_454
  section: Система стандартов 2025
  category: data_model_registers
  title: Правила образования имен переменных
  norm_text: 'Правила образования имен переменных Область применения: управляемое приложение, мобильное приложение, обычное приложение. Имена переменных следует образовывать от терминов предметной области таким образом, чтобы из имени переменной было понятно ее назначение. Имена следует образовывать путем удаления пробелов между словами. Имена переменных не должны состоять из одного символа. Использование односимвольных имен переменных допускается только для счетчиков циклов. Переменные, отражающие состояние некоторого флага, следует называть так, как пишется истинное значение этого флага.'
  tags:
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std454'
  auto_actionable: false
- norm_id: STD_686
  section: Система стандартов 2025
  category: data_model_registers
  title: Работа с параметром «Отказ» в обработчиках событий
  norm_text: 'Работа с параметром «Отказ» в обработчиках событий Область применения: управляемое приложение, мобильное приложение, обычное приложение. В обработчиках событий модулей объектов, наборов записей, форм и т.п., содержащих параметр Отказ (ПриЗаписи, ОбработкаПроверкиЗаполнения, ТоварыПередНачаломДобавления и т.п.), не следует присваивать этому параметру значение Ложь. Неприемлемо в событиях объекта ПриЗаписи, ПередЗаписью, ПередУдалением, ОбработкаПроведения, ОбработкаПроверкиЗаполнения и т.п устанавливать параметр Отказ в значение Истина без информирования пользователя о причинах: 1.1 и 1.3 стандарта Информирование пользователя корректно уведомить пользователя о причинах отказа с помощью сообщения или вызова исключения.'
  tags:
