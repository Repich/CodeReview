  category: data_model_registers
  title: Начальные действия при работе конфигурации
  norm_text: 'Начальные действия при работе конфигурации Область применения: управляемое приложение, мобильное приложение, обычное приложение. В конфигурации должен быть предусмотрен механизм, автоматически определяющий как факт первого запуска конфигурации и выполняющий первоначальное заполнение информационной базы минимально необходимыми данными, так и факт первого запуска нового релиза и выполняющий необходимые изменения в базе (обновление данных ИБ). При использовании в конфигурации Библиотеки стандартных подсистем такую возможность следует предоставлять средствами подсистемы «Обновление версии ИБ». Первоначальное заполнение ИБ может быть разделено на обязательное, без чего конфигурация не будет работать, и необязательное, которое облегчает начало эксплуатации продукта, но не является строго обязательным. По результатам обработки информационной базы при первом запуске конфигурации или при первом запуске нового релиза конфигурации рекомендуется выводить администратору системы описание конфигурации или описание изменений в этой версии конфигурации.'
