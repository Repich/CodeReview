- norm_id: IB_UPDATE_06
  section: Обработчики обновления информационной базы
  category: code_style
  title: 'К процедуре-обработчику предъявляются следующие требования: Обработчик не должен'
  norm_text: 'К процедуре-обработчику предъявляются следующие требования: Обработчик не должен содержать логики по интерактивному взаимодействию с пользователем. Алгоритм обработчика должен быть построен так, чтобы не прерывать, не зацикливать обработку данных, не оставлять необработанные данные и не требовать каких-либо дополнительных действий от пользователя для продолжения обработки данных. Любое невыполнение обработчика следует рассматривать как логическую ошибку и перепроектировать логику обработчика. Например, если номер документа, который создается в обработчике, оказывается неуникальным, то присваивать новый незанятый номер, а не завершать работу обработчика вызовом исключения. В параллельных отложенных обработчиках не следует вызывать исключение, которое приведет к остановке всей процедуры обновления. В остальных видах обработчиков допустимо вызывать исключение только в случае критической ошибки при обновлении, когда исчерпаны все другие возможности обхода проблемы. Обработчик должен быть рассчитан на неоднократное выполнение.'
  tags:
  - code-style
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: process
