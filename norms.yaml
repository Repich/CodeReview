  norm_text: 'Пользовательские представления объектов Область применения: управляемое приложение. Если для объекта метаданных определены свойства пользовательского представления, они заполняются следующим образом. 1. Синоним объекта должен быть определен так, чтобы осмысленно, лаконично описывать объект. Заполняется обязательно.'
