- norm_id: STD_490
  section: Система стандартов 2025
  category: data_model_registers
  title: Блокировка данных объекта для редактирования из кода
  norm_text: 'Блокировка данных объекта для редактирования из кода Область применения: управляемое приложение, обычное приложение. Прежде чем изменять существующий объект информационной базы из кода на встроенном языке, следует предварительно его заблокировать (установить «блокировку данных для редактирования» или «объектную блокировку»), тем самым, во-первых, убедиться, не заблокирован ли он другими объектами, во-вторых, попытаться предотвратить его изменение другими пользовательскими сеансами (или другими экземплярами объекта в этом же сеансе).'
