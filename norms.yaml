  category: ui_forms_behavior
  title: Длительные операции на клиенте
  norm_text: 'Длительные операции на клиенте Область применения: управляемое приложение. Следует избегать длительного выполнения клиентского кода, помимо длительных вызовов серверного кода из клиентского (см. Не следует выполнять потенциально длительные операции (такие как: обращение к сетевым ресурсам, «тяжелые» алгоритмы обработки данных на клиенте) в обработчиках ожидания и обработчиках событий элементов форм.'
