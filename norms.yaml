- norm_id: STD_470
  section: Система стандартов 2025
  category: data_model_registers
  title: Использование функциональных опций
  norm_text: 'Использование функциональных опций Область применения: управляемое приложение, мобильное приложение, обычное приложение. В случае если некоторая функциональность конфигурации является необязательной для использования, то для управления доступностью такой функциональности на стадии внедрения следует применять функциональные опции. Для хранения значений функциональных опций в информационной базе необходимо завести в конфигурации соответствующие данные (например, константы). Допустим, в конфигурации есть функциональность версионирования данных информационной базы, которая является необязательной. Для управления доступностью этой функциональности необходимо: создать функциональную опцию ИспользоватьВерсионированиеОбъектов, которая определяет использование прикладного механизма конфигурации для текущей информационной базы создать константу ИспользоватьВерсионированиеОбъектов типа Булево для хранения значения этой функциональной опции в свойстве Хранение функциональной опции указать константу ИспользоватьВерсионированиеОбъектов.'
