- norm_id: STD_671
  section: Система стандартов 2025
  category: metadata_design
  title: Варианты отчетов
  norm_text: 'Варианты отчетов Область применения: управляемое приложение. Варианты отчетов следует создавать в случае, когда есть необходимость анализировать один и тот же вид (источник) данных в различных: группировках сортировках отборах с разными наборами показателей В этом случае создается отчет с несколькими вариантами отчетов. Если вариант отчета требуется включить в состав различных подсистем одного и того же раздела, то вместо одного варианта отчета следует создать свои варианты отчетов для каждой подсистемы с различными параметрами и отборами. При использовании в конфигурации Библиотеки стандартных подсистем следует обязательно заполнять описание варианта отчета.'
  tags:
  - metadata
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
