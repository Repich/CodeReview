  default_severity: medium
  detector_type: integration
- norm_id: EXCHANGE_PLANS_02
  section: Разработка планов обмена с отборами
  category: data_model_registers
  title: 'Кроме того, при проектировании логики регистрации необходимо учитывать следующие'
  norm_text: 'Кроме того, при проектировании логики регистрации необходимо учитывать следующие особенности: данные из сообщения обмена загружаются в произвольном порядке, поэтому на момент выполнения логики регистрации необходимые ей данные могут быть еще не загружены; При разработке планов обмена для синхронизации с другими программами (не РИБ, по правилам конвертации) с помощью подсистемы «Обмен данными» Библиотеки стандартных подсистем первые два пункта не требуется учитывать в правилах регистрации для ссылочных типов объектов (СправочникСсылка, ДокументСсыслка и пр.), поскольку регистрация ссылочных объектов выполняется отложенно отдельной операцией после загрузки всех данных из сообщения обмена. С учетом перечисленных особенностей рекомендуется придерживаться следующих правил.'
  tags:
  - advisory
  - data-model
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: integration
- norm_id: EXCHANGE_PLANS_03
  section: Разработка планов обмена с отборами
  category: data_model_registers
  title: Обеспечить самодостаточность данных, участвующих в обмене
  norm_text: 'Обеспечить самодостаточность данных, участвующих в обмене. Таблицы данных (справочники, документы, регистры и пр.), участвующие в обмене, должны содержать все необходимые данные для выполнения логики регистрации. Логика регистрации не должна обращаться к полям связанных таблиц, она должна оперировать только данными основной таблицы, регистрацию изменений данных которой необходимо выполнить.'
  tags:
  - data-model
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: integration
- norm_id: EXCHANGE_PLANS_04
  section: Разработка планов обмена с отборами
  category: data_model_registers
  title: Исключить из обмена вторичные данные
  norm_text: 'Исключить из обмена вторичные данные. Данные, которые могут быть вычислены независимо в каждой из информационных баз, участвующих в обмене, следует исключить из состава плана обмена. Тем самым, более не требуется логика регистрации этих данных, которая могла обращаться к полям связанных таблиц, участвующих в обмене.'
  tags:
  - data-model
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: integration
- norm_id: EXCHANGE_PLANS_05
  section: Разработка планов обмена с отборами
  category: data_model_registers
  title: Регистрировать изменения связанных данных
  norm_text: 'Регистрировать изменения связанных данных. Если в обмене участвуют несколько логически взаимосвязанных таблиц данных, то логика регистрации должна регистрировать к выгрузке данные всех взаимосвязанных таблиц вне зависимости от того, для какой таблицы данных выполняется логика регистрации. При этом логика регистрации не должна аварийно прерываться в случае, когда необходимые для логики регистрации данные отсутствуют.'
  tags:
  - data-model
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: integration
