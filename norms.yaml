  title: 'Отсутствие предложения УПОРЯДОЧИТЬ ПО оправдано только в тех случаях, когда алгоритм обработки '
  norm_text: 'Отсутствие предложения УПОРЯДОЧИТЬ ПО оправдано только в тех случаях, когда алгоритм обработки результатов запроса не рассчитывает на определенный порядок записей результат обработки выполненного запроса не показывается пользователю результат запроса - заведомо одна запись В таких случаях рекомендуется не добавлять предложение УПОРЯДОЧИТЬ ПО в текст запроса, так как это приводит к дополнительным затратам времени при выполнении запроса. Если в запросе используется конструкция РАЗЛИЧНЫЕ, упорядочивание следует выполнять только по полям, включенным в выборку (в секции ВЫБРАТЬ). Использование конструкции ПЕРВЫЕ совместно с конструкцией АВТОУПОРЯДОЧИВАНИЕ запрещено. В остальных случаях конструкцию АВТОУПОРЯДОЧИВАНИЕ также не рекомендуется использовать, так как разработчик не контролирует, какие именно поля будут использованы для упорядочивания. Применение такой конструкции оправдано только в тех случаях, когда получаемый порядок записей не важен, но при этом он должен быть одинаковым в не зависимости от применяемой СУБД.'
  tags:
  - advisory
