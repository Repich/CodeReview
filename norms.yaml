- norm_id: STD_642
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Длительные операции на сервере
  norm_text: 'Длительные операции на сервере Область применения: управляемое приложение. При разработке конфигураций следует избегать длительных вызовов из клиентского кода в серверный. Все длительные серверные вызовы, которые могут выполняться более 8 секунд в обычных сценариях работы пользователя, следует выполнять асинхронно, с помощью фонового задания.'
