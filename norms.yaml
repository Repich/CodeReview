- norm_id: STD_616
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Формы списков
  norm_text: 'Формы списков Область применения: управляемое приложение. Состав и порядок колонок должен определяется прогнозируемым сценарием заполнения. При этом нужно учитывать, что в многоэтажных списках труднее воспринимать информацию при беглом чтении. Эту рекомендацию не следует применять для табличных частей. Рекомендуется по умолчанию делать активной колонкой ту, поиск по которой будет наиболее вероятным. Не рекомендуется использовать режим выделения строки – строка.'
