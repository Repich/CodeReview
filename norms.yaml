  category: code_style
  title: 'Асинхронное формирование отчета требуется только для тех отчетов, которые разработаны'
  norm_text: 'Асинхронное формирование отчета требуется только для тех отчетов, которые разработаны без использования СКД или с использованием СКД, но с переопределенной процедурой формирования отчета (переопределен обработчик кнопки «Сформировать» или в обработчике модуля отчета ПриКомпоновкеРезультата устанавливается СтандартнаяОбработка = Ложь). Поведение таких отчетов должно быть максимально похожим на поведение отчетов на базе СКД, а именно: форму отчета не следует блокировать на время его формирования'
