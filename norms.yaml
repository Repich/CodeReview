- norm_id: STD_763
  section: Система стандартов 2025
  category: localization
  title: 'Форматирование даты, числа, Булево: требования'
  norm_text: 'Форматирование даты, числа, Булево: требования по локализации Область применения: управляемое приложение, мобильное приложение, обычное приложение. При использовании функции Формат в некоторых случаях следует использовать функцию НСтр при создании форматной строки (формат представления или редактирования дат, Булево значения и т.п.) . Форматирование дат для вывода дат следует учитывать, что в различных странах приняты различные порядок следования и разделители для составных частей даты. Поэтому вместо явного задания формата даты рекомендуется использовать локальный формат даты (ДЛФ). В случаях, когда использовать локальный формат даты не получатся, и требуется задать произвольный формат (ДФ) или указать представление пустой даты (ДП) нужно применять функцию НСтр к форматной строке, чтобы при локализации оставалась возможность переопределить выводимый формат: 1.2. Форматирование числа Следует применять функцию НСтр к форматной строке в случае, когда • для числа задается нечисловое представление нулевого значения (ЧН)'
  tags:
  - advisory
  - localization
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
