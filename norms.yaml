- norm_id: STD_710
  section: Система стандартов 2025
  category: data_model_registers
  title: Условное оформление в формах
  norm_text: 'Условное оформление в формах Область применения: управляемое приложение. Для настройки некоторых свойств элементов управления можно использовать условное оформление. Не следует использовать условное оформление для скрытия в таблице строк целиком. Если задача может быть функционально решена как с помощью условного оформления динамического списка, так и с помощью условного оформления формы, то следует выбрать первый вариант (условное оформление динамического списка). Настройку условного оформления форм и динамических списков рекомендуется делать в коде формы. Все настройки условного оформления должны производиться при создании формы и потом не должны модифицироваться. Исключением могут являться случаи, когда элементы формы генерируются программно – условное оформление таких элементов нужно настраивать при генерации элементов и потом не нужно менять. В коде процедуры установки условного оформления нужно минимизировать использование строковых констант, а использовать переменные, разыменования и т.д.'
