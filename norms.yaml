  section: Модули форм
  category: correctness
  title: Серверные переменные формы не сохраняют состояние между вызовами
  norm_text: 'Данные, сохранённые в серверной переменной формы, не сохраняются между вызовами серверной стороны формы. Использовать их как долговременное хранилище нельзя — состояние нужно передавать явно.'
