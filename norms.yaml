  norm_text: 'Не следует создавать индексы по полям с низкой селективностью (булево признаки, небольшие перечисления), если распределение значений близко к равномерному. Такие индексы практически не ускоряют чтение, но замедляют запись и занимают место. Исключение возможно только при явном перекосе распределения и подтвержденном профилированием эффекте.'
