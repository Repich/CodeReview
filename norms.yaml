  title: 'Обработчики событий модуля формы, подключаемые'
  norm_text: 'Обработчики событий модуля формы, подключаемые из кода Область применения: управляемое приложение, мобильное приложение, обычное приложение. Обработчикам событий модуля формы, которые устанавливаются из кода с помощью метода УстановитьДействие, рекомендуется задавать префикс Подключаемый_ (англ. Attachable_).'
