  auto_actionable: false
- norm_id: STD_687
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Шрифты
  norm_text: 'Шрифты Область применения: управляемое приложение. Действует для платформы с версии 8.3.2 При разработке конфигураций следует использовать стилевые шрифты: <Шрифт текста> <Мелкий шрифт текста> <Крупный шрифт текста> <Очень крупный шрифт текста> При необходимости также можно использовать шрифты из состава MS Core Fonts: Andale Mono Arial Arial Black Comic Sans MS Courier New Georgia Impact Times New Roman Trebuchet MS Verdana Webdings Не следует использовать в конфигурациях прочие шрифты, так как они могут поддерживаться не во всех операционных системах, в которых работает клиент 1С:Предприятия.'
