  detector_type: manual_review
  source_standard: '#std673'
  auto_actionable: false
- norm_id: STD_674
  section: Система стандартов 2025
  category: reporting_printing
  title: Заголовок отчета
  norm_text: 'Заголовок отчета Область применения: управляемое приложение. Заголовок отчета должен четко отражать цель анализа и содержание отчета. Заголовок должен быть узнаваемым и понятным. Если используются варианты отчета, то заголовок каждого варианта всегда должен быть заполнен и соответствовать наименованию варианта отчета. Это необходимо для быстрого поиска отчета в системе по заголовку напечатанного отчета. Если используются однотипные варианты отчета с различными группировками, то уточнение по группировке следует писать во множественном числе без использования разделителей (тире, скобок и т.п.), таким образом чтобы все слова названия были согласованы. Следует избегать слова "отчет" в синониме и заголовках отчетов. Если в отчете несколько элементов (например, гистограмма и список), то для каждого рекомендуется устанавливать заголовок.'
  tags:
  - advisory
  - reports
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std674'
  auto_actionable: false
- norm_id: STD_676
  section: Система стандартов 2025
  category: reporting_printing
  title: Отчеты вида "таблица", "список"
  norm_text: 'Отчеты вида "таблица", "список" Область применения: управляемое приложение. Структура отчета Отчет должен максимально соответствовать целям и задачам анализа. Следует проектировать отчет таким образом, чтобы количество уровней вложенности не превышало 3-х. Группировку по периоду рекомендуется располагать в колонках таблицы с упорядочиванием по возрастанию. Дополнительную информацию по группировке следует выводить: • вместе с объектом анализа, если информация уточняет свойства объекта. Показатели отчета следует располагать: • в колонках. Например, в отчете "Валовая прибыль по сделкам" показатели следуют в порядке логики вычисления: • в строках, если требуется сравнение нескольких показателей в динамике. В отчетах, где данные будут представлены в виде списка, рекомендуется колонку с порядковым номером делать первой. Если предполагается печать отчета, то следует оптимизировать его макет под формат А4. Сортировку по умолчанию следует устанавливать исходя из назначения отчета, так, чтобы наверху отображались самые важные для пользователей данные.'
  tags:
  - advisory
  - reports
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std676'
  auto_actionable: false
- norm_id: STD_675
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Отчеты вида "диаграмма"
  norm_text: 'Отчеты вида "диаграмма" Область применения: управляемое приложение. Это, в свою очередь, сокращает время, затрачиваемое пользователем на поиск необходимой информации. Применять диаграммы в отчетах следует лишь в том случае, если объем данных потенциально невелик и диаграммы не будут перегружены. Для различных целей поиска информации должны использоваться определенные типы диаграмм: Цель поиска Тип диаграммы Сортировка Условие применения Динамика показателей График График по шагам По возрастанию периода Много периодов От 1-й до нескольких серий График с областями График с накоплением и областями Нормированные графики По возрастанию периода Много периодов От 2-х серий до нескольких серий Вертикальные гистограммы По возрастанию периода Несколько периодов До 3-х серий Распределение величины по значимым диапазонам Вертикальная гистограмма Логический порядок диапазонов Менее 10 диапазонов График Логический порядок диапазонов Более 10 диапазонов, непрерывная шкала диапазонов Анализ структуры показателей Круговая диаграмма По важности значений показателя, по периоду Анализ соотношения компонент как частей целого.'
  tags:
