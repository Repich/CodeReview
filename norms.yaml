- norm_id: STD_652
  section: Система стандартов 2025
  category: queries_performance
  title: Несоответствие индексов и условий запроса
  norm_text: 'Несоответствие индексов и условий запроса Область применения: управляемое приложение, мобильное приложение, обычное приложение. Необходимо убедиться в том, что для всех условий, использованных в запросе, имеются подходящие индексы. Условия используются в следующих секциях запроса: ВЫБРАТЬ … ИЗ … ГДЕ <условие> СОЕДИНЕНИЕ … ПО <условие> ВЫБРАТЬ … ИЗ <ВиртуальнаяТаблица>(, <условие>) ИМЕЮЩИЕ <условие> Для каждого условия должен существовать подходящий индекс. Сначала необходимо провести поиск по значению первого поля индекса, затем - второго и так далее. При создании объекта метаданных 1С:Предприятие автоматически создает индексы, которые должны подходить для работы большинства запросов.'
