- norm_id: STD_662
  section: Система стандартов 2025
  category: transactions_locks
  title: Сдвиг границы последовательности документов
  norm_text: 'Сдвиг границы последовательности документов Область применения: управляемое приложение, мобильное приложение, обычное приложение. Не рекомендуется двигать границу последовательности при проведении документов. Операцию движения границы последовательности следует вынести из оперативных операций в регламентные, например выполнять регламентной обработкой с заданной частотой. Для вычисления себестоимости списываемых товаров при проведении расходного документа необходимо переместить границу последовательности для данной организации на момент времени проводимого документа. Такое поведение системы не является особенностью реализации последовательностей в 1С:Предприятии, но продиктовано требованиями самого алгоритма – необходимо знать точную последовательность расположения документов. То есть все конкурирующие по времени (одновременно проводящиеся) документы должны выстроиться друг за другом. Вместо этого следует использовать регламентную обработку, входящую в состав УПП, которая будет вычислять себестоимость с некоторой заданной частотой.'
  tags:
  - advisory
  - transactions
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
