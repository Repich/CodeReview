- norm_id: STD_460
  section: Система стандартов 2025
  category: transactions_locks
  title: Использование управляемого режима блокировки
  norm_text: 'Использование управляемого режима блокировки Область применения: управляемое приложение, обычное приложение. В конфигурациях следует использовать "Управляемый" режим блокировок (свойство Режим управления блокировкой данных конфигурации устанавливается в значение Управляемый) и учитывать особенности работы в этом режиме, в частности: Чтение данных другими транзакциями будет невозможно только в том случае, если в текущей и других транзакциях устанавливаются несовместимые управляемые блокировки. Явная управляемая блокировка должна устанавливаться перед чтением данных: если считываются данные, которые в дальнейшем должны быть изменены; необходимо обеспечить неизменность считываемых данных до конца транзакции. При установке управляемой блокировки необходимо стремиться, чтобы блокировка была установлена только на те записи, которые будут обработаны системой в результате отработки программного кода. Не следует применять в запросах конструкцию ДЛЯ ИЗМЕНЕНИЯ, как не имеющую смысла в этом режиме.'
  tags:
  - transactions
  scope: см. оригинальный стандарт
  code_applicability: true
