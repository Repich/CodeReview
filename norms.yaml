- norm_id: STD_740
  section: Система стандартов 2025
  category: security_access
  title: Безопасное хранение паролей
  norm_text: 'Безопасное хранение паролей Область применения: управляемое приложение, мобильное приложение, обычное приложение. При разработке подсистем, взаимодействующих с различными внешними ресурсами (электронной почтой, веб-сервисами, FTP-ресурсами и т.п.) возникает необходимость запрашивать и передавать данные аутентификации к этим ресурсам: логин и пароль. Для сведения к минимуму возможности перехвата пароля злоумышленниками не следует хранить пароли и другую конфиденциальную информацию в информационной базе. Таким образом, следует запрашивать логин и пароль у пользователя и передавать их сразу, не сохраняя в информационной базе. Следует помнить, что подобное хранение паролей не решает всех проблем безопасности, а лишь усложняет задачу для злоумышленника. При этом не следует хранить пароли и другую конфиденциальную информацию в реквизитах тех же объектов метаданных, с которыми ведется повседневная работа. Для хранения такой информации следует использовать отдельный объект метаданных (например, регистр сведений), организовав к нему безопасный доступ на уровне системы прав доступа 1С:Предприятия.'
  tags:
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std740'
  auto_actionable: false
- norm_id: STD_669
  section: Система стандартов 2025
  category: reporting_printing
  title: Ограничение на выполнение «внешнего» кода
  norm_text: 'Ограничение на выполнение «внешнего» кода Область применения: управляемое приложение, обычное приложение. Для прикладных решений запрещено выполнение в небезопасном режиме любого кода на сервере 1С:Предприятия, который не является частью самого прикладного решения (конфигурации). Примеры недопустимого выполнения «внешнего» кода в небезопасном режиме: внешние отчеты и обработки (печатные формы и т.п.), расширения конфигурации, внешние компоненты и любые другие аналогичные возможности, с помощью которых пользователи подключают к конфигурации внешний код; изменение пользователями схем компоновки данных в отчетах, в которых разрешено использование внешних функций (эта возможность закрыта при использовании стандартной формы отчета: она не позволяет пользователям изменять схему компоновки данных, а из пользовательских полей использовать функции общих модулей нельзя). В случае если администратор разрешает интерактивно открывать внешние отчеты и обработки, то информировать его и пользователей о том, что при открытии файлов внешних отчетов и обработок следует обращать особое внимание на их источник и не открывать файлы, полученные из источников, с которыми нет договоренности о разработке та.'
  tags:
  - reports
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std669'
  auto_actionable: false
- norm_id: STD_770
  section: Система стандартов 2025
  category: security_access
  title: Ограничения на использование Выполнить и Вычислить
  norm_text: 'Ограничения на использование Выполнить и Вычислить на сервере Область применения: управляемое приложение, обычное приложение. При разработке решений следует учитывать, что опасно не только непосредственное выполнение кода, написанного в режиме Предприятие, но и те места, где методами Выполнить или Вычислить исполняется код, сконструированный на основе параметров, переданных в серверные функции и процедуры. Для исключения описанных уязвимостей, нужно в серверных процедурах и функциях вызов методов Выполнить или Вычислить предварять включением безопасного режима: УстановитьБезопасныйРежим(Истина); приведенный выше пример необходимо доработать следующим образом: УстановитьБезопасныйРежим(Истина); При использовании в конфигурации Библиотеки стандартных подсистем, следует использовать: ОбщегоНазначения.ВыполнитьВБезопасномРежиме() вместо Выполнить; ОбщегоНазначения.ВычислитьВБезопасномРежиме() вместо Вычислить; ОбщегоНазначения.ВыполнитьМетодКонфигурации() вместо формирования строки вызова метода модуля и передачи ее в Выполнить'
  tags:
  - advisory
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std770'
  auto_actionable: false
- norm_id: STD_774
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Безопасность запуска приложений
  norm_text: 'Безопасность запуска приложений Область применения: управляемое приложение, обычное приложение. При запуске внешней программы из кода требуется составлять строку запуска таким образом, чтобы она собиралась только из проверенных частей. Если одна из частей, из которых собирается строка запуска, содержит данные, полученные из базы данных, из поля ввода на форме или прочитаны из хранилища настроек, то перед запуском программы требуется проверить, являются ли запуск безопасным. При использовании Библиотеки стандартных подсистем для запуска внешних программ требуется использовать следующий программный интерфейс: 2.1. Для того чтобы открыть проводник с фокусировкой на указанном файле, использовать процедуру ФайловаяСистемаКлиент.ОткрытьПроводник. Для того чтобы открыть файл в программе просмотра, ассоциированной с расширением файла, использовать процедуру ФайловаяСистемаКлиент.ОткрытьФайл. Для того чтобы открыть веб-страницу в браузере, запустить программу по протоколу (например, mailto:, skype:, tel: и.т.д) или открыть навигационную ссылку информационной базы следует использовать процедуру ФайловаяСистемаКлиент.ОткрытьНавигационнуюСсылку.'
  tags:
  - advisory
  - forms
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std774'
  auto_actionable: false
- norm_id: STD_775
  section: Система стандартов 2025
  category: security_access
  title: Безопасность программного обеспечения, вызываемого
  norm_text: 'Безопасность программного обеспечения, вызываемого через открытые интерфейсы Область применения: управляемое приложение, обычное приложение. При использовании интеграции со сторонними приложениями с помощью открытых интерфейсов (в частности, с помощью COM) требуется отключать исполнение произвольного кода средствами вызываемого приложения. В частности, перед программным открытием документов Microsoft Word и Microsoft Excel через COM следует запрещать исполнение макросов. Если при программном открытии документов Microsoft Office все же необходимо разрешить выполнение автоматически запускающихся макросов, тогда следует реализовать следующую логику работы: • В конфигурации сделать формы настройки безопасности запуска макросов, отдельно для клиентского и серверного кода со следующими элементами: o «Запретить автоматический запуск»; o «Разрешить запуск подписанных макросов (рекомендуется)» (выбран по умолчанию); • Форма настройки для клиентского кода должна быть доступна каждому пользователю, настройки должны сохраняться в разрезе пользователей, каждому пользователью должны быть доступны только свои настройки.'
  tags:
  - advisory
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std775'
  auto_actionable: false
- norm_id: STD_689
  section: Система стандартов 2025
  category: security_access
  title: Настройка ролей и прав доступа
  norm_text: 'Настройка ролей и прав доступа Область применения: управляемое приложение, обычное приложение. Для других конфигураций рекомендуется к использованию. Деление прав на доступ к объектам между функциями должно быть таким, чтобы на типовом внедрении не возникало необходимости в создании новых ролей. Исключение: для ролей, назначаемых внешним пользователям, задается исчерпывающий набор прав к необходимым объектам. после создания нового объекта нужно зайти в роль ПолныеПрава и отключить право интерактивного удаления у ссылочных объектов. Только для роли ПолныеПрава должен быть установлен флаг «Устанавливать права для новых объектов». Для всех остальных ролей этот флаг должен быть снят. Если какое-то право может быть использовано только администратором системы (например, использование какого-то отчета или обработки), то достаточно, чтобы это предоставлялось одной из ролей ПолныеПрава и АдминистраторСистемы, создавать отдельные роли в этом случае не требуется. Во всех документах, предполагающих проведение, должны быть выставлены флаги «Привилегированный режим при проведении» и «Привилегированный режим при отмене проведения», поэтому не нужно создавать роли, дающие права на изменение регист.'
  tags:
  - advisory
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std689'
  auto_actionable: false
- norm_id: STD_488
  section: Система стандартов 2025
  category: security_access
  title: Стандартные роли
  norm_text: 'Стандартные роли Область применения: управляемое приложение, обычное приложение. Если в конфигурации есть разграничение прав доступа пользователей к данным информационной базы, то настройку доступа следует выполнять с помощью ролей. Роли должны создаваться разработчиком конфигурации исходя из задачи ограничения доступа пользователей к данным. Для упрощения администрирования рекомендуется поставлять в составе конфигурации типовые комбинации таких ролей (например, готовый профиль для директора, бухгалтера, кладовщика и т.п.) При использовании в конфигурации Библиотеки стандартных подсистем для этого можно воспользоваться средствами подсистемы «Управление доступом». В конфигурации должны быть определены три обязательные роли, которые предназначены для «прикладного» и системного администрирования информационной базы, а также для интерактивного открытия внешних отчетов и обработок: ПолныеПрава (синоним «Полные права»), АдминистраторСистемы (синоним «Администратор системы») и ИнтерактивноеОткрытиеВнешнихОтчетовИОбработок (синоним «Интерактивное открытие внешних отчетов и обработок»).'
  tags:
  - advisory
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std488'
  auto_actionable: false
- norm_id: STD_532
  section: Система стандартов 2025
  category: data_model_registers
  title: Установка прав для новых объектов и полей объектов
  norm_text: 'Установка прав для новых объектов и полей объектов Область применения: управляемое приложение, обычное приложение. При разработке ролей конфигурации следует придерживаться такой методики установки прав на объекты метаданных, которая не допускает появления в конфигурации ролей, дающих доступ к полям объекта, но не к самому объекту; Флажок «Устанавливать права для новых объектов» должен быть установлен только у роли ПолныеПрава 2. При добавлении новой роли, флажок «Устанавливать права для реквизитов и табличных частей по умолчанию» должен быть установлен, а флажок «Независимые права подчиненных объектов» должен быть снят. При необходимости установить в роли права только на поля какого-либо объекта метаданных (права просмотр, редактирование на реквизиты, табличные части, измерения, команды и т.п. без этих прав на сам объект), предварительно требуется следующее. При добавлении в конфигурацию новых объектов или новых полей существующих объектов следует настроить права на эти объекты или поля в соответствующих ролях.'
  tags:
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std532'
  auto_actionable: false
- norm_id: STD_737
  section: Система стандартов 2025
  category: security_access
  title: Проверка прав доступа
  norm_text: 'Проверка прав доступа Область применения: управляемое приложение, обычное приложение. В случае большого количества ролей в конфигурации (от нескольких десятков) не рекомендуется использовать ролевую настройку видимости в элементах форм (просмотр и редактирование реквизитов по ролям, пользовательскую видимость полей формы по ролям, использование команд по ролям). Вместо этого следует придерживаться следующих подходов: при сильных различиях внешнего вида и функциональности формы в зависимости от наличия тех или иных ролей у пользователя – разрабатывать отдельные формы, специализированные под конкретный набор прав пользователя; При этом следует иметь в виду, что программное управление видимостью может снизить скорость открытия формы, что нужно учитывать при выборе между предлагаемыми подходами.'
  tags:
  - advisory
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std737'
  auto_actionable: false
- norm_id: STD_485
  section: Система стандартов 2025
  category: security_access
  title: Использование привилегированного режима
  norm_text: 'Использование привилегированного режима Область применения: управляемое приложение, обычное приложение. Привилегированный режим следует использовать когда требуется с логической точки зрения отключить проверку прав; Если подчиненные регистры (движения документов) требуются пользователю для получения отчетов, то такие регистры следует оставлять доступными только для чтения, а запись в такие регистры следует выполнять переходом в привилегированный режим. Пользователю не требуется напрямую изменять регистр, но требуется формировать отчет ОстаткиНаСкладах, который читает данные регистра. Если регистры не требуются пользователю ни для получения отчетов, ни в командном интерфейсе, то следует не давать пользователю права на их чтение. В этом случае следует не давать пользователям какие-либо права доступа к регистру. Если для выполнения разрешенной пользователю операции требуются заранее недоступные данные, тогда следует их получать переходом в привилегированный режим, но с гарантией предотвращения передачи этих данных на клиентскую сторону и с гарантией их использования на сервере только для выполнения запланированной операции.'
  tags:
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std485'
  auto_actionable: false
- norm_id: STD_415
  section: Система стандартов 2025
  category: queries_performance
  title: Ограничения на использование ключевого слова
  norm_text: 'Ограничения на использование ключевого слова "РАЗРЕШЕННЫЕ" в запросах Область применения: управляемое приложение, обычное приложение. Необходимо иметь в виду, что для корректной работы бизнес-логики, заложенной в конфигурацию, различным подсистемам конфигурации необходимо предоставить доступ не к ограниченной, а ко всей требуемой информации. Например, если использовать ключевое слово РАЗРЕШЕННЫЕ в запросах механизмов определения списания себестоимости товаров при их отгрузке со склада, то себестоимость списания одного пользователя может отличаться от себестоимости другого. В данном случае необходимо поддерживать целостность информации и либо разрешать пользователю чтение информации для корректного отражения хозяйственной операции, либо конфигурация должна прекращать выполнение операции с сообщением о нарушении прав доступа.'
  tags:
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std415'
  auto_actionable: false
- norm_id: STD_491
  section: Система стандартов 2025
  category: performance_runtime
  title: 'Влияние изменения значений параметров сеанса'
  norm_text: 'Влияние изменения значений параметров сеанса и функциональных опций на производительность механизма ограничения доступа к данным Область применения: управляемое приложение, обычное приложение. Ограничения доступа к данным могут использовать параметры сеанса и функциональные опции. Поэтому рекомендуется выполнять установку значений параметров сеанса "по требованию", в обработчике УстановкаПараметровСеанса модуля сеанса. Также не рекомендуется часто выполнять изменение значений функциональных опций в процессе работы системы.'
  tags:
