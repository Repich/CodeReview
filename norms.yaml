- norm_id: FS_ACCESS_07
  section: Доступ к файловой системе из кода конфигурации
  category: code_style
  title: 'В редких случаях может возникнуть необходимость передачи данных во временных файлах'
  norm_text: 'В редких случаях может возникнуть необходимость передачи данных во временных файлах между сеансами, например, при подготовке данных для фонового задания, при организации длительного процесса, обслуживающего несколько последовательных вызовов web-сервиса. Необходимо самостоятельно обеспечивать гарантировано общее место хранения, права для доступа к файлам из разных мест их обработки, удаление файлов по истечению сроков их обработки или аварийного завершения процесса обработки. Рекомендуется использовать следующий подход: Для обеспечения доступа со всех возможных мест обработки заводится константа для хранения общего пути к файлам, доступного для доступа со всех серверов кластера; При одновременной работе с файлом на клиенте и на сервере необходимо использовать передачу файла через временное хранилище (методы ПоместитьФайлы, ПолучитьФайл, ПолучитьФайлы, НачатьПомещениеФайла, ПоместитьВоВременноеХранилище, ПолучитьИзВременногоХранилища). Для сохранения данных во временном хранилище между несколькими серверными вызовами, при помещении его в хранилище необходимо использовать параметр УникальныйИдентификаторФормы метода ПоместитьФайл, передав в него идентификатор текущей формы.'
  tags:
  - advisory
  - code-style
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: security
- norm_id: FORMAT_RULES_01
  section: 'Форматирование даты, числа, Булево: требования по локализации'
  category: code_style
  title: 'Форматирование дат для вывода дат следует учитывать, что в различных странах приняты различные '
  norm_text: 'Форматирование дат для вывода дат следует учитывать, что в различных странах приняты различные порядок следования и разделители для составных частей даты. Поэтому вместо явного задания формата даты рекомендуется использовать локальный формат даты (ДЛФ). В случаях, когда использовать локальный формат даты не получатся, и требуется задать произвольный формат (ДФ) или указать представление пустой даты (ДП) нужно применять функцию НСтр к форматной строке, чтобы при локализации оставалась возможность переопределить выводимый формат:'
  tags:
  - advisory
  - code-style
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: medium
  detector_type: ui
