- norm_id: STD_618
  section: Система стандартов 2025
  category: queries_performance
  title: Размеры списков
  norm_text: 'Размеры списков Область применения: управляемое приложение. При этом нужно исходить из практики. Не обязательно стремиться к одинаковой высоте списков, например, в различных документах. Они должны быть узнаваемыми, но точного соблюдения геометрии не требуется. Если нужно понять какой ширины должна быть колонка или поле и известно типовое количество символов в значении, используйте формулу: Ширина колонки = Количество символов/1,25 Минимальные размеры колонок для таблиц управляемой формы Колонка Количество символов (с пробелами) Ширина Банк 20 16 Банковский счет 20 16 БИК 9 7 Валюта 3 3 Год 4 4 Дата (со временем) 19 13 Договор 24 19 Индекс 6 5 ИНН физ. лица 12 10 ИНН юр.лица 10 8 Код ИФНС 4 4 Комментарий 20 16 Контрагент 20 16 КПП 9 7 Месяц 8 7 Номенклатура 20 16 Номер 11 9 Номер ГТД 30 23 ОГРН 13 10 ОКАТО 11 9 Описание 20 16 Организация 20 16 Ответственный 15 12 Подразделение 20 16 Какую высоту строки использовать Одинарную, если значения в ячейках короткие и список выглядит компактно и не перегружено.'
