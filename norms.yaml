- norm_id: STD_441
  section: Система стандартов 2025
  category: queries_performance
  title: Общие требования к построению конструкций
  norm_text: 'Общие требования к построению конструкций встроенного языка Область применения: управляемое приложение, мобильное приложение, обычное приложение. При следовании друг за другом нескольких операторов присваивания, допускается выравнивать их следующим образом: ДиалогВыбора.ПолноеИмяФайла = ИмяФайла; При этом не следует выравнивать операторы одинаково по всему модулю - рекомендуется делать выравнивание только для операторов, расположенных рядом. Логические выражения и логические значения (например, результат функции, возвращающей логическое значение, переменные типа Булево и пр.) не следует проверять путем сравнения с литералами Истина и Ложь. В тех случаях, когда требуется сравнивать результаты каких-либо выражений, следует предварительно присваивать результаты этих выражений промежуточным переменным, и сравнивать уже сами эти переменные. Необходимо использовать системные наборы значений везде, где возможно их применить, например, вместо Символ(10) следует использовать Символы.ПС.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std441'
  auto_actionable: false
- norm_id: STD_444
  section: Система стандартов 2025
  category: data_model_registers
  title: Перенос выражений
  norm_text: 'Перенос выражений Область применения: управляемое приложение, мобильное приложение, обычное приложение. При длине строки более 120 символов следует использовать переносы. Строки длиннее 120 символов делать не рекомендуется, за исключением тех случаев, когда перенос невозможен. 3.1 Длинные строковые константы рекомендуется переносить с помощью специального символа перевода на новую строку, 3.2. В общем случае при конкатенации строк знак "+" рекомендуется писать в начале строки, так же как и при переносе арифметических выражений (см. При необходимости параметры процедур, функций и методов следует переносить следующим образом: параметры выравниваются по началу первого параметра, либо предваряются стандартным отступом; Сложные логические условия в Если…ИначеЕсли…КонецЕсли следует переносить следующим образом: каждое элементарное условие нужно начинать с новой строки, если длина строки превышает ограничение в 120 символов; все условия предваряются стандартным отступом, либо выравниваются по началу первого условия, без учета логического оператора (для выравнивания выражений относительно первой строки рекомендуется использовать пробелы).'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std444'
  auto_actionable: false
- norm_id: STD_440
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Использование дублирующего кода
  norm_text: 'Использование дублирующего кода Область применения: управляемое приложение, мобильное приложение, обычное приложение. Дублированием кода называется способ разработки конфигурации, при котором при создании нового функционала копируются без изменений уже существующие фрагменты кода или целиком процедуры и функции и при этом копируемый функционал по логике приложения должен быть одинаковым. Следует осторожно относиться к дублированию кода и по возможности стараться его избегать. Следует помнить, что дублирование кода оправданно и должно выполняться, если развитие функционала в будущем может привести к значительному расхождению двух вариантов кода. Пример предотвращения дублирования кода при разработке клиент-серверных функций В функции СообщитьПользователю общего модуля ОбщегоНазначенияКлиентСервер возникла необходимость особым образом обработать входные параметры при выполнении на сервере. Неправильно использовать для этого инструкции препроцессора (#Если НЕ ТонкийКлиент И НЕ ВебКлиент): Процедура СообщитьПользователю(Знач ТекстСообщенияПользователю, Знач КлючДанных = Неопределено, Знач Поле = "", Отказ = Ложь) Экспорт Сообщение = Новый СообщениеПользователю'
  tags:
  - forms
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std440'
  auto_actionable: false
- norm_id: STD_439
  section: Система стандартов 2025
  category: metadata_design
  title: Использование директив компиляции и инструкций
  norm_text: 'Использование директив компиляции и инструкций препроцессора Область применения: управляемое приложение, мобильное приложение, обычное приложение. Директивы компиляции: &НаКлиенте (&AtClient) &НаСервере (&AtServer) &НаСервереБезКонтекста (&AtServerNoContext) следует применять только в коде модулей управляемых форм и в коде модулей команд. В остальных модулях рекомендуется применять инструкции препроцессору. Не следует использовать инструкции препроцессора в клиент-серверных общих модулях для проверки клиентского и серверного контекстов (#Если Сервер, #Если Клиент) ввиду невозможности надежного определения контекста исполнения. Процедуры и функции, которые работают по-разному при вызове с клиента и с сервера, следует размещать в общих модулях с постфиксами Клиент и Сервер, а не КлиентСервер.'
  tags:
  - advisory
  - metadata
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std439'
  auto_actionable: false
