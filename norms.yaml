  norm_text: 'Для хранения и передачи промежуточных результатов вычислений между разными процедурами и функциями формы следует использовать Параметры процедур и функций – для передачи результатов по цепочке вызовов дочерних процедур и функций в контексте одного вызова. Реквизиты формы – если требуется сохранять промежуточные результаты между разными вызовами с клиента. (Следует иметь в виду, что значения серверных переменных модуля формы не сохраняются между вызовами с клиента.) Исключение из этого правила составляют случаи использования клиентских переменных формы для хранения промежуточных результатов в обработчиках ожидания формы, в обработчиках внешних событий и в клиентских обработчиках событий элементов формы. Переменные управляемого и обычного приложения следует использовать для хранения «клиентских параметров сеанса».'
