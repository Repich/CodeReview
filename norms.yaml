  norm_text: 'Несущественные предупреждения проверки конфигурации Область применения: управляемое приложение, мобильное приложение, обычное приложение. Следующие предупреждения проверки конфигурации (конфигуратор – меню Конфигурация – Проверка конфигурации…) не являются существенными для работоспособности прикладных решений и поэтому не подлежат обязательному исправлению: Пустой обработчик (для обработчиков оповещений в программных модулях); При регламентной проверке конфигурации не следует включать флажок Поиск использования синхронных вызовов, так как в результатах проверки выводятся, в том числе, корректные места вызовов в коде, который не исполняется в веб-клиенте (например, серверный код).'
