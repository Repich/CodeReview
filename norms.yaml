  section: Обработчики обновления информационной базы
  category: code_style
  title: 'Обработчик обновления данных информационной базы состоит из двух частей: описательной'
  norm_text: 'Обработчик обновления данных информационной базы состоит из двух частей: описательной - сообщает, когда должен выполниться обработчик, и где он находится в конфигурации; Если следующую версию нельзя определить, то можно указать следующий номер сборки. Если в качестве версии указан символ «*», то обработчик обновления должен выполняться каждый раз при обновлении информационной базы, независимо от номера версии конфигурации. Монопольно – если обработчик обновления необходимо выполнять монопольно, в условиях отсутствия активных сеансов работы пользователей, регламентных заданий, внешних соединений и подключений по веб-сервисам.'
