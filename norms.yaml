- norm_id: STD_432
  section: Система стандартов 2025
  category: queries_performance
  title: Использование реквизитов строкового типа
  norm_text: 'Использование реквизитов строкового типа Область применения: управляемое приложение, мобильное приложение, обычное приложение. Для реквизитов строкового типа следует использовать переменную длину строки (свойство Допустимая длина = Переменная) и при этом указывать максимально допустимую длину строки. Свойство Допустимая длина может принимать значение Фиксированная только в тех случаях, когда при манипуляции этими данными действительно необходимо иметь гарантию, что строка имеет определенную длину (за счет автоматического дополнения концевыми пробелами). В тех случаях, когда максимальная длина строки заранее известна (например, она регламентирована), следует указывать ее в свойстве Длина (или Длина наименования для стандартного реквизита Наименование). 1.4 Если длина строки не регламентирована, то рекомендуется выбирать такую длину, которой достаточно для хранения данных в большинстве случаев. В отдельных случаях, допускается использование строк неограниченной длины: 2.1. В случае использования строковых реквизитов неограниченной длины следует иметь в виду возникающие при этом ограничения в языке запросов: 3.1.'
