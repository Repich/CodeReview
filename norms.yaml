  norm_text: 'Использование гиперссылок в диалогах форм Область применения: обычное приложение. Обычное приложение В случае размещения команд вне командных панелей на форме, при выборе элемента управления нужно руководствоваться следующими правилами: Используются кнопки: если команда изменяет или обрабатывает данные формы, особенно, если это необратимые изменения (например, очистка табличных частей)'
