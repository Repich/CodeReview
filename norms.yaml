- norm_id: FORMAT_RULES_07
  section: 'Форматирование даты, числа, Булево: требования по локализации'
  category: code_style
  title: 'Сериализация Булево'
  norm_text: 'Для сериализации булевых значений не используйте Строка() и локализованные форматы Формат(). Используйте XMLСтрока()/XMLЗначение(Тип("Булево"), ...) или явное стабильное представление (например, on/off).'
