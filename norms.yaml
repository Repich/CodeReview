  section: Система стандартов 2025
  category: metadata_design
  title: 'Особенности разработки конфигураций для ОС Linux'
  norm_text: 'Особенности разработки конфигураций для ОС Linux и macOS Область применения: управляемое приложение, обычное приложение. В большинстве случаев, в конфигурации не требуется предпринимать каких-либо специальных мер для обеспечения работы конфигурации (клиентское приложение и сервер) на ОС Linux и macOS. Для реализации всех ключевых функций прикладного решения следует использовать возможности платформы 1С:Предприятие по унификации работы на различных операционных системах. Вместо Windows-технологии COM (объект COMОбъект) следует использовать специализированные кроссплатформенные механизмы платформы: Для администрирования кластера серверов 1С:Предприятия, вместо работы с объектной моделью агента сервера через COM-объект v83.ComConnector, следует использовать сервер администрирования (ras) и утилиту администрирования (rac). Для получения путей к рабочим каталогам, вместо COM-объектов ОС Windows, следует использовать методы глобального контекста РабочийКаталогДанныхПользователя, КаталогДокументов, КаталогВременныхФайлов.'
