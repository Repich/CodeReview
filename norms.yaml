  norm_text: 'Акцентирование внимания на просроченных или критичных состояниях Область применения: управляемое приложение. При необходимости привлечь внимание, например к истекающему состоянию, сроку выполнения операции и т.п., рекомендуется выделять только тот элемент, который поможет пользователю понять в чем причина привлечения внимания и что делать дальше. 34) Например, в случае если истекает срок действия Соглашения с поставщиком, необходимо выделять только ячейку состояния «действует» и ячейку «действует по».'
