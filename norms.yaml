  section: Система стандартов 2025
  category: data_model_registers
  title: Обработчики событий
  norm_text: 'Обработчики событий ОбработкаПолученияПредставления и ОбработкаПолученияПолейПредставления Область применения: управляемое приложение, мобильное приложение. (ПолучитьФункциональнуюОпцию("ИспользоватьДатуИВремяВСрокахЗадач"), "ДЛФ=DT", "ДЛФ=D")); Обработчики вызываются при любой необходимости получения представления какого-либо объекта информационной базы. Также не следует выполнять в этих обработчиках запросы или получение объектов информационной базы (в том числе, запрещены обращения к реквизитам объектов ссылочных типов через точку, что приводит к чтению всего объекта целиком из базы данных). Также нежелательно использовать получение представления и реквизитов ссылок. Например, недопустимо обращаться к предопределенным элементам, которые еще могли быть не загружены в базу или, наоборот, уже удалены в ходе обмена данными: Процедура ОбработкаПолученияПредставления(Данные, Представление, СтандартнаяОбработка) СтандартнаяОбработка = Ложь; При реализации обработчиков следует также учитывать требования о поддержке толстого клиента, управляемое приложение, клиент-сервер.'
