  norm_text: 'Размеры формы Область применения: обычное приложение. Исходя из этого максимальными размерами формы должны быть: ширина - 1256 точек; Рекомендуется устанавливать оптимальные для работы пользователя размеры формы не превышая при этом приведенные размеры. Для форм, где присутствуют панели с закладками, ширину формы рекомендуется делать такой, чтобы заголовки всех закладок без сокращений были одновременно видны в форме.'
