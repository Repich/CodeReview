- norm_id: STD_640
  section: Система стандартов 2025
  category: data_model_registers
  title: Параметры процедур и функций
  norm_text: 'Параметры процедур и функций Область применения: управляемое приложение, мобильное приложение, обычное приложение. При объявлении формальных параметров процедур и функций (далее по тексту: функций) необходимо придерживаться общих правил образования имен переменных. В частности, имена параметров следует образовывать от терминов предметной области таким образом, чтобы из имени параметра было понятно его назначение. Не следует использовать вместо параметров функций другие средства конфигурирования ( переменные модулей, реквизиты формы и т.п.) 3. Параметры в функции должны идти в логической последовательности. Рекомендуется располагать параметры по принципу от общего к частному. Необязательные параметры (параметры со значениями по умолчанию) должны располагаться после обязательных параметров (без значений по умолчанию). Не рекомендуется объявлять в функциях много параметров (нужно ориентироваться на количество не более семи параметров), при этом не должно быть много параметров со значениями по умолчанию (нужно ориентироваться на количество не более трех таких параметров).'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
