  norm_text: 'Формы Область применения: управляемое приложение. Форма должна быть оптимизирована под клавиатурный ввод : Логичный сценарий переходов по клавише Tab. Последний переход должен быть на кнопку завершающую сценарий. Связанные объекты должны быть расположены так, чтобы переходы по клавише Tab осуществлялся последовательно. Например, переход с выбора партнера на выбор контрагента.'
