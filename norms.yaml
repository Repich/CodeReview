- norm_id: STD_542
  section: Система стандартов 2025
  category: integration_exchange
  title: Доступ к файловой системе из кода конфигурации
  norm_text: 'Доступ к файловой системе из кода конфигурации Область применения: управляемое приложение, мобильное приложение, обычное приложение. При обращении из кода конфигурации к файлам и каталогам файловой системы следует иметь в виду, что доступ к ним ограничен правами пользователя операционной системы, от имени которого запущено приложение. руководство администратора клиент- серверного варианта, описание служебного файла swpuser.ini Область применения (уточнение): управляемое приложение, обычное приложение. Например, при работе в ОС Windows, для запуска копии тонкого клиента 1С:Предприятия текущей версии, допустимо использовать: ЗапуститьПриложение(КаталогПрограммы() + "1cv8s.exe"); Даже если не планируется локализация конфигурации на другие языки, следует обеспечивать переносимость файлов, сформированных из кода конфигурации, между различными операционными системами с различными кодировками. Для этого необходимо: 3.1. В именах файлов, автоматически формируемых из кода конфигурации, указывать только английские буквы, а также цифры, а в качестве кодировки текстовых файлов использовать только UTF-8 (именно этот формат предпочтителен, т.к.'
  tags:
  - advisory
  - integration
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
