- norm_id: STD_598
  section: Система стандартов 2025
  category: localization
  title: Тексты
  norm_text: 'Тексты Область применения: управляемое приложение. Общие рекомендации Избегайте технологических терминов и аббревиатур, используйте язык пользователей. Используйте короткие предложения т.к. Поле ввода и подпись к нему должны отображаться одинаковым шрифтом (начертание, размер, жирность), но не цветом. В интерфейсных текстах используйте только прямые кавычки. В справке допускается использовать французские кавычки «елочки». Букву «ё» следует также писать в собственных именах. В остальных случаях следует писать букву «е». Названия и заголовки Рекомендуется избегать названий и заголовков, которые могут быть неоднозначно поняты пользователями. Не рекомендуется использование названий и заголовков длиной более 60 символов. Вместо этого можно использовать прикладные термины'
  tags:
  - advisory
  - localization
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
