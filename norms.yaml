  title: Определение типа значения переменной
  norm_text: 'Определение типа значения переменной Область применения: управляемое приложение, мобильное приложение, обычное приложение. Определение типа значения переменной необходимо выполнять путем его сравнения с типом, а не каким-либо другим методом.'
