- norm_id: STD_644
  section: Система стандартов 2025
  category: data_model_registers
  title: Обеспечение совместимости библиотек
  norm_text: 'Обеспечение совместимости библиотек Область применения: управляемое приложение, мобильное приложение, обычное приложение. При разработке библиотек необходимо обеспечивать обратную совместимость (далее просто: совместимость) между различными версиями библиотек в пределах одной подредакции библиотеки. Например, версии библиотеки 2.0.1, 2.0.2 и 2.0.5 должны быть совместимы. Прикладное решение может «уверенно» использовать старые возможности библиотеки, не «торопясь» переходить на новые. Кроме того, при разработке нескольких библиотек, стоящих на поддержке друг у друга, совместимость позволяет вести совместную разработку «соседних» библиотек на разных версиях базовой библиотеки, без необходимости частого обновления всего дерева библиотек. ПП (номер подредакции) – нарушена совместимость (требуется отработать инструкцию по переходу на эту версию, иначе конфигурация будет неработоспособна), удалены устаревшие объекты метаданных; Исключением являются заранее согласованные с потребителями библиотеки случаи, такие как отработка изменений законодательства.'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std644'
  auto_actionable: false
- norm_id: STD_668
  section: Система стандартов 2025
  category: security_access
  title: Разработка ролей в библиотеках
  norm_text: 'Разработка ролей в библиотеках Область применения: управляемое приложение, мобильное приложение, обычное приложение. При проектировании ролей в библиотеках рекомендуется придерживаться общего подхода к определению границ функциональности библиотеки: в библиотеку включаются те объекты метаданных, которые в неизменном или переопределенном виде войдут в состав конфигураций-потребитилей. Исключение из этого правила составляют случаи, когда библиотечный объект не является «самостоятельным», а всегда подчинен какому-либо объекту- владельцу конфигурации. В этом случае поставляемый RLS должен быть разработан таким образом, чтобы в прикладных решениях он использовался «как есть» и его не приходилось менять (дорабатывать). Исключение из этого правила составляют случаи, когда в прикладном решении не предусмотрено никакой настройки прав доступа на уровне записей. В этом случае тексты RLS, если они предусмотрены, должны быть удалены из библиотечных ролей на этапе внедрения (обновления) библиотеки в конфигурацию.'
  tags:
  - advisory
  - security
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std668'
  auto_actionable: false
- norm_id: STD_690
  section: Система стандартов 2025
  category: data_model_registers
  title: Обработчики обновления информационной базы
  norm_text: 'Обработчики обновления информационной базы Область применения: управляемое приложение, обычное приложение. Для автогенерируемых строк, которые программно записываются в информационную базу, например при заполнении наименований предопределенных элементов справочников, ПВХ и т.п., следует руководствоваться стандартом Автогенерированные данные в информационной базе: требования по локализации. Обработчик обновления данных информационной базы состоит из двух частей: описательной - сообщает, когда должен выполниться обработчик, и где он находится в конфигурации; Если следующую версию нельзя определить, то можно указать следующий номер сборки. Если в качестве версии указан символ «*», то обработчик обновления должен выполняться каждый раз при обновлении информационной базы, независимо от номера версии конфигурации. Монопольно – если обработчик обновления необходимо выполнять монопольно, в условиях отсутствия активных сеансов работы пользователей, регламентных заданий, внешних соединений и подключений по веб-сервисам.'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std690'
  auto_actionable: false
