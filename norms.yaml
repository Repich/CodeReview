- norm_id: STD_731
  section: Система стандартов 2025
  category: metadata_design
  title: Требования к установке и обновлению прикладных
  norm_text: 'Требования к установке и обновлению прикладных решений Область применения: управляемое приложение, мобильное приложение, обычное приложение. Исходя из данных требований, полный путь к каталогу поставляемых разработчиком шаблонов конфигурации (информационных баз), в общем случае, имеет вид: <Каталог шаблонов>\<каталог разработчика>\<каталог конфигурации>\<каталог версии> При этом в каталоге версии вместо точек должны использоваться подчеркивания. В каталоге версии должен быть расположен файл-манифест 1cv8.mft, в котором описываются установленные шаблоны конфигурации (.cf) и демонстрационные информационные базы (.dt). В целях исключения совпадения названий конфигураций и возможных в таком случае коллизий при отображении шаблонов информационных баз в диалоге создания ИБ, рекомендуется. В строке Catalog файла-манифеста, в наименование шаблона конфигурации (часть значения до символа «/») следует включать в явном виде название разработчика. Для исключения повторений названия разработчиков – поставщиков прикладных решений (конфигураций) должны быть глобально уникальными: название для использования в наименованиях шаблонов конфигураций и название для использования в именах файловых каталог.'
