- norm_id: STD_702
  section: Система стандартов 2025
  category: data_model_registers
  title: 'Реквизит Ссылка и признак "Использовать всегда"'
  norm_text: 'Реквизит Ссылка и признак "Использовать всегда" в динамических списках объектов Область применения: управляемое приложение. Для того чтобы пользователь смог воспользоваться этой возможностью, в динамических списках объектов ссылочных типов (справочников, документов и т.п.) рекомендуется добавлять в список поле Ссылка, у которого отключать пользовательскую видимость. При обращении к данным строки динамического списка в коде (например, в обработчике ПриАктивацииСтроки, ПриПолученииДанныхНаСервере и др.) необходимо учитывать, что в целях оптимизации данные невидимых колонок не получаются. Для колонок, у которых в свойствах таблицы формы, отображающей динамический список установлен признак "Использовать всегда" данные получаются всегда, вне зависимости от видимости. Не рекомендуется устанавливать признак "Использовать всегда" для колонки реквизита динамического списка, кроме тех случаев, когда значение колонки обязательно для выполнения алгоритма. Например, колонка Ссылка всегда требуется для команды "Печать", но эта колонка может быть скрыта пользователем.'
  tags:
  - advisory
  - data-model
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
