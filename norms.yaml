- norm_id: STD_789
  section: Система стандартов 2025
  category: metadata_design
  title: Разработка печатных форм с учетом возможного
  norm_text: 'Разработка печатных форм с учетом возможного внесения изменений в макет пользователем Область применения: управляемое приложение. Если в конфигурации предусмотрена возможность редактирования макетов пользователем (например, средствами подсистемы «Печать» Библиотеки стандартных подсистем), то необходимо учитывать то, что любые параметры или области макета могут быть изменены или удалены. При использовании технологии формирования печатной формы средствами подсистемы Печать Библиотеки стандартных подсистем (по макету СКД), для обеспечения вывода изменённых макетов следует сохранять существующий состав полей в макетах ДанныеПечати объектов метаданных. При наличии макета ДанныеПечати в объекте допускается расширение состава полей, но не допускается переименование или удаление полей. При отсутствии макета ДанныеПечати в объекте не допускается переименование реквизитов или табличных частей. При необходимости изменения состава реквизитов и/или табличных частей объекта необходимо предварительно создать макет ДанныеПечати, чтобы зафиксировать прежний состав полей объекта.'
  tags:
  - metadata
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
