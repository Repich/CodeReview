  title: Порядок записи движений документов
  norm_text: 'Порядок записи движений документов Область применения: управляемое приложение, мобильное приложение, обычное приложение. Не рекомендуется использовать явную запись наборов записей регистров (с помощью метода Записать) в процедурах обработки проведения документов. Исключением является ситуация, когда данные, сохраняемые в регистрах, необходимы в последующих алгоритмах, выполняемых до момента выхода из процедуры проведения.'
