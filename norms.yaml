- norm_id: STD_543
  section: Система стандартов 2025
  category: metadata_design
  title: Использование подсистем
  norm_text: 'Использование подсистем Область применения: управляемое приложение, обычное приложение. могут использоваться одновременно и при разработке: для быстрого отбора объектов в окне метаданных Конфигуратора, при переносе объектов в другие конфигурации, для задания ограничений области поиска при глобальном поиске по конфигурации и т.д. У таких подсистем должен быть установлен флажок Включать в командный интерфейс. Для логического объединения набора объектов метаданных по функциональному признаку рекомендуется заводить в конфигурации отдельную иерархию подсистем, не включенных в командный интерфейс. У таких «функциональных» подсистем флажок Включать в командный интерфейс должен быть снят. При этом, общие модули, регламентные задания, константы, подписки на события и прочие объекты, не имеющие визуального представления в командном интерфейсе, рекомендуется включать только в состав «функциональных» подсистем.'
