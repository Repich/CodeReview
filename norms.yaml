- norm_id: EXP_001
  section: Запросы
  category: queries_performance
  title: Выбирать только необходимые поля в запросе
  norm_text: 'В запросах выбирайте только те поля, которые реально нужны для дальнейшей логики. Избегайте выборки «*» или «<Таблица>.*», если используется лишь часть реквизитов.'
  source_reference: Раздел 4.20 «Работа с запросами. Порядок написания запросов. Список правил», правило 1, стр. 215
  source_excerpt: «Выбирать в запросе только то, что нужно.»
