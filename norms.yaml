  norm_text: 'Привязки Область применения: обычное приложение. Обычное приложение Необходимо минимизировать ручную установку привязок. При горизонтальном растягивании формы Не меняют размеров: надписи, за исключением "информационных надписей" и надписей с гиперссылкой, флажки, переключатели, кнопки, поля ввода в том случае, если в них водится значение заранее известной длины и это значение полностью видно в поле ввода'
