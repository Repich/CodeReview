- norm_id: STD_657
  section: Система стандартов 2025
  category: security_access
  title: Обращения к виртуальным таблицам
  norm_text: 'Обращения к виртуальным таблицам Область применения: управляемое приложение, мобильное приложение, обычное приложение. При использовании виртуальных таблиц в запросах, следует передавать в параметры таблиц все условия, относящиеся к данной виртуальной таблице. Не рекомендуется обращаться к виртуальным таблицам при помощи условий в секции ГДЕ и т.п. Рекомендуется ограничивать количество выбираемых записей на самом раннем этапе обработки запроса. Для этого следует передать условия в параметры виртуальной таблицы. При обращении к виртуальной таблице следует передавать в условия наиболее простые конструкции, например, "Измерение = Значение". Не рекомендуется использовать подзапросы и соединения(*) в параметрах виртуальной таблицы, так как это приводит к медленной работе запроса. При необходимости использовать подзапросы рекомендуется соблюдать следующие условия: в подзапросе только одна таблица, нет соединений с другими таблицами; В таких случаях следует переписать исходный запрос с использованием временной таблицы или привилегированного режима.'
  tags:
