  section: Система стандартов 2025
  category: metadata_design
  title: Переопределение общих модулей в условиях иерархии
  norm_text: 'Переопределение общих модулей в условиях иерархии библиотек Область применения: управляемое приложение, мобильное приложение, обычное приложение. Методическая рекомендация (полезный совет) При разработке нескольких библиотек, стоящих на поддержке друг у друга, следует минимизировать трудоемкость по обновлению кода переопределяемых общих модулей в каждой из библиотек. Для этого рекомендуется использовать следующую методику: 1. В библиотеках более высокого уровня реализация процедур и функций переопределяемого модуля базовой библиотеки может быть при необходимости доопределена.'
