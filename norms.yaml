  title: Общие требования по локализации конфигурации
  norm_text: 'Общие требования по локализации конфигурации Область применения: управляемое приложение, мобильное приложение, обычное приложение. При разработке следует ориентироваться на то, что в конфигурации предусмотрено несколько языков интерфейса пользователя, данные в базе данных вводятся на одном языке, отличном от основного языка конфигурации (см.'
