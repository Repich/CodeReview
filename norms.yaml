- norm_id: STD_721
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Подсказки на форме
  norm_text: 'Подсказки на форме Область применения: управляемое приложение. Подсказки рекомендуется выводить по тем элементам интерфейса, которые требуют пояснения, расшифровки и донесения до пользователя подробного описания их назначения. Для реквизитов, используемых в ежедневной работе, подсказки добавлять не следует. В тексте подсказки не рекомендуется приводить инструкции и объяснять работу реквизита, вместо этого следует оптимизировать сценарии работы, с ним связанные. Текстовые подсказки к полям рекомендуется прятать в гиперссылке "?" Для этого в Конфигураторе устанавливается режим отображения подсказки "Кнопка". Если в подсказку, помимо обычного текста, необходимо добавить ссылки, иконки или использовать форматированный текст, то следует использовать "расширенную" подсказку. Не рекомендуется выводить в подсказке много текста (более 255 символов, включая пробелы). Если потребуется более длинная подсказка, то в ней можно дать ссылку на статью ИТС с подробным описанием. Текстовые подсказки к настройкам следует выводить внизу — под настройкой.'
  tags:
  - advisory
