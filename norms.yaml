  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Формы выбора
  norm_text: 'Формы выбора Область применения: управляемое приложение. Рекомендуется не создавать формы выбора, а использовать генерируемые платформой по умолчанию. Если, в соответствии с прикладной логикой, в форме выбора нужно предусмотреть особенный состав команд или колонок, то можно создать форму выбора, следуя рекомендациям В командной панели формы рекомендуется размещать минимально необходимый набор команд для выбора, создания нового и поиска/отбора. В часто используемых формах выбора из больших наборов данных рекомендуется делать область быстрого отбора/поиска. Состав колонок следует оптимизировать для быстрого визуального поиска данных'
