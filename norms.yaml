  norm_text: 'Ограничения на использование экспортных процедур и функций Область применения: управляемое приложение, мобильное приложение, обычное приложение. Не следует размещать экспортные процедуры и функции в модулях команд и общих команд. К этим модулям нет возможности обращаться из внешнего по отношению к ним кода, поэтому экспортные процедуры и функции в этих модулях не имеют смысла.'
