  category: data_model_registers
  title: 'Группы элементов формы'
  norm_text: 'Область применения: управляемое приложение. Количество элементов в группе Нет необходимости делать группы, содержащие один элемент. Рекомендуется размещать в группах 4-9 элементов. В случае если элементов более 9 необходимо разбить их на две и более группы. Оформление заголовка группы Заголовок может использоваться в качестве расшифровки или пояснения, если из названий реквизитов не достаточно понятно их назначение. Не рекомендуется использование заголовка, если группа одна и расположена на странице панели (вкладке).'
