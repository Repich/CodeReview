  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Заголовки списков
  norm_text: 'Заголовки списков Область применения: управляемое приложение. Количество элементов следует показывать только в тех случаях, когда это уместно и помогает пользователю решить какую-либо задачу. Например, в карточке внутреннего документа количество в заголовке списка файлов показывает, с каким числом файлов нужно ознакомиться пользователю: 2.2. Если в заголовке конкретного списка принято выводить количество элементов, то это нужно делать во всех формах программы, где этот список используется и решает аналогичные задачи. В пустом списке количество элементов выводить не требуется. Например, вкладка "Товары" в документе "Счет на оплату покупателю": В остальных случаях заголовок списка рекомендуется показывать.'
