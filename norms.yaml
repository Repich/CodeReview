- norm_id: STD_413
  section: Система стандартов 2025
  category: queries_performance
  title: Использование параметров сеанса
  norm_text: 'Использование параметров сеанса Область применения: управляемое приложение, мобильное приложение, обычное приложение. Инициализацию параметров сеанса следует выполнять в модуле сеанса (см. ниже раздел 2.1), а их значения рекомендуется использовать в запросах и условиях ограничения доступа к данным для текущего сеанса. Не рекомендуется использовать параметры сеанса для хранения значений, используемых исключительно в клиентской логике. В таких случаях следует использовать глобальные переменные модуля управляемого приложения (и обычного приложения – для режима обычного приложения, соответственно). Также не рекомендуется использовать параметры сеанса для кеширования вычисленных значений, которые многократно используются в серверной бизнес-логике. В таких случаях следует определять функцию в серверном общем модуле с повторным использованием возвращаемых значений. Исключение составляют случаи, когда время вычисления результата функции модуля с повторным использованием возвращаемых значений соизмеримо с периодом сброса платформенного кеша.'
  tags:
