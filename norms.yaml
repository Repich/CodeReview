- norm_id: LIB_OVERRIDES_04
  section: Переопределяемые и поставляемые объекты библиотеки
  category: code_style
  title: 'При обновлении библиотеки внимательно проверяйте модули корневого объекта'
  norm_text: 'Для настройки в конфигурации переопределяемых общих модулей рекомендуется придерживаться общего подхода: При первой настройке переопределяемого общего модуля следует ознакомиться с документацией к его экспортным процедурам и функциям, приведенной в комментариях к ним. И при необходимости вписать реализацию в экспортные процедуры и функции модуля. При каждом обновлении переопределяемого общего модуля требуется перенести новые экспортные процедуры и функции, удалить устаревшие и убедиться, что комментарии, количество и имена параметров у всех функций совпадают с их библиотечными эквивалентами. При необходимости вписать реализацию в новые экспортные процедуры и функции модуля, а также актуализировать реализацию уже существующих функций, если в новой версии библиотеки было изменено их назначение или состав параметров.'
  tags:
  - advisory
  - code-style
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: architecture
