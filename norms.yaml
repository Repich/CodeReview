- norm_id: STD_784
  section: Система стандартов 2025
  category: data_model_registers
  title: 'Автогенерированные данные в информационной базе: требования'
  norm_text: 'Автогенерированные данные в информационной базе: требования по локализации Область применения: управляемое приложение, мобильное приложение, обычное приложение. Автогенерируемые строки, которые программно записываются в информационную базу и выводятся пользователям, необходимо формировать не на языке текущего пользователя, а на языке информационной базы.'
