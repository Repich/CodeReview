  title: Строковый идентификатор типа события
  norm_text: 'Как правило, список типов событий в конфигурации может быть сколь угодно большим, поэтому типы событий рекомендуется группировать по функциональному признаку: «Название группы событий.Название события». Например, правильно записывать события с типами «Поручения.Уведомление о новых задачах» «Поручения.Уведомление о зависших задачах» вместо двух «плоских» типов событий: «Уведомление о новых задачах» «Уведомление о зависших задачах» Тип события предназначен для отбора однотипных записей из журнала регистрации, поэтому неправильно включать в него любую избыточную информацию – конкретные значения из информационной базы или внешних систем.'
