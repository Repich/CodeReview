- norm_id: STD_739
  section: Система стандартов 2025
  category: metadata_design
  title: Размещение сведений о настройках подсистемы
  norm_text: 'Размещение сведений о настройках подсистемы Область применения: управляемое приложение, обычное приложение. При выборе места размещения таких настроек следует руководствоваться следующими принципами. Настройки подсистемы, общие для всех объектов или для группы объектов метаданных, рекомендуется задавать в переопределяемом модуле. Например, определение настроек подсистемы Варианты отчетов, общих для всех отчетов в общем модуле ВариантыОтчетовПереопределеяемый: Процедура ПриОпределенииНастроек(Настройки) Экспорт Настройки.ВыводитьОтчетыВместоВариантов = Истина; Для определения списка объектов конфигурации, с которыми работает подсистема, не следует использовать перебор объектов метаданных с конструкцией Попытка Исключение. Вместо этого, рекомендуется создавать отдельную процедуру переопределяемого модуля, в которой перечислять такие объекты. Процедуры, позволяющие переопределить бизнес-логику сразу для всех объектов, с которыми работает подсистема, также рекомендуется размещать в переопределяемом модуле.'
