  source_standard: '#std453'
  source_reference: 'Система стандартов 2025, #std453 п.1'
  source_excerpt: |
    Описание процедур и функций рекомендуется выполнять в виде комментария к ним. Необходимость
    комментирования отдельных участков кода процедур и функций должна определяться разработчиком
