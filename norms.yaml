  norm_text: 'Обработчик события ПередУдалением Область применения: управляемое приложение, мобильное приложение, обычное приложение. В данном обработчике модуля объекта, как правило, должны выполняться действия, которые необходимо выполнить перед удалением объекта. Все действия в процедуре-обработчике события ПередУдалением должны выполняться после проверки на ОбменДанными.Загрузка. они не должны выполняться перед удалением объекта через механизм обмена данными, так как это может привести к ошибкам.'
