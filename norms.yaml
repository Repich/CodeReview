- norm_id: STD_667
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Элементы стиля
  norm_text: 'Элементы стиля Область применения: управляемое приложение. Умолчаний следует придерживаться в большинстве случаев — это позволяет обеспечить единообразное оформление всех форм. Для изменения оформления следует использовать элементы стиля, а не задавать конкретные значения непосредственно в элементах управления. Это требуется для того, чтобы аналогичные элементы управления выглядели одинаково во всех формах, где они встречаются. Элементы стиля нужно использовать всегда, когда требуется изменить оформление (Цвет, Шрифт, Рамку), установленные по умолчанию. Цвет таких надписей следует задавать в виде элемента стиля "ИнформационнаяНадпись", а не в виде значения RGB или выбора цвета web/windows: Хорошо Плохо 2. Не следует использовать элементы стиля для того, чтобы подменить оформление, которое используется по умолчанию в платформе. Например, для гиперссылок нужно использовать цвет, предусмотренный в платформе, а не создавать для него свой элемент стиля с точно таким же цветом: Хорошо Плохо 3.'
