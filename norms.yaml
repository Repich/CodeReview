- norm_id: STD_762
  section: Система стандартов 2025
  category: queries_performance
  title: 'Запросы, динамические списки и отчеты на СКД: требования'
  norm_text: 'Запросы, динамические списки и отчеты на СКД: требования по локализации Область применения: управляемое приложение, мобильное приложение, обычное приложение. В таких случаях строковые литералы необходимо выносить из текста запроса в параметры. Например, если в выражении для параметров СКД встречаются строковые константы, требующие перевода, то следует: а) в запросе указывать строковые константы, соответствующие "Правилам образования имен переменных" (""ЗавершитеСозданиеДокументов" КАК Рекомендация "), а в списке доступных значений поля указать локализуемый строковый литерал ("Завершите создание документов"); Для колонок отчета на СКД для поля выборки, полученного вычислением с заданием ему псевдонима, необходимо задавать синоним при разработке. Нельзя опираться на автоматически сгенерированный заголовок по имени/псевдониму. Для заголовков отчетов СКД, полей, вычисляемых полей и параметров допустимо использовать параметры подстановки через функцию СтрШаблон: %1, %2 и т.д.'
  tags:
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std762'
