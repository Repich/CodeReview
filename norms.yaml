  auto_actionable: false
- norm_id: STD_722
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Компоновка форм
  norm_text: 'Компоновка форм Область применения: управляемое приложение. Внутри одной формы все заголовки для однострочных полей ввода, переключателей, тумблеров следует располагать одинаково – или слева, или сверху. Правильно Неправильно Заголовки многостраничных полей рекомендуется располагать в зависимости от общей композиции формы. Если в группе однострочных полей заголовок одного поля существенно длиннее остальных заголовков, рекомендуется сократить название заголовка этого поля или переносить часть такого заголовка на другие строки. Поля взаимосвязанных реквизитов, находящиеся в одной группе, должны выравниваться по опорной линии. Элементы, которые в разных формах выполняют одну и ту же функцию, следует называть одинаково и всегда выводить примерно в одном и том же месте. Если один из элементов интерфейса влияет на другие элементы, то он должен быть расположен до этих элементов (выше или левее, в зависимости от ситуации). При работе с формой пользователь сначала должен выполнить действия, связанные с основным элементом, а потом уже перейти к работе с зависимыми.'
  tags:
  - advisory
  - forms
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
