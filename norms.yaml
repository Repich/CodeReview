- norm_id: STD_477
  section: Система стандартов 2025
  category: queries_performance
  title: Самодостаточность регистров
  norm_text: 'Самодостаточность регистров Область применения: управляемое приложение, мобильное приложение, обычное приложение. При разработке структуры регистров необходимо придерживаться правила, что регистр должен быть логически независим от регистраторов. Любая логика, опирающаяся или анализирующая данные регистра, а также любые отчеты по этому регистру не должны обращаться к полям регистратора, им должно быть достаточно данных самого регистра.'
