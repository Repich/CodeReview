- norm_id: REG_TASK_LIMIT_05
  section: Ограничения на регламентные задания при работе в модели
  category: background_jobs
  title: Если сценарий работы подразумевает оперативную реакцию системы (обновление информации), которую
  norm_text: 'Если сценарий работы подразумевает оперативную реакцию системы (обновление информации), которую очередь регламентных заданий не обеспечивает, то следует рассмотреть другие решения. Если имеется техническая возможность настроить получение push-уведомлений от системы, с которой требуется обмен информацией, то не следует использовать регламентное задание. Вместо этого следует загружать данные только при получении уведомления, а отправлять данные только при наличии потребности в этом. В иных случаях рекомендуется оставить регламентное задание (которое работает через очередь заданий) и организовать оперативное получение и отправку данных в то время, когда пользователь фактически работает в программе в том рабочем месте, в котором он ожидает оперативное обновление информации. С помощью клиентского обработчика ожидания выполняется регулярная отправка и получение писем с необходимой периодичностью, независимо от очереди заданий (*). При этом оперативное взаимодействие с почтовыми серверами выполняется только тогда, когда оно действительно требуется – при фактической работе со списком писем.'
  tags:
  - advisory
  - reg-tasks
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: process
