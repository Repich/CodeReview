- norm_id: STD_625
  section: Система стандартов 2025
  category: governance_release
  title: Картинки (иконки) в названии команд
  norm_text: 'Картинки (иконки) в названии команд Область применения: управляемое приложение. Использовать картинки (иконки) необходимо в тех случаях, когда есть уверенность четкой трактовки функции, которая будет выполнена. А также в случаях, когда необходимо выделить команду на фоне других. Если в командной панели только одна команда, то она обязательно должна иметь картинку. Только картинка Картинки можно использовать без подписи в случаях, если это стандартные функции, такие как: сохранить, удалить, редактировать, скопировать и т.п., а также часто используемые функции.'
