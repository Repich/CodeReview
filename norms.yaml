  norm_text: 'Запись событий в историю работы пользователя Область применения: управляемое приложение. В историю работы автоматически попадают события интерактивного добавления или изменения объектов информационной базы (документов, элементов справочника и пр.) Дополнительно рекомендуется записывать в историю работы пользователя и другие события, которые приводят к записи объектов в результате действий пользователя.'
