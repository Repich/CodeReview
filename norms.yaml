- norm_id: STD_558
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Обновление списков при интерактивных действиях
  norm_text: 'Обновление списков при интерактивных действиях пользователя Область применения: управляемое приложение, мобильное приложение. Но в ряде ниже перечисленных случаев такое обновление следует предусмотреть явно в прикладном коде. Команды, которые изменяют объекты и размещаются в форме списка, должны заботиться об обновлении списка объектов после своего выполнения. Например, после изменения одного объекта рекомендуется вызывать метод ОповеститьОбИзменении: &НаКлиенте Процедура ОбработкаКоманды(ПараметрКоманды, ПараметрыВыполненияКоманды) ОбъектСсылка = ПараметрКоманды; Если данные добавляются или изменяются командой, расположенной в форме динамического списка, то необходимо обновить список явно после выполнения команды. Если данные изменяются в какой-либо другой форме (например, в форме объекта), то необходимо организовать обновление списка через оповещение. Для этого в каждой форме объекта, данные которого выводятся в динамическом списке, следует реализовать обработчик события ПослеЗаписи с использованием метода Оповестить: Оповестить ("Запись_<ИмяОбъекта>", ПараметрыОповещения, ОбъектСсылка)'
  tags:
  - advisory
  - forms
  - ui
  scope: см. оригинальный стандарт
