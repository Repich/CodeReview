  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Частотные кнопки
  norm_text: 'Частотные кнопки Область применения: управляемое приложение. Для оформления кнопок с часто используемыми действиями (частотных кнопок) рекомендуется использовать текст совместно с картинкой. Картинка, размещенная на кнопке, также может использоваться в строке табличной части для дополнительной идентификации типа данных, к которому применима данная команда. Кнопки, не предназначенные для решения основных задач Пункты меню, не предназначенные для решения основных задач, а исполняющих команды, предназначенные для специализированных целей или особой группы пользователей, рекомендуется помещать в подменю.'
