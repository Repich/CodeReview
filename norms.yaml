- norm_id: STD_643
  section: Система стандартов 2025
  category: metadata_design
  title: Работа в разных часовых поясах
  norm_text: 'Работа в разных часовых поясах Область применения: управляемое приложение, обычное приложение. Конфигурации должны быть рассчитаны на работу в условиях, когда часовой пояс на серверном компьютере не совпадает с реальным часовым поясом пользователей информационной базы. Например, с сервером, расположенным в Москве, работают сотрудники компании из Владивостока, и при этом все операции в системе должны выполняться по местному времени (Владивостока). Во всех серверных процедурах и функциях вместо функции ТекущаяДата, которая возвращает дату и время серверного компьютера, следует использовать функцию ТекущаяДатаСеанса, которая приводит время сервера к часовому поясу пользовательского сеанса. В тех случаях, когда требуется «универсальная» отметка времени, не зависящая от часового пояса текущего сеанса пользователя, в контексте которого выполняется серверный вызов, следует использовать функцию УниверсальноеВремя. При использовании методов платформы, возвращающих локальную дату серверного компьютера, следует приводить ее либо к универсальному времени, либо к времени пользовательского сеанса.'
  tags:
  - advisory
  - metadata
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std643'
