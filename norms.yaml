  title: Технология разветвленной разработки конфигураций
  norm_text: 'Технология разветвленной разработки конфигураций Область применения: управляемое приложение, мобильное приложение, обычное приложение. Исправительная версия – версия, которая выпускается при необходимости срочной публикации исправлений критичных ошибок. Каждый технический проект имеет четко сформулированную цель и конечный список изменений, которые нужно выполнить, чтобы достигнуть этой цели. ведению информации о технических проектах и списка ошибок) рекомендутся использовать Систему проектирования прикладных решений (СППР). Важно – нужно создавать новое хранилище, а не копировать основное!'
