  title: Таймауты при работе с внешними ресурсами
  norm_text: 'Таймауты при работе с внешними ресурсами Область применения: управляемое приложение, обычное приложение. 1. При работе с внешними ресурсами с помощью объектов WSОпределения, WSПрокси, HTTPСоединение, FTPСоединение, ИнтернетПочтовыйПрофиль следует задавать таймаут – предельное время ожидания выполнения операции.'
