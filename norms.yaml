  title: Отступы
  norm_text: 'Отступы Область применения: обычное приложение. Обычное приложение При размещении элементов управления рекомендуется использовать отступы от края формы или панели. Величину отступа рекомендуется делать такой, которая устанавливается по умолчанию при создании новой формы или новой панели. Для формы рекомендуется устанавливать следующие отступы: сверху 8 или 33, если размещена верхняя командная панель; Для панели рекомендуется устанавливать следующие отступы: сверху 6'
