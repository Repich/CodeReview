- norm_id: STD_649
  section: Система стандартов 2025
  category: data_model_registers
  title: Реквизиты
  norm_text: 'Реквизиты Область применения: управляемое приложение. • Рекомендуется всегда оставлять на форме стандартные поля, такие как наименование, номер и дата (для документов и задач). • Если для реквизита предусмотрен выбор из списка, а в списке имеется только один вариант, его следует подставлять по умолчанию. • При создании на основании необходимо заполнять все наследуемые реквизиты. При формировании командных панелей однотипные команды рекомендуется объединять в подменю. Если в подменю есть команды, в заголовках которых присутствует общий текст, то его следует выносить в заголовок подменю: Правильно Неправильно 3. В этом случае ее следует выносить в командную панель: Правильно Неправильно'
