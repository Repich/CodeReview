- norm_id: STD_449
  section: Система стандартов 2025
  category: queries_performance
  title: 'Получение представлений для ссылочных значений'
  norm_text: 'Получение представлений для ссылочных значений в табличном документе Область применения: управляемое приложение, мобильное приложение, обычное приложение. Методическая рекомендация (полезный совет) При формировании табличного документа запрещено в качестве параметров ячеек с типом заполнения Параметр указывать ссылочные значения, поскольку в этом случае в момент вывода данных в табличный документ будет выполнено многократное обращение к базе данных для получения представлений этих значений. Поэтому в качестве параметров следует указывать сами представления. Исключением могут быть случаи, когда для получения представлений придется выполнять аналогичное многократное обращение к базе данных. При этом следует иметь ввиду, что при получении представлений для полей непосредственно в самом запросе (через поле Представление или функцией Представление(<Имя поля>)) выполняется неявное соединение с таблицей объекта, для которого получаются представления. Такие случаи также могут быть исключением для данного правила, в них представления для ссылочных значений допускается получать в момент их вывода в табличный документ.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
