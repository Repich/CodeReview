- norm_id: STD_611
  section: Система стандартов 2025
  category: data_model_registers
  title: Панель навигации вспомогательного окна
  norm_text: 'Панель навигации вспомогательного окна Область применения: управляемое приложение. Если нужно отображать в форме объекта (документа, справочника) какую-то дополнительную информацию (не хранящуюся в самом объекте), связанные списки, отчеты, и т.п., то это следует реализовывать с помощью команд, отображаемых в панели навигации вспомогательного окна, а не путем помещения этой информации в саму форму (в том числе и на отдельные закладки). Для частотных и важных форм рекомендуется вручную настраивать видимость команд в ПН, отбирая только команды перехода к важным для пользователя сведениям. Рекомендуется размещать в ПН не более 10 команд. Не следует размещать в панели команды перехода к другим формам для редактирования реквизитов объекта. Открывать форму элемента из панели навигации окна другой формы элемента недопустимо.'
  tags:
