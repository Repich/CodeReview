  title: 'В случае, когда подсистема или отдельный объект в большей части является международным'
  norm_text: 'В случае, когда подсистема или отдельный объект в большей части является международным, но при этом очевидна необходимость реализации некоторой национальной специфики, рекомендуется создавать общие модули с постфиксом Локализация. Процедуры должны размещаться в области ПрограммныйИнтерфейс. При этом в международной поставке модули с постфиксом Локализация не должны содержать прикладного кода. В национальной конфигурации код внутри процедур следует обрамлять комментариями Локализация и Конец Локализация. Если международная поставка изготавливается из национальной, то такие фрагменты кода должны удаляться из прикладного кода, включая обрамляющие комментарии. // Конец Локализация КонецПроцедуры В международной поставке: Процедура ПриОпределенииСимволовНациональногоАлфавита(СимволыНациональногоАлфавита, ДополнительныеДопустимыеСимволы) Экспорт КонецПроцедуры При этом не следует обрамлять комментариями Локализация и Конец Локализация фрагменты кода, содержащие национальную (российскую) специфику любых других объектов и модулей.'
