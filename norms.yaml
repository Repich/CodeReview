- norm_id: STD_663
  section: Система стандартов 2025
  category: transactions_locks
  title: Режим разделения итогов для регистров бухгалтерии
  norm_text: 'Режим разделения итогов для регистров бухгалтерии Область применения: управляемое приложение, обычное приложение. 1. Если в системе осуществляется оперативная запись движений по бухгалтерскому регистру в многопользовательском режиме, то рекомендуется включить для данного регистра режим разделения итогов. При включенном режиме разделения итогов пользователи смогут параллельно обновлять таблицу остатков даже в том случае, если у них совпадает период, счет и значения измерений.'
  tags:
