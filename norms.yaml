- norm_id: STD_696
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Формы пошаговых помощников (мастеров)
  norm_text: 'Формы пошаговых помощников (мастеров) Область применения: управляемое приложение. В качестве названия для этой кнопки следует использовать глагол, характеризующий действие, которое будет выполнено при нажатии на нее. В случае если такое название подобрать сложно, можно использовать слово "Г отово". Название "ОК" лучше не использовать, т.к. Если эта информация выводится справочно, и от пользователя не требуется выполнять никаких дополнительных действий, то в качестве кнопки по умолчанию используется кнопка "Закрыть". В случае если пользователь ввел какие-либо данные в форме, то при нажатии на кнопку "Отмена" следует выдавать сообщение с вопросом об их сохранении. Если подобной информации не предусмотрено, то кнопку "Справка" отражать не нужно.'
