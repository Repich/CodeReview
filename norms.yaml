- norm_id: STD_540
  section: Система стандартов 2025
  category: data_model_registers
  title: Общие требования к регламентным заданиям
  norm_text: 'Общие требования к регламентным заданиям Область применения: управляемое приложение, обычное приложение. В общем случае, регламентные задания следует использовать, когда необходимо выполнить определенные периодические или однократные действия в соответствии с расписанием. При этом если регламентные задания не требуется добавлять или удалять в зависимости от действий пользователя или логики конфигурации, следует использовать предопределенные регламентные задания. Недопустимо выполнять регламентные задания, если соответствующая им функциональность отключена в программе. Для этого необходимо программно управлять признаком предопределенного регламентного задания Использование в зависимости от включенных функциональных опций (ФО). Например, имеем регламентное задание ПолучениеИОтправкаЭлектронныхПисем (с установленным флажком Использование), которое должно выполняться только в том случае, если установлена ФО ИспользоватьПочтовыйКлиент. Дополнительно следует обезопасить выполнение регламентного задания, включенного через консоль или другим способом, минуя включение ФО, вставив в начало процедуры обработки регламентного задания следующий код: ОбщегоНазначения.ПриНачалеВыполненияРегламентн.'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std540'
  auto_actionable: false
- norm_id: STD_402
  section: Система стандартов 2025
  category: background_jobs
  title: Настройка расписания регламентных заданий
  norm_text: 'Настройка расписания регламентных заданий Область применения: управляемое приложение, обычное приложение. При разработке регламентных заданий необходимо выбирать время и интервал запуска, исходя из прикладного назначения регламентных заданий, а также руководствуясь соображением, что частое выполнение регламентных заданий может негативно влиять на производительность сервера приложений 1С:Предприятие: регламентное задание не должно выполняться чаще, чем это нужно с прикладной точки зрения; исключения могут составлять случаи, когда критичным является частое выполнение заданий с прикладной точки зрения, например, для поддержания актуальности данных за короткий период; ни в каких случаях не следует задавать периодичность выполнения регламентных заданий меньше одной минуты; выполнение ресурсоемких регламентных операций необходимо по возможности переносить на время минимальной загрузки сервера приложений 1С:Предприятие.'
  tags:
  - reg-tasks
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std402'
  auto_actionable: false
- norm_id: STD_539
  section: Система стандартов 2025
  category: background_jobs
  title: Запуск регламентных заданий
  norm_text: 'Запуск регламентных заданий Область применения: управляемое приложение, обычное приложение. Рекомендуется предоставлять пользователям альтернативную возможность по выполнению регламентных заданий вручную. В случае если регламентное задание изменяет в системе некоторые данные, которые необходимы определенному бизнес-процессу или выводятся в конкретном «рабочем месте» (форме), то в таких «рабочих местах» дополнительно рекомендуется размещать команду для выполнения этого действия. В этом случае рекомендуется заводить отдельное рабочее место для выполнения таких регламентных заданий. В тех же случаях когда регламентное задание не изменяет данные в системе, а формирует различные отчеты или рассылки из нее, также рекомендуется предусматривать отдельное рабочее место для выполнения таких регламентных заданий. Однако если обновление выполняет неподготовленный пользователь, в особенности, в файловом режиме работы, то рекомендуется дополнительно предусмотреть следующие меры: в файловом режиме работы, при неудачной попытке установки монопольного режима для обновления данных ИБ предлагать автоматически блокировать работу регламентных заданий (перезапуск программы с ключом командной строки /All.'
  tags:
  - advisory
  - reg-tasks
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std539'
  auto_actionable: false
- norm_id: STD_760
  section: Система стандартов 2025
  category: data_model_registers
  title: Ограничения на регламентные задания при работе в модели
  norm_text: 'Ограничения на регламентные задания при работе в модели сервиса Область применения: управляемое приложение. Если требуется обеспечить регулярное выполнение определенного программного кода в приложениях пользователя, размещенных в разделенной информационной базе, необходимо использовать возможности подсистемы БТС Очередь заданий, либо разработать аналогичный механизм очереди заданий самостоятельно. Необходимо в начале каждого месяца во всех приложениях выполнять регламентную операцию пересчета итогов регистров накопления. Необходимо при включенной функциональной опции Обмен с сайтом ежедневно выполнять обмен с указанным в настройках сайтом. Задание из примера № 2 необходимо выполнить от имени определенного пользователя. Для управления регламентными заданиями необходимо использовать программный интерфейс БСП, реализованный в модуле РегламентныеЗаданияСервер. Следует учитывать, что подсистема Очередь заданий не гарантирует выполнение регламентного задания в точном соответствии с указанным расписанием.'
  tags:
  - advisory
  - data-model
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std760'
  auto_actionable: false
- norm_id: STD_437
  section: Система стандартов 2025
  category: queries_performance
  title: Оформление текстов запросов
  norm_text: 'Оформляйте текст запросов по единому стилю: ключевые слова — заглавными, конструкции — явными, полям и таблицам задавайте понятные псевдонимы. Такой формат повышает читаемость, снижает риск ошибок при изменениях и упрощает оптимизацию запросов.'
