  title: Общие требования к конфигурации
  norm_text: 'Общие требования к конфигурации Область применения: управляемое приложение, мобильное приложение, обычное приложение. Конфигурация должна использовать только штатные и документированные возможности платформы 1С:Предприятие. Область применения (уточнение): управляемое приложение, обычное приложение. В частности, в веб-клиенте все ключевые возможности конфигурации должны быть доступны пользователям без использования расширения работы с файлами, а взаимодействие с пользователем должно быть организовано асинхронно. Для этого рекомендуется свойство конфигурации «Использовать управляемые формы в обычном приложении» установить в Истина, а свойство «Использовать обычные формы в управляемом режиме» – в Ложь. не рекомендуется отходить от умолчаний платформы 1С:Предприятие. Имена, синонимы, комментарии объектов метаданных, общих модулей, а также любая текстовая информация (которая выводится пользователю или предназначена для разработчика/ внедренца) должны быть составлены по правилам русского языка и, в частности, не должны содержать грамматических ошибок.'
