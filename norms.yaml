- norm_id: STD_399
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Запрет редактирования полей таблицы по условию
  norm_text: 'Запрет редактирования полей таблицы по условию Область применения: управляемое приложение. Методическая рекомендация (полезный совет) В некоторых случаях требуется предупредить пользователя о том, что ввод тех или иных данных в таблице управляемой формы не имеет смысла или вообще не может быть выполнен до заполнения других полей таблицы. В таких случаях рекомендуется применять описанный ниже прием. КонецПроцедуры &НаКлиенте Процедура ЗатратыСтатьяЗатратПриИзменении(Элемент) УстановитьПредупреждениеПриРедактировании() КонецПроцедуры &НаКлиенте Процедура ЗатратыАналитикаСтатьиЗатратПриИзменении(Элемент) УстановитьПредупреждениеПриРедактировании() КонецПроцедуры В том случае если от некоторых условий зависит не только сама необходимость предупреждения, но и текст самого предупреждения, следует управлять из встроенного языка не только свойством поля ОтображениеПредупрежденияПриРедактировании, но и свойством ПредупреждениеПриРедактировании.'
  tags:
  - advisory
  - forms
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
