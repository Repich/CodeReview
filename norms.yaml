  title: Баланс включений безопасного режима
  norm_text: 'Количество вызовов УстановитьБезопасныйРежим(Истина) должно совпадать с количеством выключений УстановитьБезопасныйРежим(Ложь). Превышение выключений вызывает исключение, а незавершённый безопасный режим автоматически отключается при выходе.'
