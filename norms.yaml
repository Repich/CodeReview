  source_standard: '#std763'
  auto_actionable: false
- norm_id: STD_764
  section: Система стандартов 2025
  category: queries_performance
  title: 'Строковые константные выражения в коде: требования'
  norm_text: 'Строковые константные выражения в коде: требования по локализации Область применения: управляемое приложение, мобильное приложение, обычное приложение. К ним не следует применять функцию НСтр. При этом, такие строковые идентификаторы должны именоваться по правилам именования идентификаторов переменных встроенного языка. В алгоритмах программы не следует использовать представления объектов и типов. Для получения предопределенного значения на клиенте следует указывать его строковое имя, как оно указано в конфигураторе.'
