  norm_text: 'Список, открываемый из панели навигации формы объекта Область применения: управляемое приложение. Список, открываемый из панели навигации формы объекта, следует отражать с отбором по этому объекту. В списке не следует выводить название объекта (в виде надписи или поля ввода в режиме "просмотр"), т.к. В списке не следует отражать колонку с названием объекта, т.к. В названии команды, отражаемой в панели навигации, не следует указывать название объекта, т.к.'
