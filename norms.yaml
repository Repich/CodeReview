- norm_id: RENAME_LIMITS_01
  section: Ограничения на переименование объектов метаданных
  category: data_model_registers
  title: 'Если в конфигурации не используется Библиотека стандартных подсистем (БСП)'
  norm_text: 'Если в конфигурации не используется Библиотека стандартных подсистем (БСП), то рекомендуется заводить строковые реквизиты (Строка, 255) для хранения полных имен объектов метаданных. При этом если в конфигурации переименовываются (или удаляются) какие-либо объекты метаданных, то при обновлении информационной базы требуется также предусмотреть соответствующую замену (удаление) всех имен, хранимых в базе.'
  tags:
  - advisory
  - data-model
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: architecture
- norm_id: RENAME_LIMITS_02
  section: Ограничения на переименование объектов метаданных
  category: metadata_design
  title: 'При использовании в конфигурации Библиотеки стандартных подсистем (БСП) следует'
  norm_text: 'При использовании в конфигурации Библиотеки стандартных подсистем (БСП) следует использовать ссылки на справочник ИдентификаторыОбъектовМетаданных, который централизованно хранит ссылки на имена объектов метаданных конфигурации, автоматически отслеживает переименования, удаления и добавление объектов метаданных и позволяет избежать массовых операций по замене имен в таблицах; а также позволяет сократить размер записей таблиц (ссылка вместо строки длиной 255), что улучшает общую производительность системы. Исключение составляют роли и подсистемы, для которых автоматически не отслеживаются переименования, и для них требуется в явном виде описать переименования.'
  tags:
  - metadata
  scope: разработка
  code_applicability: true
  automation_hint: mixed
  check_type: semantic
  default_severity: major
  detector_type: architecture
- norm_id: RENAME_LIMITS_03
  section: Ограничения на переименование объектов метаданных
  category: data_model_registers
  title: 'При этом справочник ИдентификаторыОбъектовМетаданных не предназначен для хранения ссылок'
  norm_text: 'При этом справочник ИдентификаторыОбъектовМетаданных не предназначен для хранения ссылок на объекты метаданных других конфигурации (например, в механизмах интеграции с другими системами). Для этих целей рекомендуется использовать строковые реквизиты и реализовывать специальные механизмы по поддержанию актуальности их значений.'
  tags:
  - advisory
  - data-model
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: architecture
- norm_id: RENAME_LIMITS_04
  section: Ограничения на переименование объектов метаданных
  category: metadata_design
  title: 'В случаях, когда ведется две и более параллельных «веток» разработки, например'
  norm_text: 'В случаях, когда ведется две и более параллельных «веток» разработки, например, выпускаются версии 2.0 и 3.0 (или организован выпуск исправительных релизов параллельно с выпуском новых функциональных релизов) нужно учесть следующее: в текущей и младших версиях конфигурации запрещается переименование с последующим созданием нового объекта метаданных с тем же полным именем, а также двойное переименование. Правильно выполнять такие переименования только в самой последней версии – 3.0.'
  tags:
  - metadata
  scope: разработка
  code_applicability: true
  automation_hint: mixed
  check_type: semantic
  default_severity: major
  detector_type: architecture
