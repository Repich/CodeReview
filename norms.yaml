  norm_text: 'Использование сочетаний клавиш, список зарезервированных сочетаний Область применения: управляемое приложение. Для часто выполняемых или общеупотребимых действий рекомендуется назначать сочетания клавиш. Для действий, приведенных в таблицах, назначение указанных сочетаний клавиш обязательно.'
