- norm_id: STD_397
  section: Система стандартов 2025
  category: metadata_design
  title: Организация работы со списками данных с помощью
  norm_text: 'Организация работы со списками данных с помощью общих команд Область применения: управляемое приложение. В некоторых случаях возникает необходимость в разработке специализированных форм списков, которые должны использоваться в том или ином сценарии работы пользователя и команды которых должны быть расположены в разных разделах командного интерфейса (разных "рабочих местах" пользователей). Для того чтобы обеспечить отсутствие дублирования кода форм списков, облегчить их поддержку и, вместе с тем, обеспечить их использование в разных разделах командного интерфейса программы, рекомендуется следующее решение: Разработать параметризуемую форму списка объекта, которая при создании формы на сервере на основании переданных параметров обеспечит разные прикладные свойства: тот или иной состав колонок, те или иные отборы и порядок элементов, а также параметризуемый заголовок формы. При этом заголовок открываемой формы должен соотвествовать названию команды.'
  tags:
  - advisory
  - metadata
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
