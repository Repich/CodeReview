- norm_id: STD_615
  section: Система стандартов 2025
  category: data_model_registers
  title: Рабочее место
  norm_text: 'Рабочее место Область применения: управляемое приложение. обеспечивать пользователя актуальной информацией, необходимой для правильного и быстрого выполнения бизнес-операций. Продумайте оптимальное выполнение действий: без необходимости переключения в другие интерфейсы. Предусмотрите, в случае необходимости, переход к косвенным задачам (рабочим местам). Названия рабочим местам следует давать по смыслу решаемых ими задач. В названиях рабочих мест не рекомендуется использовать словосочетание «рабочее место». Не рекомендуется размещать внедренную справку на рабочем месте. Для реализации внедренной справки следует указывать подсказку элемента формы с режимом отображения «Снизу», используя стиль "ПоясняющийТекст" RGB (128, 122, 89). В качестве исключения, если нет возможности добиться желаемого визуального эффекта с помощью подсказки элемента, можно использовать декорацию «Надпись».'
