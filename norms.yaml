- norm_id: STD_697
  section: Система стандартов 2025
  category: data_model_registers
  title: Использование предопределенных элементов
  norm_text: 'Использование предопределенных элементов Область применения: управляемое приложение, мобильное приложение, обычное приложение. В большинстве случаев, предопределенные элементы рекомендуется создавать автоматически, поскольку они постоянно нужны и требуется упростить обращение к этим элементам из кода. Для этого в свойстве ОбновлениеПредопределенныхДанных справочника, плана счетов, плана видов характеристик или плана видов расчета должно быть установлено значение Авто (по умолчанию), а также не следует допускать программных вызовов метода УстановитьОбновлениеПредопределенныхДанных этих объектов для переключения этого режима. запретить удаление предопределенных элементов пользователями, выключив во всех ролях следующие права (по умолчанию выключены): ИнтерактивноеУдалениеПредопределенныхДанных ИнтерактивнаяПометкаУдаленияПредопределенныхДанных ИнтерактивноеСнятиеПометкиУдаленияПредопределенныхДанных ИнтерактивноеУдалениеПомеченныхПредопределенныхДанных Область применения (уточнение): управляемое приложение, обычное приложение.'
