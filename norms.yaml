  auto_actionable: false
- norm_id: STD_533
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Особенности табличного документа в веб-клиенте
  norm_text: 'Особенности табличного документа в веб-клиенте Область применения: управляемое приложение. Для достижения приемлемой скорости работы форм в веб-клиенте, в которых пользователь редактирует табличный документ, необходимо придерживаться следующих рекомендаций. В случае если после изменения пользователем значения ячейки требуется выполнить перерасчет состояния формы (установить значения соседних зависимых ячеек, доступность элементов управления и т.п.), следует избегать обращений на сервер, а выполнять весь перерасчет на клиенте. В частности: вместо полного перерасчета всех ячеек документа следует «точечно» обновлять только те соседние ячейки, значения которых зависят от измененной ячейки; В тех случаях, когда серверный вызов при завершении редактирования ячейки все же необходим, следует убедиться, что вызов сервера выполняется только один. По возможности, рекомендуется использовать безконтекстные вызовы (&НаСервереБезКонтекста).'
  tags:
  - advisory
  - forms
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std533'
  auto_actionable: false
