- norm_id: STD_596
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Требования к изображениям
  norm_text: 'Требования к изображениям Область применения: управляемое приложение. Не следует использовать в конфигурациях альфа-канал у картинок, чей размер превышает 40000 точек (например, картинка 200х200 точек). Если в конфигурации делается поле HTML документа, которое будет показывать какие-либо картинки, то эти картинки нужно делать в формате PNG с 1-битным, а не 8-битным альфа- каналом, т.е. Для правильного отображения цветов в браузере рекомендуется удалять из заголовка файла PNG информацию о палитре и гамма-коррекции. Для корректного отображения картинок конфигурации во всех поддерживаемых браузерах необходимо, чтобы используемые цвета были либо полностью прозрачными, либо полностью непрозрачными. То есть компонент их прозрачности должен быть равен либо 0% либо 100%.'
