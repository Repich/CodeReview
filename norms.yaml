  title: Использование активности движений
  norm_text: 'Использование активности движений Область применения: управляемое приложение, мобильное приложение, обычное приложение. В случае если в конфигурации применяются механизмы, использующие переключение активности движений определенных регистров (например, для ручной корректировки движений), то следует придерживаться следующего подхода. ручная корректировка движений), следует отключать активность движений, а не удалять их.'
