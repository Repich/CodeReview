  norm_text: 'Общие сведения о выпуске конфигураций Область применения: управляемое приложение, мобильное приложение, обычное приложение. Выпуск новой версии должен обеспечивать переход с предыдущей с сохранением данных. Формальным, но не обязательным, признаком новой редакции является необходимость переноса данных путем конвертации. Если по каким либо причинам это невозможно, необходимо описать процедуру перехода на новую редакцию (начало работы, перенос начальных остатков и т.д.).'
