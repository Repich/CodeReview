- norm_id: STD_664
  section: Система стандартов 2025
  category: transactions_locks
  title: Режим разделения итогов для регистров накопления
  norm_text: 'Режим разделения итогов для регистров накопления Область применения: управляемое приложение, мобильное приложение, обычное приложение. При проектировании регистра накопления следует помнить, что остатки по одному набору измерений хранятся в одном ресурсе регистра. Состав измерений необходимо подбирать в соответствии с тем, насколько мелко должны быть «нарезаны» остатки, исходя из прикладной функциональности системы. В том случае, если состав измерений не позволяет обеспечить необходимую параллельность при работе с регистром, рекомендуется использовать режим разделения итогов аналогично регистрам бухгалтерии. Следует учитывать, что режим разделения итогов не обеспечит параллельность при контроле остатков по регистру. Если контроль остатков необходим, то следует перенести его как можно ближе к концу транзакции. Для снижения влияния этой блокировки на общую производительность системы нужно перенести контроль остатков как можно ближе к концу транзакции.'
  tags:
  - advisory
  - transactions
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std664'
  auto_actionable: false
- norm_id: STD_661
  section: Система стандартов 2025
  category: queries_performance
  title: Блокирующее чтение остатков в начале транзакции
  norm_text: 'Блокирующее чтение остатков в начале транзакции Область применения: управляемое приложение, мобильное приложение, обычное приложение. В ряде случаев необходимо выполнять блокирующее чтение итогов. Если в результате проведения документа остатки станут отрицательными, то транзакция должна быть отменена (проводить такой документ нельзя). Операция чтения остатков должна быть блокирующей, то есть необходимо запретить двум пользователям одновременно читать один и тот же остаток за период, счет и значение измерения. Результатом будет -4 единицы остатка, что недопустимо с точки зрения прикладной логики системы. В некоторых случаях, возможно, нет необходимости в контроле остатков, поскольку записываемые движения заведомо не могут привести к получению отрицательных остатков. Для того чтобы минимизировать влияние блокирующего чтения остатков на производительность системы, необходимо: Проанализировать, какие именно остатки нуждаются в блокирующем чтении и при каких обстоятельствах. Например, контроль остатков не требуется при проведении приходного документа, поскольку он может только увеличить остатки.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std661'
  auto_actionable: false
- norm_id: STD_456
  section: Система стандартов 2025
  category: localization
  title: Тексты модулей
  norm_text: 'Тексты модулей Область применения: управляемое приложение, мобильное приложение, обычное приложение. Тексты модулей должны быть написаны на русском языке. Исключение составляют веб-сервисы, имена методов и параметров которых рекомендуется задавать на английском языке (например, метод TestConnection веб-сервиса EnterpriseDataExchange), а также различные идентификаторы сторонних информационных систем, например, названия полей «внешних» структур данных, которые программно обрабатываются в коде. В текстах модулей не допускается использовать букву "ё". Исключения составляют интерфейсные тексты, выводимые пользователю в сообщениях, формах и справке, где употребление буквы «ё» в ряде случаев допустимо. Кроме того, в текстах модулей не допускается использовать неразрывные пробелы и знак минус "- " в других кодировках (короткое, длинное тире и т.п.). Программные модули не должны иметь неиспользуемых процедур и функций. Программные модули не должны иметь закомментированных фрагментов кода, а также фрагментов, которые каким-либо образом связаны с процессом разработки (отладочный код, служебные отметки, например, TODO, MRG и т.п.) и с конкретными разработчиками этого кода.'
  tags:
  - advisory
  - localization
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std456'
  auto_actionable: false
- norm_id: STD_455
  section: Система стандартов 2025
  category: metadata_design
  title: Структура модуля
  norm_text: 'Структура модуля Область применения: управляемое приложение, мобильное приложение, обычное приложение. Объемные разделы модулей рекомендуется разбивать на подразделы по функциональному признаку. При этом имена областей должны удовлетворять требованиям стандарта Правила образования имен переменных 1.4. В нем должны быть размещены экспортные процедуры и функции, которые допустимо вызывать только из других функциональных подсистем этой же библиотеки. Для объемных общих модулей рекомендуется разбивать этот раздел на подразделы, по функциональному признаку. Не следует в этот раздел помещать экспортные функции и процедуры, которые предназначены для вызова исключительно из модулей самого объекта, его форм и команд. Их следует размещать в разделе «Служебные процедуры и функции». Для процедур- обработчиков каждой таблицы должен быть создан свой раздел.'
  tags:
  - advisory
  - metadata
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std455'
  auto_actionable: false
