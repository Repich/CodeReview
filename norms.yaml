- norm_id: STD_741
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Открытие параметризированных форм
  norm_text: 'Открытие параметризированных форм Область применения: управляемое приложение, мобильное приложение. В случаях когда форма требует параметризации при открытии, предназначена для открытия только при помощи встроенного языка и, как следствие, не может быть открыта из пункта меню "Все функции", не следует назначать такую форму основной формой объекта. Если же у объекта нет других форм, которые могли бы быть назначены основными, то следует сделать основной эту параметризированную форму. В обработчике ПриСозданииНаСервере модуля формы необходимо проверять параметры формы и, если они не заполнены, вызывать исключение. Текст исключения должен указывать пользователю причину, по которой форма не может быть открыта. Параметры формы следует объявлять явно на закладке Параметры редактора формы. В таком случае в коде обработчика ПриСозданииНаСервере не требуется проверять наличие свойств у структуры Параметры, а сам состав параметров формы явно задекларирован (поэтому их не требуется восстанавливать, изучая весь код обработчика ПриСозданииНаСервере).'
  tags:
  - forms
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std741'
  auto_actionable: false
- norm_id: STD_630
  section: Система стандартов 2025
  category: data_model_registers
  title: Правила создания модулей форм
  norm_text: 'Правила создания модулей форм Область применения: управляемое приложение, мобильное приложение. Область применения (уточнение): управляемое приложение, обычное приложение. Не следует размещать экспортные процедуры и функции в модулях форм. Для реализации экспортных процедур и функций рекомендуется использовать модули объектов, модули менеджеров объектов или общие модули. Для передачи входных параметров в формы следует применять метод ОткрытьФорму, для получения результата - процедуры-обработчики оповещений (см. Неправильно использовать экспортные процедуры и функции формы для параметризации формы при открытии. Также не следует вызывать экспортные процедуры и функции модуля формы для обновления данных формы или для программной перерисовки формы в результате действий пользователя в других формах. В этом случае следует использовать метод глобального контекста Оповестить, методы формы ОповеститьОЗаписиНового, ОповеститьОбАктивизации и ОповеститьОВыборе.'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std630'
  auto_actionable: false
- norm_id: STD_742
  section: Система стандартов 2025
  category: data_model_registers
  title: Блокирующее или независимое открытие форм объектов
  norm_text: 'Блокирующее или независимое открытие форм объектов Область применения: управляемое приложение. Для таких форм предполагается, что работа с ними всегда выполняется "за один заход", без необходимости переключения в другие формы. Это умолчание платформы рекомендуется изменять в тех случаях, когда форма представляет из себя «рабочее место», т.е. Для таких форм необходимо установить свойству РежимОткрытияОкна значение Независимый. Для конфигураций, разрабатываемых на платформе 1С:Предприятие 8.3.9 и ранее, не следует открывать формы в режиме ВариантОткрытияОкна.ОтдельноеОкно, поскольку в конфигурациях, рассчитанных на работу в режимах «Такси» или «В закладках», такой режим открытия форм значительно усложняет пользователю настройку приложения для работы в веб-клиенте. Исключение составляют случаи, когда в конфигурации предусмотрено, что форма открывается таким способ только в тонком клиенте или только в режиме «В отдельных окнах».'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std742'
  auto_actionable: false
- norm_id: STD_703
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: 'Ограничение на использование модальных окон'
  norm_text: 'Ограничение на использование модальных окон и синхронных вызовов Область применения: управляемое приложение. Действует для конфигураций, разрабатываемых на платформе 1С:Предприятие 8.3 и выше. 1. При разработке конфигураций, предназначенных для работы в веб-клиенте, запрещено использовать модальные формы и диалоги.'
