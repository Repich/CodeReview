- norm_id: STD_732
  section: Система стандартов 2025
  category: queries_performance
  title: Запросы в динамических списках
  norm_text: 'Запросы в динамических списках Область применения: управляемое приложение, мобильное приложение. Методическая рекомендация (полезный совет) При проектировании динамических списков в формах следует учитывать, что динамические списки предъявляют более высокие требования к скорости выполнения запросов, чем в других случаях (например, в отчетах, в процедурах обработки данных и пр.). Нужно стараться делать простые запросы для динамических списков. Для этого в первую очередь нужно оптимизировать архитектуру хранения данных, чтобы их было просто отображать в динамических списках. Пример В динамическом списке документов-распоряжений на отгрузку нужно вывести состояние отгрузки. Необходимо выбрать один из трех режимов работы динамического списка: Динамическое считывание данных включено (рекомендуется). Используются запросы, выбирающие по 1000 записей в буфер на сервере, по мере необходимости данные передаются на клиент. Можно использовать только для заведомо маленьких выборок. При разработке динамического списка следует учитывать что запрос, который фактически будет сформирован к СУБД, зависит от предопределенных настроек отборов, порядка и группировки СКД.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std732'
  auto_actionable: false
- norm_id: STD_745
  section: Система стандартов 2025
  category: queries_performance
  title: Поле "Дата" в списках
  norm_text: 'Поле "Дата" в списках Область применения: управляемое приложение, мобильное приложение. В целях оптимизации места на форме, рекомендуется изменить представление поля Дата в списках: 1. Для систем оперативного учета, рекомендуется дату сегодняшних документов отображать в виде времени: 09:46 1. Если текст запроса динамического списка переопределяется в коде, то рекомендуется придерживаться правил, описанных ниже. Это нужно для того, чтобы: разработчики, глядя на запрос в динамическом списке, могли однозначно понять, что он переопределяется в коде конфигурации; В редакторе запроса динамического списка следует устанавливать полноценный наиболее часто выполняемый текст запроса (запрос по умолчанию), чтобы при открытии формы, в большинстве случаев, не происходила программная установка текста запроса, снижающая производительность. Исключением является случай, когда текст запроса собирается программно. Псевдонимы таблиц должны заканчиваться постфиксом «Переопределяемый», чтобы визуально было заметно, что этот запрос может переопределяться в коде конфигурации.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std745'
  auto_actionable: false
- norm_id: STD_400
  section: Система стандартов 2025
  category: data_model_registers
  title: Информирование пользователя
  norm_text: 'Информирование пользователя Область применения: управляемое приложение. Случаи, когда необходимо довести информацию до пользователя: 1. Проверки заполнения можно разделить на два случая: А) Проверку заполнения реквизитов объекта следует выполнять вне транзакции записи объекта. Пример №1: При выполнении локальной команды формы "Заполнить скидку" необходимо сообщить, что еще не выбран контрагент При выполнении локальной команды "Рассчитать зарплату" необходимо сообщить, что в системе еще не задан курс валюты на текущий месяц. Способ реализации: Проверять необходимые значения в коде формы и использовать метод глобального контекста ПоказатьПредупреждение. В случае если есть вариант решения проблемы, рекомендуется использовать функцию ПоказатьВопрос. Доводить информацию до пользователя рекомендуется как при помощи блокирующего диалога (например, процедуры ПоказатьПредупреждение), так и при помощи метода ПоказатьОповещениеПользователя. Применять процедуру ПоказатьПредупреждение следует в том случае, если требуется "приостановить" работу пользователя и обратить его внимание на результат выполнения команды.'
  tags:
  - advisory
  - data-model
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std400'
