- norm_id: STD_487
  section: Система стандартов 2025
  category: data_model_registers
  title: Минимизация количества серверных вызовов и трафика
  norm_text: 'Минимизация количества серверных вызовов и трафика Область применения: управляемое приложение, мобильное приложение, обычное приложение. Разработку управляемого приложения необходимо вести с контролем количества вызовов серверных процедур и функций из клиентского кода (серверных вызовов), а в некоторых случаях – также объема передаваемых данных между клиентом и сервером (трафика). В общем виде следует руководствоваться тем, что на каждое действие пользователя в клиентском коде конфигурации не должно выполнять дополнительных вызовов на сервер. Любые исключения из этого правила требуют дополнительного обоснования. Типовым исключением является неявный серверный вызов при первом обращении к клиентскому общему модулю. Для режима с низкой скоростью соединения и мобильного клиента следует оптимизировать не только количество вызовов, но и объем передаваемых данных между клиентом и сервером (трафик). Отладку клиент-серверного взаимодействия в этом режиме работы рекомендуется проводить в режиме имитации задержек серверных вызовов.'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std487'
  auto_actionable: false
- norm_id: STD_629
  section: Система стандартов 2025
  category: integration_exchange
  title: Минимизация кода, выполняемого на клиенте
  norm_text: 'Минимизация кода, выполняемого на клиенте Область применения: управляемое приложение, мобильное приложение, обычное приложение. Необходимо минимизировать объем кода, который выполняется на стороне клиентского приложения. В частности не следует выполнять на клиенте сложные алгоритмы, требующие значительных ресурсов компьютера. Следует размещать такие алгоритмы в серверном коде, выполняя к ним минимально необходимое число обращений с клиента.'
