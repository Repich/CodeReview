- norm_id: STD_547
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Ограничение на использование оператора Перейти
  norm_text: 'Ограничение на использование оператора Перейти Область применения: управляемое приложение, мобильное приложение, обычное приложение. В коде на встроенном языке не рекомендуется использовать оператор Перейти, так как необдуманное использование данного оператора приводит к получению запутанных, плохо структурированных модулей, по тексту которых затруднительно понять порядок исполнения и взаимозависимость фрагментов. Вместо оператора Перейти рекомендуется использовать другие конструкции встроенного языка. Запрещается использовать оператор Перейти в общих модулях с признаком "Клиент (управляемое приложение)", модулях команд и в клиентском коде модулей управляемых форм, так как данный метод не поддерживается платформой 1С:Предприятие в режиме веб-клиента.'
