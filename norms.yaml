- norm_id: STD_791
  section: Система стандартов 2025
  category: queries_performance
  title: Дополнительные индексы
  norm_text: 'Дополнительные индексы Область применения: управляемое приложение, мобильное приложение, обычное приложение. Дополнительные индексы следует применять в функциональности конфигураций и библиотек, которые могут использоваться на крупных предприятиях с КОРП лицензиями платформы. Если конфигурация будет использоваться на небольших предприятиях только с ПРОФ лицензиями платформы, то дополнительные индексы использовать нельзя. При разработке необходимо тестировать и оптимизировать производительность, как с включенными, так и с отключенными дополнительными индексами. Если приемлемую производительность на любом объёме данных можно достичь без дополнительных индексов, то следует использовать обычные индексы. Рекомендуется поддерживать только одну ветку кода в соответствии с п. В тех случаях, когда на небольшом объёме данных не удаётся обеспечить минимальную производительность с отключенными дополнительными индексами, в порядке исключения допустимо альтернативное решение. Под минимальной производительностью подразумевается, что интерактивные операции (например, открытие форм списков) не должны превышать целевое время в 1 секунду, формирование отчётов не должно замедляться более чем в 2 раза.'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std791'
  auto_actionable: false
- norm_id: STD_783
  section: Система стандартов 2025
  category: transactions_locks
  title: 'Транзакции: правила использования'
  norm_text: 'Транзакции: правила использования Область применения: управляемое приложение, мобильное приложение, обычное приложение. при возникновении исключения в общем случае транзакция не может быть зафиксирована – при этом не важно, было ли это исключение обработано или нет (см. Поскольку исключение не отменяет транзакцию сразу, но запрещает успешное завершение транзакции, то все вызовы НачатьТранзакцию с одной стороны и ЗафиксироватьТранзакцию или ОтменитьТранзакцию с другой стороны должны быть парными. Начало транзакции и ее фиксация (отмена) должны происходить в контексте одного метода Правильно Процедура ЗаписатьДанныеВИБ() НачатьТранзакцию(); Исключение ОтменитьТранзакцию(); // дополнительные действия по обработке исключения КонецПопытки; Исключение ОтменитьТранзакцию(); // дополнительные действия по обработке исключения КонецПопытки; При использовании транзакций необходимо предусмотреть обработку исключений, придерживаясь следующих правил: метод НачатьТранзакцию должен быть за пределами блока Попытка-Исключение непосредственно перед оператором Попытка'
  tags:
