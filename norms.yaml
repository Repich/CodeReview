- norm_id: STD_734
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Использование режима вертикальной прокрутки форм
  norm_text: 'Использование режима вертикальной прокрутки форм Область применения: управляемое приложение. Исключением являются формы, имеющие поля для вывода HTML-документов, форматированных документов, текстовых документов, а также формы, кроме отчетов, имеющие поля для вывода табличных документов. Для таких форм свойство «Вертикальная прокрутка» формы должно быть установлено в значение «Использовать при необходимости». Если форма была создана в режиме совместимости «Версия 8.3.2» или ниже – после включения режима совместимости «Версия 8.3.3» и выше свойство «Вертикальная прокрутка» автоматически устанавливается в значение «Использовать при необходимости». Правильное значение свойства для таких форм следует установить после смены режима совместимости.'
