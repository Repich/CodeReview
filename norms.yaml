- norm_id: STD_695
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Командные панели табличных частей
  norm_text: 'Командные панели табличных частей Область применения: управляемое приложение. Команды, влияющие на заполнение отдельных строк, должны применяться исключительно к выделенным строкам. Например, следует использовать одну команду "Заполнить по виду цен" вместо двух – "Заполнить по виду цен во всех строках" и "Заполнить по виду цен в выделенных строках": Правильно Неправильно 1.2. При добавлении команды, влияющей на заполнение отдельных строк, в подменю "Все действия" следует добавлять команду "Выделить все". Это нужно делать в связи с тем, что многие пользователи не знакомы с горячими клавишами Ctrl+A. Допускается добавлять команды, которые будут действовать не на выделенные строки, а на строки, отобранные по специальному алгоритму. Это следует делать только для частотных операций, по которым пользователю сложно самостоятельно выделить строки.'
