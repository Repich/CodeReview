- norm_id: LONG_SERVER_OPS_03
  section: Длительные операции на сервере
  category: code_style
  title: При каждом выполнении фонового задания его результат помещается во временное хранилище на время
  norm_text: 'Поэтому для уменьшения расхода оперативной памяти в большинстве случаев рекомендуется очищать временное хранилище сразу после получения результата фонового задания: Настройки = ПолучитьИзВременногоХранилища(Результат.АдресРезультата); Если же результат фонового задания требуется сохранять на протяжении нескольких серверных вызовов, то необходимо передавать фиксированный адрес заранее инициализированного временного хранилища: &НаСервере Процедура ПриСозданииНаСервере(Отказ) АдресРезультатаФоновогоЗадания = ПоместитьВоВременноеХранилище(Неопределено, УникальныйИдентификатор); Если в конфигурации реализуются алгоритмы, инициирующие запуск фоновых заданий или запись данных информационной базы без участия пользователя (например, регулярное обновление информации в открытой форме), то в них следует проверять, что в текущем сеансе не установлен монопольный режим.'
  tags:
  - advisory
  - code-style
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: performance
