- norm_id: STD_705
  section: Система стандартов 2025
  category: metadata_design
  title: Отнесение объектов библиотек к подсистемам
  norm_text: 'Отнесение объектов библиотек к подсистемам Область применения: управляемое приложение, обычное приложение. 1. Все объекты библиотеки должны быть отнесены к одной корневой подсистеме (например, для объектов БСП – это подсистема СтандартныеПодсистемы), которая не содержит командного интерфейса. 2. Допустимо наличие нескольких корневых подсистем (помимо упомянутой в п.1), содержащих командный интерфейс.'
