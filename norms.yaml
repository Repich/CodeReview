- norm_id: STD_727
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Размеры экрана
  norm_text: 'Размеры экрана Область применения: управляемое приложение. При проектировании интерфейсов типовым разрешением экрана следует считать 1280х768 пикселей. Разработку (конфигурирование) нужно вести в стандартном разрешении - 96 DPI. При типовом разрешении экрана элементы внутри форм должны помещаться без вертикальной и горизонтальной полос прокрутки. Исключение составляют списки, в которых вертикальная полоса прокрутки допускается, а горизонтальная – является нежелательной.'
  tags:
  - forms
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
