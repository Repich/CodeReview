- norm_id: STD_744
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: История выбора при вводе
  norm_text: 'История выбора при вводе Область применения: управляемое приложение. Историю выбора в свойствах объекта метаданных рекомендуется отключать, если ее использование не соответствует прикладной логике конфигурации: • для объектов, сценарий использования которых не предполагает повторный выбор из 5 ранее выбранных вариантов. После отключения истории выбора в свойствах объекта метаданных необходимо, во всех ссылающихся на него полях ввода, установить для следующих свойств указанные ниже значения: • КнопкаВыпадающегоСписка – Нет • КнопкаВыбора – Да • ОтображениеКнопкиВыбора – В поле ввода Это необходимо сделать, чтобы пользователю перед началом выбора в поле ввода не отображалось меню, в котором нужно всегда нажимать «Показать все».'
