  title: Обработчик события ОбработкаЗаполнения
  norm_text: 'Обработчик события ОбработкаЗаполнения Область применения: управляемое приложение, мобильное приложение, обычное приложение. В случае если в силу каких-либо условий необходимо ограничивать ввод на основании по команде "Создать на основании", то такую проверку следует выполнять в обработчике ОбработкаЗаполнения модуля объекта (набора записей). Требуется запретить ввод на основании групп. Требуется запретить ввод на основании непроведенных документов. Для оповещения пользователя о причинах отказа, в обработчике ОбработкаЗаполнения следует использовать исключения: Процедура ОбработкаЗаполнения(ДанныеЗаполнения, ТекстЗаполнения, СтандартнаяОбработка) Если ТипЗнч(ДанныеЗаполнения) = Тип("СправочникСсылка.Сотрудники") Тогда Если ПолучитьЗначениеРеквизита(ДанныеЗаполнения, "ЭтоГруппа") = Истина Тогда ВызватьИсключение "Ввод приказа о приеме на основании группы сотрудников невозможен! Для раскрытия группы используйте клавиши Ctrl и стрелку вниз"; В частности, не следует создавать дополнительные команды для ввода на основании и размещать проверки в обработчиках этих команд.'
