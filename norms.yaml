  norm_text: 'По соображениям производительности не рекомендуется заводить в конфигурации более 10 параметров функциональных опций. Для того чтобы контролировать их количество в конфигурации, не следует создавать различные параметры функциональных опций одной смысловой нагрузки. Например, вместо двух параметров: ТипВерсионируемогоОбъекта, связанный с измерением ТипОбъекта регистра сведений НастройкаВерсионированияОбъектов ТипОбъектаСДополнительнымиОтчетамиИОбработками, связанный с измерением ТипОбъекта регистра сведений НазначениеДополнительныхОбработок рекомендуется создать один параметр функциональных опций ТипОбъектаКонфигурации, который связан с измерениями обоих регистров сведений.'
