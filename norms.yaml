  auto_actionable: false
- norm_id: STD_595
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Гиперссылка на счет-фактуру
  norm_text: 'Гиперссылка на счет-фактуру Область применения: управляемое приложение. В случае, если в форме документа есть гиперссылка на счет-фактуру, то ее рекомендуется оформлять следующим образом: Гиперссылка размещается в нижней части формы до группы полей «Ответственный» и «Комментарий» Располагается в отдельной строке с выравниванием по левому краю формы Перед ссылкой выводится подпись «Счет-фактура». Допускается уточнять в подписи тип счета- фактуры Например, «Счет-фактура выставленный», «Счет-фактура полученный», «Счет-фактура на сумму вознаграждения» Рекомендуется размещать гиперссылку на всю ширину формы. В случае, если подвал многоколоночный и поле «счет-фактура» относится к колонке, то его следует делать соответствующим ширине колонки При наличии в форме нескольких гиперссылок на счета-фактуры следует размещать их друг под другом Оформление текста гиперссылки Если счет-фактура не указан, рекомендуется выводить текст «Создать счет-фактуру» Если счет-фактура указан, то выводится его номер и дата Если ввод счета-фактуры не требуется, рекомендуется выводить текст «Не требуется» Если для создания нового счета-фактуры требуется записать текущий объект, то рекомендуется по-возможности не.'
  tags:
  - advisory
  - forms
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std595'
  auto_actionable: false
- norm_id: STD_631
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Поле, влияющее на состав остальных полей в форме
  norm_text: 'Поле, влияющее на состав остальных полей в форме Область применения: управляемое приложение. В случае, если на форме есть поле, выбор значения в котором существенно влияет на состав других элементов формы, необходимо выделять его визуально. Выделение поля требуется для привлечения внимания пользователя, чтобы показать ему, какое именно значение установлено в этом поле, т.к. Для выделения поля следует изменить его фон на цвет «ФонУправляющегоПоля» (255,232,179)'
