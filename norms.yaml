  title: 'В тех случаях, когда на небольшом объёме данных не удаётся обеспечить минимальную'
  norm_text: 'В тех случаях, когда на небольшом объёме данных не удаётся обеспечить минимальную производительность с отключенными дополнительными индексами, в порядке исключения допустимо альтернативное решение. Под минимальной производительностью подразумевается, что интерактивные операции (например, открытие форм списков) не должны превышать целевое время в 1 секунду, формирование отчётов не должно замедляться более чем в 2 раза и т.п. Если поле, добавляемое в индекс, не используется в условиях запросов, а используется только для исключения обращения к таблице, то рекомендуется делать такое поле дополнительным (включаемым), а не индексируемым (ключевым). Это позволит добавить больше индексируемых полей в индекс при необходимости.'
