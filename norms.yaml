- norm_id: STD_489
  section: Система стандартов 2025
  category: queries_performance
  title: Ограничения при использовании динамических списков
  norm_text: 'Ограничения при использовании динамических списков Область применения: управляемое приложение, мобильное приложение. При разработке интерфейса, разработчик может использовать группировки в динамических списках (cм. В данном стандарте перечислены условия, которые должен соблюсти разработчик, если он тем или иным способом управляет группировками динамических списков. Пользователь, при помощи настройки списка может установить свои группировки – в этом случае прикладной разработчик не может (и не должен) гарантировать оптимальную производительность. Использование группировок рекомендуется в тех динамических списках, в которых заведомо небольшое число записей (не более нескольких сотен). Для построения группировки, динамическому списку необходимо выбрать все уникальные из таблицы базы данных значения поля, по которому строится группировка. Допускается делать многоуровневые группировки в динамических списках только при соблюдении следующих условий: поле, по которому осуществляется первая группировка, должно быть проиндексировано'
  tags:
  - advisory
  - queries
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std489'
  auto_actionable: false
- norm_id: STD_495
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Особенности реализации команд для форм списков
  norm_text: 'Особенности реализации команд для форм списков Область применения: управляемое приложение, мобильное приложение. Если логика команды не предусматривает обработку выделенных строк группировки, то их необходимо пропускать. При этом рекомендуется выдавать сообщение, если в списке выделена только одна строка группировки: &НаКлиенте Процедура КомандаВФорме(Команда) МассивОбъектов = Элементы.Список.ВыделенныеСтроки'
