  norm_text: 'Колонки с флажками Область применения: управляемое приложение. Избегайте длинных заголовков т.к. колонка при этом выглядит некрасиво, занимает много места: флажок прижат влево и вся колонка пустая. По возможности, заменяйте названия таких колонок на понятные картинки с хорошей подсказкой или используйте сокращения. Необходимо помнить, что большое количество картинок замедляет открытие формы.'
