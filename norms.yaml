  section: Использование предопределенных элементов
  category: metadata_design
  title: 'Исключение составляют дочерние узлы РИБ, в котором предопределенные элементы'
  norm_text: 'Исключение составляют дочерние узлы РИБ, в котором предопределенные элементы автоматически не создаются (и не обновляются при изменении в метаданных), а должны быть переданы из главного узла вместе с изменениями конфигурации. б) в прикладной логике загрузки данных из главного узла (обработчик события ПриПолученииДанныхОтГлавного, правила регистрации объектов) следует избегать обращений к предопределенным элементам, поскольку нет гарантии, что они уже были загружены из сообщения обмена; в) код обработчиков обновления ИБ, который обрабатывает предопределенные элементы, не должен выполняться в подчиненных узлах РИБ: Если ПланыОбмена.ГлавныйУзел() = Неопределено Тогда // заполняем предопределенные элементы // ...'
