  norm_text: 'Размещение кнопки вызова справки в формах Область применения: обычное приложение. Обычное приложение Кнопку вызова справки в формах необходимо размещать в верхней командной панели формы. Допускается размещение кнопки вызова помощи, не в командной панели, а отдельно в форме. При других вариантах выравнивания кнопок или использовании кнопки вызова справки вне командной панели, необходимо принимать решение исходя из наилучшей эргономики формы.'
