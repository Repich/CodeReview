  norm_text: 'Если требуется получать значение опции на какую-либо другую дату, необходимо указать значение для параметра функциональной опции Период типа Дата, который будет использоваться как дата получения среза. Например, если имеется периодический регистр сведений с измерением Организация, то следует использовать следующий синтаксис: УстановитьПараметрыФункциональныхОпцийФормы(Новый Структура("Организация, Период", <ТребуемаяОрганизация>, <ТребуемаяДата>)); При этом значение параметра Период необходимо предварительно привести к интервалу периодичности регистра для выполнения требования 2.5. Например, если периодичность регистра – месяц, то: НачалоМесяца(<ТребуемаяДата>) а сам параметр Период не следует создавать в метаданных, так как он предоставляется системой автоматически.'
