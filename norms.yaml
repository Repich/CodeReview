- norm_id: STD_594
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Значения по умолчанию
  norm_text: 'Значения по умолчанию Область применения: управляемое приложение. Рекомендуется явным образом выделять среди остальных значения, используемые для подстановки в поля по умолчанию. Для отражения таких значений лучше использовать термин «основной». Выделение в списках Для выбора в списке основного элемента рекомендуется использовать отдельную команду, расположенную в командной панели списка Название для команды выбирается в зависимости от заголовка формы: Использовать как основной Использовать как основную Использовать как основное Например, для формы «Организация» команда будет называться «Использовать как основную» Для элемента, выбранного основным, используется шрифт "ОсновнойЭлементСписка" (шрифт диалогов и меню, начертание "жирный") Выделение в форме Если в форме одно поле, используемое для заполнения по умолчанию, то рекомендуется после его заголовка добавлять слово «основной» (основная, основное) в круглых скобка Если в форме несколько полей, используемых для заполнения по умолчанию, их следует оформлять в виде группы с заголовком «Используются как основные».'
  tags:
  - advisory
  - forms
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
