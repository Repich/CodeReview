- norm_id: STD_654
  section: Система стандартов 2025
  category: queries_performance
  title: 'Разыменование ссылочных полей составного типа'
  norm_text: 'Разыменование ссылочных полей составного типа в языке запросов Область применения: управляемое приложение, мобильное приложение, обычное приложение. Каждое исключение из этого правила должно тщательно анализироваться. Следует избегать избыточности при создании полей составных ссылочных типов. Необходимо указывать ровно столько возможных типов для данного поля, сколько необходимо. Не следует без необходимости использовать типы "любая ссылка" или "ссылка на любой документ" и т.п. Вместо этого следует более тщательно проанализировать прикладную логику и назначить для поля ровно те возможные типы ссылок, которые необходимы для решения задачи. Для того чтобы избежать запросов с использованием большого числа исходных таблиц следует жертвовать компактностью хранения данных ради производительности и помещать соответствующие данные в исходную таблицу запроса. Например, в регистре ТоварныеЗапасы можно завести реквизит ДатаРегистратора, заполнять его при проведении документов и использовать затем в запросах: ВЫБРАТЬ ...'
