  title: 'Следует минимизировать объем выборки таким образом, чтобы выбирать ровно те данные'
  norm_text: 'Следует минимизировать объем выборки таким образом, чтобы выбирать ровно те данные, которые требуются для решения задачи. Например, если нужно получить значения конкретных полей, не следует выбирать все поля «на всякий случай» с помощью конструкции ВЫБРАТЬ * ИЗ … Вместо выборки большого объема данных для их последующей обработки (свертка, сортировка, проведение вычислений и пр.) на сервере 1С:Предприятие, следует, в первую очередь, ответить на вопрос: «А есть ли возможность переложить эту работу на базу данных, чтобы получить уже готовый результат?»'
