- norm_id: STD_614
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Итоги в журналах документов
  norm_text: 'Итоги в журналах документов Область применения: управляемое приложение. Итоги в журналах документов (при их наличии) рекомендуется оформлять следующим образом: Итоги размещаются в нижней части формы, слева Поля итогов оформляются как надписи Для выделения значений рекомендуется использовать цвет "ИтогиЖурналаЦвет" (RGB 100,100,100) и шрифт "ИтогиЖурналаШрифт" (шрифт диалогов и меню, начертание "жирный") Например, в журнале «Банковские выписки» в качестве итогов оформлены поля, отражающие остатки и обороты по расчетному счету за день. Подписи к флажкам следует оформлять в соответствии с приведенными рекомендациями. Подпись всегда следует располагать справа от флажков: Правильно Неправильно 2. Если к флажку требуется сделать подсказку, то ее следует располагать либо снизу, либо справа от подписи: Правильно Неправильно 3. Подписи у флажков следует делать позитивными (не содержащими отрицания) Правильно Неправильно Если при этом требуется, чтобы флажок по умолчанию был установлен, у реквизита объекта метаданных следует установить свойство Значение заполнения в значение Истина.'
  tags:
  - advisory
  - forms
  - scope:управляемое
  - ui
  scope: см. оригинальный стандарт
  code_applicability: true
