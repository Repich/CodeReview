- norm_id: STD_728
  section: Система стандартов 2025
  category: data_model_registers
  title: Ограничения на использование реквизитов составного
  norm_text: 'Ограничения на использование реквизитов составного типа Область применения: управляемое приложение, мобильное приложение, обычное приложение. Реквизиты составного типа, используемые в условиях соединений, отборах, а также для упорядочивания, должны содержать только ссылочные типы (СправочникСсылка.[…], ДокументСсылка.[…] и пр.). В состав их типов не рекомендуется включать никаких других нессылочных типов, 1.2. Вместо этого, следует предусмотреть отдельный справочник ПроизвольныеАдреса и указать его в реквизите Адрес вместо строки. При этом добавление новых элементов в справочник ПроизвольныеАдреса следует обеспечить автоматически, «незаметно» от пользователя, в момент записи документа. Исключение могут составлять таблицы, в которых заведомо мало данных (до 1000 записей). Для типизированных объектов метаданных, хранящихся в информационной базе, не следует использовать составные типы ЛюбаяСсылка, СправочникСсылка, ДокументСсылка и аналогичные. Состав типов того или иного типизированного объекта должен определяться явным образом.'
