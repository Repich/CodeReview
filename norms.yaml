- norm_id: STD_404
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Открытие форм
  norm_text: 'Открытие форм Область применения: управляемое приложение, мобильное приложение. Для открытия форм следует применять метод глобального контекста ОткрытьФорму (при использовании версии платформы 1С:Предприятие 8.2 и более ранних версий - также ОткрытьФормуМодально). Применение альтернативного способа, с получением формы и ее последующим открытием с помощью метода ПолучитьФорму, не рекомендуется.'
