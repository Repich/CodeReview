  category: ui_forms_behavior
  title: Групповые обработки в списках
  norm_text: 'Групповые обработки в списках Область применения: управляемое приложение. При использовании групповых обработок необходимо сообщать пользователю о количестве удачно выполненных операций. Нельзя оставлять пользователя без отклика в случае возникновении ошибок. В случае, если часть или все объекты групповой обработки выполнены неудачно, необходимо сообщить об этом пользователю. Система сообщает пользователю, что документы уже находятся в статусе "Закрыть" и в изменении статуса нет необходимости. Групповые обработки в списках с группировкой списка При реализации групповых обработок при установленной группировке списка необходимо соблюдать следующие требования: • При выделении нескольких строк, в том числе строк группировки, в момент групповой обработки игнорировать строки группировок.'
