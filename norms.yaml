  norm_text: 'Не рекомендуется программно (динамически) формировать исполняемые файлы для запуска. Следует рассчитывать на то, что в политиках информационной безопасности операционной системы может быть настроен запрет запуска пользователями всех приложений, кроме тех, что разрешены. Доверенные скрипты и приложения могут быть внесены в исключения, если они подписаны электронной подписью или по конкретным хешам исполняемых файлов. В частности, исполняемые файлы, программно формируемые во временном каталоге, вынуждают добавлять временный каталог целиком в исключения из правил. Вместо формирования исполняемых файлов рекомендуется: формировать строку запуска для передачи в ФайловаяСистема.ЗапуститьПрограмму (без временного исполняемого файла); Для выполнения команды, требующей запуск внешней программы в режиме наивысших прав (например, в ОС Windows - с отображением запроса повышения прав UAC), необходимо: реализовывать ее на управляемой форме в виде кнопки или пункта меню'
  tags:
  - advisory
  - forms
  - ui
  scope: разработка
  code_applicability: true
  automation_hint: mixed
  check_type: semantic
  default_severity: major
  detector_type: security
- norm_id: EXCHANGE_PLANS_01
  section: Разработка планов обмена с отборами
  category: metadata_design
  title: 'Для синхронизации и распределенной ИБ используйте планы обмена осознанно'
  norm_text: 'Для определения узлов-получателей для отправки данных следует использовать события ПередЗаписью и ПередУдалением объектов информационной базы, в которых предусмотреть логику регистрации изменений данных на узлах планов обмена (далее – логика регистрации).'
