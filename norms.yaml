- norm_id: QUERY_CONDITIONS_04
  section: Эффективные условия запросов
  category: security_access
  title: В дополнительном условии оператор ИЛИ можно использовать без ограничений
  norm_text: 'В дополнительном условии оператор ИЛИ можно использовать без ограничений. ПРАВИЛЬНО 1: ГДЕ Таблица.Поле1 = &Значение1 // Основное условие (использует индекс) И // Дополнительное условие (можно использовать ИЛИ) (Таблица.Поле2 = &Значение2 ИЛИ Таблица.Поле3 = &Значение3) ПРАВИЛЬНО 2: ГДЕ (Таблица.Поле1 = &Значение1 ИЛИ Таблица.Поле1 = &Значение2) И (Таблица.Поле2 = &Значение3 ИЛИ Таблица.Поле2 = &Значение4) т.к. можно переписать при помощи В (специально переписывать не нужно, можно оставить, как есть): ГДЕ Таблица.Поле1 В (&Значения1) // Основное условие И Таблица.Поле2 В (&Значения2) // Дополнительное условие (или наоборот) 3. Оператор ПОДОБНО В основном условии для последнего из используемых или единственного поля индекса можно использовать оператор ПОДОБНО. Функции работы со строками, в некоторых случаях, можно привести к оператору ПОДОБНО и использовать его в основном условии. НЕПРАВИЛЬНО 1: ГДЕ ПОДСТРОКА(Таблица.Поле, 1, 6) = "строка" ПРАВИЛЬНО 1: ГДЕ Таблица.Поле ПОДОБНО "строка%" НЕПРАВИЛЬНО 2: ГДЕ ПОДСТРОКА(Таблица.Поле, 3, 6) = "строка" НЕПРАВИЛЬНО 2: ГДЕ Таблица.Поле ПОДОБНО "__строка%" // Литерал не должен начинаться с символов "_" или "%" ПРАВИЛЬНО 2: Добавить новое вычи.'
  tags:
  - security
  scope: разработка
  code_applicability: true
  automation_hint: code
  check_type: semantic
  default_severity: major
  detector_type: performance
