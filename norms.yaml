  norm_text: 'В случае, если на форме размещена таблица, при активизации строки которой необходимо обновлять содержимое формы (например, выводить подробности к выделенной строке), то в обработчике таблицы ПриАктивизацииСтроки следует подключать однократный обработчик ожидания. При этом чтобы избежать повторных вызовов ПриАктивизацииСтроки, необходимо запоминать текущую строку (ИдентификаторТекущейСтроки) и не выполнять обновление формы, если она не изменилась. В остальных случаях рекомендуется использовать внеконтекстную передачу управления с клиента на сервер. При передаче управления с клиента на сервер недопустимо использовать объекты типов ДанныеФормыСтруктура, ДанныеФормыКоллекция, ДанныеФормыСтруктураСКоллекцией, ДанныеФормыДерево и ТабличныйДокумент в качестве параметров функции, передаваемых по значению. Вести работу с этими типами следует на сервере, для чего переходить с клиента на сервер с помощью явного контекстного вызова сервера.'
