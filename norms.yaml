  norm_text: 'Применение параметров отчета в СКД Область применения: управляемое приложение, обычное приложение. При использовании параметров в отчетах, реализуемых с помощью системы компоновки данных, следует придерживаться следующих рекомендаций. Для этого следует использовать синтаксические элементы расширения языка запросов системы компоновки данных {ГДЕ...}.'
