  section: Система стандартов 2025
  category: data_model_registers
  title: Использование значений, влияющих на поведение
  norm_text: 'Использование значений, влияющих на поведение клиентского приложения Область применения: управляемое приложение, мобильное приложение, обычное приложение. В том случае, если поведение целого ряда форм или команд зависит от одних и тех же значений (параметров, задаваемых пользователем или иных настроек поведения клиентского приложения), для минимизации клиент-серверного взаимодействия рекомендуется применять общие модули с повторным использованием возвращаемых значений (свойство «Повторное использование возвращаемых значений» равно «На время сеанса»). Применение таких общих модулей допускается, если изменение соответствующего значения в течение сеанса не является критичным, т.е. в течение всего сеанса может использоваться однажды полученное значение. При этом функции такого общего модуля должны за один вызов возвращать сразу все значения, которые могут понадобиться в тех или иных обстоятельствах. Например, если при работе всех форм подсистемы регистрации занятости сотрудников, требуются пользовательские параметры «Время занятости по умолчанию», «Время начала рабочего дня» и «Время окончания рабочего дня», то все эти параметры необходимо получать одним вызовом, возвращающим структуру.'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std459'
  auto_actionable: false
- norm_id: STD_443
  section: Система стандартов 2025
  category: data_model_registers
  title: Получение предопределенных значений на клиенте
  norm_text: 'Получение предопределенных значений на клиенте Область применения: управляемое приложение, мобильное приложение, обычное приложение. 2.1.4 и выше рекомендуется использовать функцию ПредопределенныйЭлемент общего модуля ОбщегоНазначения или ОбщегоНазначенияКлиент, которая возвращает Неопределено для несуществующих в ИБ предопределенных элементов. При этом не следует реализовывать дополнительные механизмы кеширования на клиенте предопределенных значений.'
