  section: 'Разыменование ссылочных полей составного типа в языке запросов'
  category: queries_performance
  title: 'Разыменование через точку добавляет неявные соединения и должно применяться осознанно'
  norm_text: 'В языке запросов возможно обращаться не только к полям исходных таблиц запроса, перечисленных в предложении ИЗ, но и к полям таблицы, на которую ссылается поле исходной таблицы запроса, если это поле имеет ссылочный тип. Имена полей при этом пишутся "через точку". Применение такой конструкции приводит к неявному соединению с дополнительными таблицами для получения значений полей "через точку". Например, в запросе ВЫБРАТЬ ТоварныеЗапасы.Товар КАК Товар, ТоварныеЗапасы.Количество КАК Количество, ТоварныеЗапасы.Товар.Артикул КАК Артикул ИЗ РегистрНакопления.ТоварныеЗапасы КАК ТоварныеЗапасы ...'
