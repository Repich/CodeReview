- norm_id: STD_720
  section: Система стандартов 2025
  category: ui_forms_behavior
  title: Тумблер
  norm_text: 'Тумблер Область применения: управляемое приложение. Тумблер следует использовать в ситуации, когда при выборе значения происходит изменение состава или расположения элементов в форме. Количество кнопок в тумблере рекомендуется делать небольшим, а их названия - краткими. Если количество вариантов - большое, а названия длинные, то лучше использовать выпадающий список. Заголовок рекомендуется добавлять в случае, если: - по названиям кнопок не понятно назначение тумблера - тумблер выступает в качестве переключателя'
