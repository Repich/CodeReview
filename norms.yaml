  norm_text: 'Использование модуля объекта, модуля менеджера объекта и общих модулей Область применения: управляемое приложение, мобильное приложение, обычное приложение. Следует иметь в виду, что для вызова экспортных процедур и функций модуля объекта из других модулей может потребоваться предварительно получить сам экземпляр объекта из информационной базы с помощью метода ПолучитьОбъект.'
