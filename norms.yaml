  norm_text: 'Команда "Создать" в журналах документов Область применения: управляемое приложение. Для создания документов в некоторых журналах рекомендуется использовать подменю «Создать» вместо стандартной команды «Создать». Картинку следует добавлять только для подменю «Создать», для каждого типа команды в подменю ее использовать нет необходимости. В подменю «Создать» рекомендуется сортировать команды по частоте использования, а не в алфавитном порядке.'
