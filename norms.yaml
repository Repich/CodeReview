- norm_id: STD_531
  section: Система стандартов 2025
  category: metadata_design
  title: Реквизит «Комментарий» у документов
  norm_text: 'Реквизит «Комментарий» у документов Область применения: управляемое приложение, мобильное приложение, обычное приложение. Для всех документов рекомендуется создавать реквизит Комментарий (строка неограниченной длины). Доступ к реквизиту для пользователей должен быть настроен также как и к самому документу (если документ доступен только для чтения, то и комментарий – только для чтения; Если же штатный сценарий работы пользователя предусматривает внесение произвольной текстовой информации в документ, то для этого необходимо предусмотреть отдельные реквизиты «прикладного» характера. Например, в документе Заказ клиента для описания дополнительных договоренностей с клиентом следует предусмотреть реквизит Дополнительная информация, а не пользоваться служебным реквизитом Комментарий. В простейшем случае, в качестве внешнего редактора текста комментария рекомендуется использовать функцию ВвестиСтроку.'
  tags:
