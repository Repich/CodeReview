- norm_id: STD_637
  section: Система стандартов 2025
  category: data_model_registers
  title: 'Настройка обмена данными для классификаторов'
  norm_text: 'Настройка обмена данными для классификаторов между различными информационными базами Область применения: управляемое приложение, мобильное приложение. При использовании инструмента «Конвертация данных» для создания обменов данными между различными конфигурациями, необходимо придерживаться следующих рекомендаций по синхронизации классификаторов. Данные классификаторов объектного типа (например, страны мира, ОКЕИ и т.п.) должны сопоставляться по уникальным идентификаторам ссылок, а в случае, если сопоставление по уникальным идентификаторам ссылок не дало положительного результата, то сопоставление должно продолжаться по полям поиска (режим автоматического сопоставления). Для этого требуется: в правиле конвертации объекта (ПКО) классификатора установить признаки: "Искать объект приемника по внутреннему идентификатору объекта источника" "Продолжить поиск по полям поиска, если по идентификатору объект приемник не найден" указать правила конвертации свойств (ПКС), которые используются в качестве полей поиска.'
  tags:
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std637'
  auto_actionable: false
- norm_id: STD_701
  section: Система стандартов 2025
  category: integration_exchange
  title: Разработка планов обмена с отборами
  norm_text: 'Разработка планов обмена с отборами Область применения: управляемое приложение, мобильное приложение. Для определения узлов-получателей для отправки данных следует использовать события ПередЗаписью и ПередУдалением объектов информационной базы, в которых предусмотреть логику регистрации изменений данных на узлах планов обмена (далее – логика регистрации). Кроме того, при проектировании логики регистрации необходимо учитывать следующие особенности: данные из сообщения обмена загружаются в произвольном порядке, поэтому на момент выполнения логики регистрации необходимые ей данные могут быть еще не загружены; При разработке планов обмена для синхронизации с другими программами (не РИБ, по правилам конвертации) с помощью подсистемы «Обмен данными» Библиотеки стандартных подсистем первые два пункта не требуется учитывать в правилах регистрации для ссылочных типов объектов (СправочникСсылка, ДокументСсыслка и пр.), поскольку регистрация ссылочных объектов выполняется отложенно отдельной операцией после загрузки всех данных из сообщения обмена.'
  tags:
  - advisory
  - integration
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std701'
  auto_actionable: false
- norm_id: STD_771
  section: Система стандартов 2025
  category: integration_exchange
  title: Интеграция прикладных решений через формат
  norm_text: 'Интеграция прикладных решений через формат EnterpriseData Область применения: управляемое приложение. Переходы с конфигурации на конфигурацию следует разрабатывать на основе правил конвертации (ПК). Обмены между конфигурациями, использующими Библиотеку стандартных подсистем (БСП), следует делать на основе формата EnterpriseData. При разработке новых версий прикладных решений нужно стремиться к тому, чтобы в обменах данными поддерживались все актуальные версии EnterpriseData. Исключение составляет случай, описанный в пункте 4. 2.4.1 БСП, необходимо поддержать версии 1.2, 1.3 и 1.4 формата EnterpriseData. 1.4 формата, следовательно поддерживаемые в этом обмене версии формата должны быть не младше 1.4. В целях предотвращения данной проблемы рекомендуется информировать пользователей о том, какие версии EnterpriseData поддерживаются в прикладном решении. При разработке типовых обменов запрещено использовать свойство объектов формата "AdditionalInfo" для передачи каких либо сведений между информационными базами.'
  tags:
  - advisory
  - integration
  - scope:управляемое
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std771'
  auto_actionable: false
- norm_id: STD_551
  section: Система стандартов 2025
  category: metadata_design
  title: Разработка конфигураций с повторным использованием
  norm_text: 'Разработка конфигураций с повторным использованием общего кода и объектов метаданных Область применения: управляемое приложение, мобильное приложение, обычное приложение. Эту задачу рекомендуется решать с использованием вспомогательных конфигураций – библиотек. повторно использовать код и объекты библиотеки в конфигурациях с помощью механизма постановки на поддержку платформы 1С:Предприятия; При взаимодействии конфигураций, библиотек и внешних потребителей следует выделять следующие области видимости программного кода: 1. б) Программный интерфейс для конкретных потребителей должен располагаться в определенном месте в коде конфигурации, определенном в документации, и может быть вызван только определенным потребителем. Такой программный интерфейс рекомендуется размещать в отдельном подразделе Для вызова из других подсистем.'
  tags:
  - advisory
  - metadata
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std551'
  auto_actionable: false
- norm_id: STD_552
  section: Система стандартов 2025
  category: metadata_design
  title: Имена объектов метаданных в иерархии библиотек
  norm_text: 'Имена объектов метаданных в иерархии библиотек Область применения: управляемое приложение, мобильное приложение, обычное приложение. При разработке конфигурации в условиях использования одной или нескольких библиотек следует избегать конфликтов имен объектов метаданных (справочников, документов, общих модулей и др.), поставляемых из библиотек, с объектами самой конфигурации. Для разрешения таких конфликтов за библиотекой более «низкого» уровня рекомендуется организационно закрепить преимущественное право выбора названия. Если в одном из ее потребителей оказывается объект с таким же именем, то следует переименовать объект в потребителе с использованием более конкретного названия. Для того чтобы снизить вероятность возникновения конфликтов в этом случае, следует всегда предметно называть объекты метаданных. Наиболее «универсальные» названия объектов метаданных следует использовать в библиотеках самого нижнего уровня иерархии. В конечных конфигурациях-потребителях и в библиотеках более высокого уровня использовать более специфичные для данной прикладной области названия.'
  tags:
  - advisory
  - metadata
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: mixed
  check_type: manual
  default_severity: medium
  detector_type: manual_review
  source_standard: '#std552'
  auto_actionable: false
- norm_id: STD_553
  section: Система стандартов 2025
  category: data_model_registers
  title: Переопределяемые и поставляемые объекты библиотеки
  norm_text: 'Переопределяемые и поставляемые объекты библиотеки Область применения: управляемое приложение, мобильное приложение, обычное приложение. С точки зрения возможностей по настройке функциональности библиотеки для работы в конкретной конфигурации-потребителе все объекты библиотеки условно делятся на три категории: Непереопределяемые объекты – «готовые» объекты, которые можно брать и использовать в конфигурации-потребителе «как есть». Их не следует изменять в конфигурации-потребителе, чтобы они были гарантированно одинаковы во всех конфигурациях, основывающихся на данной библиотеке. Более того, такие объекты обязательно должны присутствовать в конфигурациях, использующих библиотеку. Они могут или должны быть изменены в конфигурации-потребителе. Рекомендуется устанавливать для объектов этих категорий следующие правила поставки: Непереопределяемые объекты – «изменения не рекомендуются»; Эти рекомендации продиктованы следующими соображениями: Непереопределяемые объекты – это зона ответственности разработчиков библиотеки, поэтому они не должны разрабатываться «по месту» в конфигурациях-потребителях.'
  tags:
  - advisory
  - data-model
  scope: см. оригинальный стандарт
  code_applicability: true
  automation_hint: code
  check_type: manual
