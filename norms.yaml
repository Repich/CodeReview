- norm_id: STD_729
  section: Система стандартов 2025
  category: queries_performance
  title: Общие требования по разработке оптимальных запросов
  norm_text: 'Общие требования по разработке оптимальных запросов Область применения: управляемое приложение, мобильное приложение, обычное приложение. Методическая рекомендация (полезный совет) Прежде чем перейти к более продвинутым методам оптимизации запросов, необходимо убедиться, что сам запрос – адекватен решаемой задаче. Следует минимизировать объем выборки таким образом, чтобы выбирать ровно те данные, которые требуются для решения задачи. Например, если нужно получить значения конкретных полей, не следует выбирать все поля «на всякий случай» с помощью конструкции ВЫБРАТЬ * ИЗ … Вместо выборки большого объема данных для их последующей обработки (свертка, сортировка, проведение вычислений и пр.) на сервере 1С:Предприятие, следует, в первую очередь, ответить на вопрос: «А есть ли возможность переложить эту работу на базу данных, чтобы получить уже готовый результат?» 1.2. Также в большинстве случаев, следует минимизировать и общее количество запросов к СУБД.'
