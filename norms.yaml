  section: Система стандартов 2025
  category: queries_performance
  title: Использование объектов типа Структура
  norm_text: 'Использование объектов типа Структура Область применения: управляемое приложение, мобильное приложение, обычное приложение. При создании объекта типа Структура не рекомендуется передавать в конструктор более 3-х значений свойств. Вместо этого рекомендуется использовать метод Вставить или присваивать значения свойствам явным образом Неправильно ПараметрыФормыКомпоновки = Новый Структура( "НеПомещатьНастройкиВСхемуКомпоновкиДанных, |НеРедактироватьСхемуКомпоновкиДанных, |НеНастраиватьУсловноеОформление, |НеНастраиватьВыбор, |НеНастраиватьПорядок, |АдресСхемыКомпоновкиДанных, |АдресНастроекКомпоновкиДанных, |УникальныйИдентификатор, |Заголовок", Истина, Истина, Истина, Истина, Истина, ТекущиеДанные.АдресСхемыКомпоновкиДанных, ?(АдресНастроекСхемыКомпоновкиДанных <> Неопределено, АдресНастроекСхемыКомпоновкиДанных, ТекущиеДанные.АдресНастроекСхемыКомпоновкиДанных), УникальныйИдентификатор, ЗаголовокФормыНастройкиСхемыКомпоновкиДанных)); Не рекомендуется в конструкторе структуры использовать конструкторы других объектов, если эти конструкторы принимают параметры.'
