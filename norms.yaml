  norm_text: 'Содержание отчета Область применения: управляемое приложение. Их состав должен соответствовать назначению отчета (цели анализа). В отчетах, реализованных без использования СКД, рекомендуется обеспечивать возможность расшифровки всех выводимых показателей. Отчеты не должны содержать данные, помеченные на удаление. Если такие данные требуется выводить в отчет, то их следует выделять явным образом (см. При включении показателя в отчет следует учитывать ситуации, когда он может принимать значения в разных валютах. Если назначение отчета предполагает анализ какого-либо показателя в различных валютах, то следует одновременно выводить значения показателя как в исходной валюте, так и в приведенной, единой валюте отчета. Для оценки объема задолженности по всем клиентам требуется приведение сумм задолженностей к единой валюте, например, к валюте управленческого или регламентированного учета (в зависимости от конфигурации). Под неконтекстным отчетом подразумевается отчет, который запускается из командного интерфейса конфигурации (например, панели отчетов) вне какого-либо контекста для начала или продолжения анализа.'
  tags:
  - advisory
  - queries
  - scope:управляемое
  scope: см. оригинальный стандарт
