  category: governance_release
  title: Программное управление видимостью страниц
  norm_text: 'Программное управление видимостью страниц Область применения: обычное приложение. Обычное приложение При программном управлении видимостью страниц нужно делать так, чтобы в любой момент времени хотя бы одна страница была видимой: сначала нужно включать все видимые страницы, а только затем выключать все невидимые. Игнорирование этого правила может привести к тому, что перестанут срабатывать привязки элементов управления.'
