  title: 'Для хранения накопленных сведений, значений показателей: Область применения (уточнение)'
  norm_text: 'Для хранения накопленных сведений, значений показателей: Область применения (уточнение): управляемое приложение, обычное приложение. Если требуется хранение данных учета с использованием принципа двойной записи, то используется специализированный объект метаданных «Регистр бухгалтерии» 2. Если требуется хранение результатов расчета учета начислений и удержаний, то используется специализированный объект метаданных «Регистр расчета» 3. Если требуется хранение изменений показателей – приход и расход, получение остатков и оборотов за период, то используется объект метаданных « Регистр накопления». Более подробные критерии выбора того или иного вида объекта метаданных: Критерий / тип объекта Регистр накоплений Регистр сведений Основное предназначение Требуется хранение изменений данных - прихода и расхода значений показателей Требуется хранение информации в виде наборов записей, регистрация некоторых сведений, значений Получение данных Требуется получение остатков, оборотов данных Необходимо получение среза информации на момент времени или текущего значения показателей Подтверждение происхождения данных Требуется обязательная связь с регистрирующим документом Связь не обязательна 3.'
