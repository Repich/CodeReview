  section: Система стандартов 2025
  category: queries_performance
  title: Вычисление количества записей в запросах
  norm_text: 'Вычисление количества записей в запросах Область применения: управляемое приложение, мобильное приложение, обычное приложение. 1. При вычислении количества записей на языке запросов следует всегда использовать функцию КОЛИЧЕСТВО, а не СУММА.'
