- norm_id: STD_672
  section: Система стандартов 2025
  category: data_model_registers
  title: Поля периодов
  norm_text: 'Поля периодов Область применения: управляемое приложение. При настройке схемы компоновки данных следует придерживаться следующих умолчаний именования полей периодов: Поле Путь Синоним Год Периоды.Год Период, год Полугодие Периоды.Полугодие Период, полугодие Квартал Периоды.Квартал Период, квартал Месяц Периоды.Месяц Период, месяц Декада Периоды.Декада Период, декада Неделя Периоды.Неделя Период, неделя День Периоды.День Период, день Час Периоды.Час Период, час Минута Периоды.Минута Период, минута Секунда Периоды.Секунда Период, секунда 2. При настройке схемы компоновки данных следует придерживаться следующих умолчаний формата полей периодов: Поле Форматная строка Пример Год Л=ru; Для полей ПериодСекунда и Регистратор следует придерживаться указанных ниже настроек: 3.1. Для поля ПериодСекунда следует установить ограничение на использование поля в качестве доступного поля выбора, отбора, группировки и упорядочивания, так указанное поля не является пользовательским; Все это необходимо для корректного упорядочивания данных при расшифровке по регистратору.'
  tags:
