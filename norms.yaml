  norm_text: 'Каждый индекс увеличивает время записи и обслуживания таблицы. Недопустимо механически индексировать все реквизиты справочника или документа. Перед добавлением индекса следует убедиться, что поле реально используется в запросах и сортировках, а выигрыш превышает накладные расходы.'
