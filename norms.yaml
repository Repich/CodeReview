  category: code_style
  title: 'Переопределяемые общие модули должны содержать только экспортные процедуры, которые вызываются '
  norm_text: 'Переопределяемые общие модули должны содержать только экспортные процедуры, которые вызываются из кода самой библиотеки. Другими словами, не следует допускать вызовов процедур переопределяемых модулей непосредственно из кода конфигурации-потребителя. К программному интерфейсу библиотеки следует относить только экспортные процедуры и функции непереопределяемых общих модулей. КонецФункции а в модуле ПапкиФайловПереопределяемый - процедура-обработчик ПриПолученииПапкиФайлов: // Вызывается из библиотеки при необходимости получить папку файлов для указанного владельца. // // Параметры: // ВладелецФайловСсылка – ЛюбаяСсылка - владелец файлов, для которого нужно вернуть папку. // ПапкаФайлов – СправочникСсылка.ПапкиФайлов - в этот параметр нужно записать результат. // Процедура ПриПолученииПапкиФайлов(ВладелецФайловСсылка, ПапкаФайлов, СтандартнаяОбработка) Экспорт КонецПроцедуры При этом все вызовы из конфигурации-потребителя должны идти только к библиотечному модулю ПапкиФайлов.'
