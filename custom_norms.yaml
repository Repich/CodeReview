  title: Для конструктора Новый не задавать больше 3 ключей структуры
  norm_text: 'При создании структуры с помощью конструктора Новый Структура() разрешено задавать не более 3 ключей структуры.
    При необходимости создания структуры с большим количеством ключей необходимо создавать только заготовку структура через
    Новый Структура; , а ключи в структуру добавлять с помощью метода Вставить() структуры.

    '
