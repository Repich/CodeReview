services:
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CODEREVIEW_DEBUG: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    volumes:
      - artifact_storage:/app/artifacts
      - ./pattern_1С.yaml:/app/pattern_1С.yaml
      - ./custom_norms.yaml:/app/custom_norms.yaml
      - ./make_llm_norm.yaml:/app/make_llm_norm.yaml
    ports:
      - "8200:8000"

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CODEREVIEW_WORKER_REDIS_URL: redis://redis:6379/0
      CODEREVIEW_WORKER_ENGINE_VERSION: "0.1.0"
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - artifact_storage:/app/artifacts
      - ./pattern_1С.yaml:/app/pattern_1С.yaml
      - ./custom_norms.yaml:/app/custom_norms.yaml
      - ./make_llm_norm.yaml:/app/make_llm_norm.yaml

volumes:
  artifact_storage:
