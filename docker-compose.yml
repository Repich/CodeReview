version: '3.9'

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: codereview
      POSTGRES_USER: codereview
      POSTGRES_PASSWORD: codereview
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgresql+psycopg://codereview:codereview@postgres:5432/codereview
      CODEREVIEW_DEBUG: "false"
    depends_on:
      - postgres
    volumes:
      - artifact_storage:/app/artifacts

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    environment:
      CODEREVIEW_WORKER_BACKEND_API_URL: http://backend:8000/api
      CODEREVIEW_WORKER_REDIS_URL: redis://redis:6379/0
      CODEREVIEW_WORKER_ENGINE_VERSION: 0.1.0
    depends_on:
      - backend
      - redis
    volumes:
      - artifact_storage:/app/artifacts

  nginx:
    image: nginx:alpine
    depends_on:
      - backend
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  pg_data:
  artifact_storage:
  app_logs:
