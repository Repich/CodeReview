server {
    listen 80;
    server_name _;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        return 200 'CodeReview backend running';
        add_header Content-Type text/plain;
    }
}
