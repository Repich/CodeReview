- norm_id: PATTERN_NORM_01
  title: "Single Responsibility Principle (SRP)"
  section: "Архитектура и паттерны"
  category: availability
  norm_text: "Процедура/функция должна иметь одну основную ответственность и один тип побочного эффекта. Запрещено совмещать в одном методе сетевые вызовы, доступ к данным и модификацию прикладных объектов."
  rationale: "Смешение ответственностей повышает риск частичных изменений, неконсистентности данных при ошибках и делает дефекты трудно воспроизводимыми в эксплуатации."
  detection_hint: "В одном методе одновременно встречаются: HTTP*/WS*/FTP* и Запрос.Выполнить()/НаборЗаписей.Записать() и Объект.Записать()/Проведение."
  scope: "любой модуль"
  source_reference: "Общепринятая практика (SOLID)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_02
  title: "Separation of Concerns (SoC)"
  section: "Архитектура и паттерны"
  category: availability
  norm_text: "Логика интеграции, бизнес-правила и слой доступа к данным должны быть разделены по модулям/слоям. Запрещено, чтобы бизнес-правила напрямую зависели от транспорта (HTTP/JSON) или формировали SQL/текст запросов."
  rationale: "Нарушение приводит к каскадным отказам при изменении API/схемы данных, снижает управляемость изменений и увеличивает вероятность регрессий."
  detection_hint: "В бизнес-методах присутствуют 'HTTPЗапрос/HTTPСоединение/JSON' или 'Запрос.Текст' (строки с текстом запроса) без выделенного слоя."
  scope: "сервер/общий модуль"
  source_reference: "Общепринятая практика (архитектурные принципы)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_03
  title: "Repository Pattern"
  section: "Доступ к данным"
  category: performance
  norm_text: "Доступ к данным должен быть инкапсулирован в репозитории; запрещено размазывать тексты запросов по бизнес-логике и UI. Репозиторий должен возвращать доменные DTO/коллекции, а не «сырой» результат без контракта."
  rationale: "Разрозненные запросы приводят к неконтролируемой деградации, дублям логики выборок и ошибкам при изменении структуры/индексов."
  detection_hint: "Поиск строковых литералов запросов (ВЫБРАТЬ/ПОМЕСТИТЬ/СГРУППИРОВАТЬ) в модулях форм/команд и в методах, которые также изменяют объекты."
  scope: "любой модуль"
  source_reference: "Общепринятая практика (Repository)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_04
  title: "Unit of Work"
  section: "Транзакции"
  category: transactions
  norm_text: "Группа связанных изменений данных должна выполняться как единая единица работы с четкими границами транзакции и откатом при ошибке. Запрещено фиксировать часть изменений при невозможности гарантировать фиксацию всех зависимых изменений."
  rationale: "Нарушение приводит к частично примененным изменениям, рассогласованию сущностей и необходимости ручной коррекции данных."
  detection_hint: "Несколько Записать()/НаборЗаписей.Записать()/Проведение без единого управления транзакцией и без единого обработчика ошибок."
  scope: "сервер/общий модуль"
  source_reference: "Общепринятая практика (Unit of Work)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_05
  title: "CQRS (Command Query Responsibility Segregation)"
  section: "Архитектура и паттерны"
  category: data_integrity
  norm_text: "Методы чтения (Query) не должны иметь побочных эффектов изменения данных; методы изменения (Command) не должны выполнять тяжелые выборки, не необходимые для команды. Запрещено скрыто изменять данные в функциях, используемых для чтения/отображения."
  rationale: "Побочные эффекты в чтении вызывают неожиданные изменения, гонки и неконсистентность при повторных вызовах UI/интеграций."
  detection_hint: "Функции, вызываемые из формы/отчетов/печатных форм, содержащие Записать()/Проведение/НаборЗаписей.Записать()."
  scope: "любой модуль"
  source_reference: "Общепринятая практика (CQRS)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_06
  title: "Idempotency (Идемпотентность) для интеграций"
  section: "Интеграции"
  category: data_integrity
  norm_text: "Операции синхронизации/обработки входящих сообщений должны быть идемпотентны: повторный вызов с тем же ключом не должен приводить к повторному созданию/проведению/смене статуса. Должен использоваться ключ корреляции и журнал обработки."
  rationale: "Без идемпотентности ретраи и дубли сообщений приводят к дублям документов, повторным проводкам и порче учетных данных."
  detection_hint: "HTTP/WS обработка, после которой выполняются Записать()/Проведение, при отсутствии проверки 'уже обработано' по идентификатору внешней операции."
  scope: "сервер"
  source_reference: "Общепринятая практика (Integration Patterns)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_07
  title: "Circuit Breaker"
  section: "Интеграции"
  category: availability
  norm_text: "Вызовы нестабильных внешних систем должны быть защищены паттерном Circuit Breaker с порогом ошибок и временем восстановления. Запрещено бесконтрольно повторять вызовы при массовых сбоях внешней системы."
  rationale: "Без отсечки система деградирует каскадно: растут таймауты, блокируются регламентные окна, исчерпываются пул соединений и ресурсы сервера."
  detection_hint: "Повторяющиеся HTTP/WS вызовы в циклах/регламентках без ограничителя частоты/порогов и без единого состояния отказа."
  scope: "сервер"
  source_reference: "Общепринятая практика (Resilience Patterns)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_08
  title: "Retry with Exponential Backoff"
  section: "Интеграции"
  category: availability
  norm_text: "Повторные попытки внешних вызовов должны выполняться с экспоненциальной задержкой и джиттером и только для транзиентных ошибок. Запрещены плотные ретраи без задержки и ретраи для логических ошибок (4xx/валидация)."
  rationale: "Неправильные ретраи создают лавинообразную нагрузку и усугубляют недоступность внешней системы и собственной."
  detection_hint: "Циклы повторов HTTP/WS с немедленным повтором или фиксированным маленьким интервалом; отсутствие фильтрации по коду/типу ошибки."
  scope: "сервер"
  source_reference: "Общепринятая практика (Resilience Patterns)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_09
  title: "Bulkhead"
  section: "Надежность и ресурсы"
  category: availability
  norm_text: "Ресурсы для внешних интеграций (таймауты, пулы соединений, фоновые задания) должны быть изолированы от критичных внутренних операций. Запрещено выполнять внешние вызовы в общих пулах/контекстах, где они могут блокировать основную обработку."
  rationale: "Без изоляции сбой интеграции приводит к деградации всей системы (включая критичные операции)."
  detection_hint: "Длительные HTTP/WS вызовы в общих регламентках без ограничения параллелизма; отсутствие отдельной очереди/фоновых заданий для интеграции."
  scope: "сервер"
  source_reference: "Общепринятая практика (Resilience Patterns)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_10
  title: "Adapter Pattern"
  section: "Интеграции"
  category: availability
  norm_text: "Взаимодействие с внешними системами должно быть скрыто за адаптером с устойчивым внутренним контрактом (DTO/интерфейс). Запрещено распространять по коду детали протокола (заголовки, URL, формат JSON)."
  rationale: "Иначе любое изменение внешнего API вызывает массовые правки и высокие риски регрессий и остановки интеграции."
  detection_hint: "Повторяющиеся по проекту строки 'Authorization', 'Content-Type', URL/пути, разбор JSON в разных местах."
  scope: "сервер/общий модуль"
  source_reference: "Общепринятая практика (GoF Adapter)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_11
  title: "Facade Pattern"
  section: "Архитектура и паттерны"
  category: availability
  norm_text: "Сложные подсистемы должны предоставлять внешний API через фасад, скрывающий внутренние модули и порядок вызовов. Запрещено, чтобы внешний код напрямую дергал множество внутренних модулей в правильной последовательности."
  rationale: "Прямая зависимость от внутренностей подсистемы приводит к хрупкости, нарушению инвариантов и ошибкам при смене реализации."
  detection_hint: "В вызывающем коде последовательности вызовов 3+ внутренних модулей одной подсистемы, где порядок важен и не защищен контрактом."
  scope: "общий модуль/сервер"
  source_reference: "Общепринятая практика (GoF Facade)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_12
  title: "Strategy Pattern"
  section: "Архитектура и паттерны"
  category: availability
  norm_text: "Вариативная бизнес-логика должна реализовываться стратегиями вместо ветвлений по типам/состояниям во множестве мест. Запрещено разрастание условий Если/ИначеЕсли по «типам операций», когда поведение расширяется."
  rationale: "Большие ветвления приводят к ошибкам при добавлении новых вариантов, регрессиям и трудно тестируемым комбинациям."
  detection_hint: "Методы с длинными цепочками ИначеЕсли по типам/перечислениям/строковым кодам, особенно когда каждый блок выполняет разный алгоритм записи/проведения."
  scope: "любой модуль"
  source_reference: "Общепринятая практика (GoF Strategy)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_13
  title: "Template Method"
  section: "Архитектура и паттерны"
  category: availability
  norm_text: "Повторяющиеся сценарии обработки (валидация → загрузка → применение → логирование) должны быть оформлены как шаблонный метод с точками расширения. Запрещено копировать один и тот же алгоритм в разных модулях с локальными правками."
  rationale: "Копипаст сценариев приводит к расхождениям поведения, пропуску критичных шагов (валидация/логирование/откат) и авариям в эксплуатации."
  detection_hint: "Схожие блоки кода в разных местах: одинаковые шаги обработки, но с локальными отличиями; повторяемые последовательности Попытка/Исключение/логирование."
  scope: "общий модуль/сервер"
  source_reference: "Общепринятая практика (GoF Template Method)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_14
  title: "Command Pattern"
  section: "Архитектура и паттерны"
  category: data_integrity
  norm_text: "Бизнес-операции, изменяющие состояние (проведение, смена статуса, пакетные обновления), должны оформляться как команды с явными входными параметрами и единым контролем ошибок. Запрещено «раскидывать» логику операции по обработчикам UI и регламенткам."
  rationale: "Распределенная логика операции приводит к частичным изменениям и неодинаковому поведению при разных точках входа."
  detection_hint: "Одна и та же операция реализована в нескольких местах (форма/обработка/регламентка) с похожими присваиваниями реквизитов и Записать()/Проведение."
  scope: "сервер/общий модуль"
  source_reference: "Общепринятая практика (GoF Command)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_15
  title: "Observer / Publish-Subscribe (с осторожностью)"
  section: "События и расширяемость"
  category: availability
  norm_text: "Событийные механизмы должны использоваться только для слабосвязанных уведомлений; запрещено строить на событиях критичную бизнес-транзакцию без гарантированного порядка, идемпотентности и обработки сбоев."
  rationale: "События без гарантий порядка и доставки приводят к недетерминированности, потерям действий и рассогласованию данных."
  detection_hint: "Оповещения/подписки, которые запускают Записать()/Проведение или меняют статусы без транзакционного контроля и идемпотентности."
  scope: "сервер/общий модуль"
  source_reference: "Общепринятая практика (Pub/Sub)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_16
  title: "Dependency Injection (DI)"
  section: "Архитектура и паттерны"
  category: availability
  norm_text: "Зависимости (адаптеры, репозитории, сервисы) должны передаваться через параметры/фабрики/контейнер, а не создаваться внутри бизнес-методов. Запрещено жестко создавать зависимости (Новый HTTPСоединение/Новый Запрос) глубоко в доменной логике без абстракции."
  rationale: "Жесткое создание зависимостей повышает связанность и приводит к невозможности тестирования и безопасной замены реализаций в эксплуатации."
  detection_hint: "В бизнес-сервисах создаются инфраструктурные объекты через 'Новый ...' вместо получения через фабрику/провайдер."
  scope: "сервер/общий модуль"
  source_reference: "Общепринятая практика (DI)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_17
  title: "Null Object Pattern"
  section: "Надежность"
  category: data_integrity
  norm_text: "Для доменных сущностей и результатов интеграции должен применяться Null Object/явные значения по умолчанию с фиксированным поведением; запрещено распространять по коду проверки на Неопределено, приводящие к пропуску критичных действий."
  rationale: "Разрозненные проверки на Неопределено вызывают расхождения сценариев, пропуски обязательных полей и скрытые дефекты при редких данных."
  detection_hint: "Множество 'Если <...> = Неопределено Тогда Возврат/Продолжить' в критичных цепочках обработки без единого контракта результата."
  scope: "любой модуль"
  source_reference: "Общепринятая практика (Null Object)"
  priority: 1
  exceptions: ""

- norm_id: PATTERN_NORM_18
  title: "Anti-Pattern: God Object / Blob"
  section: "Архитектура и паттерны"
  category: availability
  norm_text: "Запрещено концентрировать несвязанные обязанности в одном модуле/классе/общем модуле («God Object»). Логика должна быть декомпозирована на сервисы/адаптеры/репозитории с явными контрактами."
  rationale: "God Object приводит к лавинообразному росту сложности, регрессиям при любых правках и повышенному риску критичных ошибок в эксплуатации."
  detection_hint: "Модуль содержит одновременно: интеграции, запросы, проведение документов, расчеты, UI-хелперы; высокий объем кода и множество публичных экспортов."
  scope: "любой модуль"
  source_reference: "Общепринятая практика (Anti-Patterns)"
  priority: 1
  exceptions: ""
