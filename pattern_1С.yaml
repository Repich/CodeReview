norm_id: PATTERN_NORM_01
title: "Single Responsibility Principle (SRP)"
section: "SOLID: ответственность"
category: availability
norm_text: "Процедура/функция и общий модуль должны иметь одну логическую ответственность и одну основную причину для изменения. Запрещено объединять в одном методе несколько разнородных задач, которые меняются по требованиям разных «владельцев» функциональности."
rationale: "Смешение задач приводит к лавинообразным регрессиям при правках, длительной отладке и нестабильности внедрений из-за неожиданных побочных эффектов."
detection_hint: "В одном методе присутствуют блоки с разными доменами (расчет/поиск/настройка UI/интеграция/загрузка), либо комментарии/описание метода перечисляют 3+ независимых действий."
scope: "любой модуль"
source_reference: "Статья SOLID в контексте 1С: раздел S (SRP) и примеры «чайник/рыбки» + разбиение на специализированные общие модули"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_02
title: "Anti-Pattern: God Object / Blob"
section: "Антипаттерны"
category: availability
norm_text: "Запрещено концентрировать несвязанные обязанности в одном общем модуле или одном «универсальном» методе. Функциональность должна быть декомпозирована на узконаправленные модули/методы с четкими контрактами."
rationale: "God Object делает изменения непредсказуемыми, увеличивает риск критичных дефектов и резко снижает скорость сопровождения."
detection_hint: "Общий модуль с большим числом экспортных методов разной тематики; методы с длинным телом и разнотипными зависимостями; частые правки по разным задачам в одном месте."
scope: "общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел S (SRP), пример «ОбработатьЗаказ» и вывод о смешении разной логики"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_03
title: "Separation of Concerns (SoC)"
section: "Архитектура: разделение слоев"
category: availability
norm_text: "Обязанности должны быть разделены по слоям/модулям: публичный контракт, служебная реализация, точки расширения. Запрещено смешивать в одном публичном интерфейсе функциональность разных подсистем."
rationale: "Нарушение SoC приводит к высокой связанности: изменение одной части функциональности ломает клиентов другой части, увеличивая риск остановки процесса при внедрении."
detection_hint: "Экспортный метод выполняет не только свою заявленную задачу, но и побочные действия (например, «получить данные» + «выполнить рассылку»); в одном модуле одновременно операции разных подсистем."
scope: "общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел I (ISP) и пример разделения модулей «РаботаСКонтрагентами/РаботаСЗаказами/Рассылки…»"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_04
title: "Open/Closed Principle (OCP)"
section: "SOLID: расширяемость"
category: availability
norm_text: "Компоненты должны быть открыты для расширения и закрыты для модификации: новые требования должны реализовываться через точки расширения и настройки, а не правкой проверенного кода. Запрещено добавлять новые ветки поведения путем модификации базового публичного метода, задающего контракт."
rationale: "Постоянные правки базового кода повышают риск регрессий и конфликтов, усложняют сопровождение и увеличивают время вывода изменений в продуктив."
detection_hint: "Хардкод соответствий/правил в коде (Соответствие/Если/ИначеЕсли по видам) для бизнес-настроек, которые меняются; частые коммиты в «базовый» метод под новые виды/правила."
scope: "сервер/общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел O (OCP), механизмы 1С (переопределяемые модули, расширения, подписки, настройки, внешние обработки)"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_05
title: "Template Method (Hook Method)"
section: "Точки расширения"
category: availability
norm_text: "Базовая логика должна задавать «скелет» алгоритма и вызывать hook-методы в переопределяемом модуле для расширения. Запрещено внедрять расширяемые части путем прямой правки базового алгоритма, если предусмотрена точка расширения."
rationale: "Без hook-точек расширение требует правок базового кода, что нарушает OCP и увеличивает вероятность регрессий."
detection_hint: "Наличие пары модулей «<Имя>» и «<Имя>Переопределяемый»; в базовом модуле отсутствует делегирование в переопределяемый модуль и вместо этого расширение делается правкой базового кода."
scope: "общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел O (OCP), вариант с переопределяемым модулем и «точкой расширения функциональности»"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_06
title: "Plugin Architecture (Extensions)"
section: "Расширяемость платформы 1С"
category: availability
norm_text: "Новая функциональность должна по возможности подключаться как отдельный слой (расширение конфигурации, внешняя обработка/отчет), не изменяя базовые объекты и их контракты. Запрещено внедрять дополнительную логику только через модификацию типового кода, если допустимы расширения/внешние обработки."
rationale: "Изменение базовой конфигурации повышает стоимость обновлений и риск конфликтов/потери работоспособности при переносе изменений."
detection_hint: "Требование «добавить новый отчет/обработку/доп.правило» реализовано через правку базовых объектов без технической необходимости; отсутствует использование расширений/внешних обработок там, где они применимы."
scope: "любой модуль"
source_reference: "Статья SOLID в контексте 1С: раздел O (OCP), перечень механизмов (расширения конфигурации, внешние отчеты и обработки)"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_07
title: "Strategy Pattern (Data-Driven Strategy)"
section: "SOLID: расширяемость через настройки"
category: availability
norm_text: "Вариативное бизнес-поведение должно задаваться данными (настройками) или заменяемой реализацией, а не хардкодом в условиях/соответствиях. Запрещено кодировать бизнес-правила, которые должны меняться пользователями, только в коде."
rationale: "Хардкод требует релиза и регресса для каждого изменения правил, повышая риск ошибок и увеличивая время реакции на бизнес."
detection_hint: "Соответствие/Если/ИначеЕсли, сопоставляющие категории/виды/статусы с числами/правилами, без источника настроек (регистр/справочник/константа)."
scope: "сервер/общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел O (OCP), вариант с регистром сведений для скидок (расширение функциональности без правки кода)"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_08
title: "Liskov Substitution Principle (LSP)"
section: "SOLID: подстановка и совместимость"
category: data_integrity
norm_text: "Любая подмена/переопределение реализации (расширение, подписка, переопределяемый модуль) должна сохранять контракт базовой версии: типы входов/выходов и ожидаемое поведение. Запрещено делать поведение зависимым от конкретного подтипа, если контракт заявлен для общего типа."
rationale: "Нарушение LSP приводит к сбоям в рантайме и непредсказуемым результатам при появлении новых подтипов или изменении данных."
detection_hint: "В переопределяемых модулях: проверки ТипЗнч() по конкретным типам вместо универсальной логики; обращение к структурам/свойствам без безопасного получения значения по умолчанию."
scope: "сервер/общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел L (LSP), пример с разной логикой по типам и исправление через безопасное получение ключа"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_09
title: "Interface Segregation Principle (ISP)"
section: "SOLID: интерфейсы"
category: availability
norm_text: "Публичные интерфейсы модулей и методов должны быть минимальными и специализированными под конкретного клиента. Запрещено навязывать клиентам лишние методы или опциональные параметры, включающие несвязанную функциональность и побочные эффекты."
rationale: "Перегруженные интерфейсы повышают связанность, усложняют тестирование и приводят к ошибкам при использовании из-за скрытых побочных эффектов."
detection_hint: "Экспортные методы с параметрами-флагами (Булево) «включить еще что-то»; экспортный модуль содержит функции разных доменов (данные + рассылка + заказы) в одном интерфейсе."
scope: "общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел I (ISP), пример «ОсновныеСведенияОКонтрагенте» с навязанными параметрами и разделение на 3 модуля"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_10
title: "Dependency Inversion Principle (DIP)"
section: "SOLID: зависимости и абстракции"
category: availability
norm_text: "Высокоуровневая бизнес-логика должна зависеть от абстракций (публичных контрактов), а не от конкретных низкоуровневых источников данных/реализаций. Реализации должны подстраиваться под контракт и подключаться через точки расширения."
rationale: "Жесткая привязка к конкретному регистру/источнику делает изменения дорогими и рискованными; отказ источника/смена механизма вызывает массовые правки и простои."
detection_hint: "В модулях объектов/документов прямые вызовы конкретных регистров/подсистем вместо вызова общего модуля-абстракции; отсутствие делегирования в «Переопределяемый» модуль."
scope: "сервер/общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел D (DIP), пример «Ценообразование» как абстракция + «ЦенообразованиеПереопределяемый» как реализация"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_11
title: "Design by Contract (DbC)"
section: "Контракты публичного API"
category: availability
norm_text: "Экспортные методы в областях публичного интерфейса должны иметь явно описанный контракт: параметры, типы, формат возвращаемого значения и гарантии поведения. Запрещено изменять контракт так, чтобы ломать существующих клиентов."
rationale: "Нарушение контракта приводит к массовым отказам в рантайме после обновления и к трудно диагностируемым инцидентам."
detection_hint: "Экспортные методы без описания параметров/возврата; изменения сигнатуры (добавление обязательных параметров, смена типа возврата) без версии/нового метода."
scope: "общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел «Немного о контрактах» и пример метода в области ПрограммныйИнтерфейс"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_12
title: "Backward Compatibility / Deprecation"
section: "Эволюция API"
category: availability
norm_text: "При развитии публичного интерфейса запрещено ломать существующие вызовы: вместо изменения условий контракта должен добавляться новый метод/необязательные параметры, а старый переноситься в область устаревших процедур и функций."
rationale: "Ломающие изменения вызывают каскадные падения в подсистемах и увеличивают риск остановки ключевых процессов при обновлении."
detection_hint: "Изменения экспортных методов: новый обязательный параметр, изменение поведения без сохранения старых гарантий; отсутствие «УстаревшиеПроцедурыИФункции»/новой версии метода."
scope: "общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел «Немного о контрактах», рекомендация про необязательные параметры/новые методы и область УстаревшиеПроцедурыИФункции"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_13
title: "Observer Pattern (Publish-Subscribe)"
section: "Точки расширения"
category: availability
norm_text: "Дополнительная логика должна подключаться через подписки на события, не модифицируя базовые объекты, при условии сохранения контракта события. Запрещено использовать подписки для изменения базового поведения так, чтобы это нарушало ожидания вызывающего кода."
rationale: "Непредсказуемые подписки ломают сценарии работы объектов и приводят к трудно воспроизводимым инцидентам из-за скрытых вмешательств."
detection_hint: "Подписки на ПередЗаписью/ОбработкаПроведения/и т.п., которые меняют ключевые поля/условия проведения без документированного контракта и без явного признака включения функциональности."
scope: "сервер/общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел O (OCP) и L (LSP), механизмы подписок на события как способ расширения без правки базового кода"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_14
title: "Abstraction Layer (Public Facade for Subsystem)"
section: "Контракты и абстракции"
category: availability
norm_text: "Для подсистемы должен существовать единый публичный фасад-абстракция (общий модуль в области ПрограммныйИнтерфейс), скрывающий детали реализации и обеспечивающий стабильный контракт. Запрещено, чтобы внешние клиенты подсистемы напрямую обращались к внутренним модулям и объектам реализации."
rationale: "Прямой доступ к внутренностям приводит к хрупкости: замена реализации или изменение структуры данных вызывает массовые поломки и длительные простои."
detection_hint: "Внешние модули вызывают «низкоуровневые» источники (регистры/служебные модули) вместо обращения к единому модулю-контракту подсистемы."
scope: "общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел D (DIP), тезис «общие модули как абстракции» и пример передачи управления реализации через переопределяемый модуль"
priority: 1
exceptions: ""

norm_id: PATTERN_NORM_15
title: "Test Double (Mock/Stubs)"
section: "Тестируемость через абстракции"
category: availability
norm_text: "Код должен проектироваться так, чтобы реализация могла быть заменена на заглушку в тестах без изменения бизнес-логики: высокоуровневые модули должны зависеть от контрактов, а не от конкретных реализаций. Запрещено писать код так, что тест возможен только при доступе к реальным регистраторам/источникам."
rationale: "Невозможность изолированного тестирования повышает риск дефектов в продуктиве и увеличивает стоимость изменений."
detection_hint: "Высокоуровневый модуль напрямую обращается к конкретному источнику данных/реализации и не имеет абстрактного слоя (общий модуль-контракт + переопределяемая реализация)."
scope: "сервер/общий модуль"
source_reference: "Статья SOLID в контексте 1С: раздел D (DIP), вывод о возможности подстановки mock-объектов (заглушек) при зависимости от абстракций"
priority: 1
exceptions: ""